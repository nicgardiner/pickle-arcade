<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers</title>
<style>
  :root {
    --board-size: min(90vmin, 560px);
    --cell: calc(var(--board-size) / 8);
    --dark: #b45309;
    --light: #fef3c7;
    --board-dark: #92400e;
    --board-light: #fef9e7;
    --red: #dc2626;
    --red-king: #991b1b;
    --black: #1c1917;
    --black-king: #44403c;
    --highlight: rgba(250, 204, 21, 0.6);
    --valid: rgba(34, 197, 94, 0.5);
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #1e1b4b 0%, #0f0e17 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(139,92,246,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(217,70,239,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── MENU ── */
  #menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeIn 0.6s ease;
  }

  .title {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: bold;
    color: #fef3c7;
    text-shadow: 0 0 40px rgba(251,191,36,0.6), 0 4px 8px rgba(0,0,0,0.8);
    letter-spacing: 0.1em;
  }

  .subtitle {
    font-size: 1.1rem;
    color: #a78bfa;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .menu-piece-preview {
    display: flex;
    gap: 16px;
    margin: 8px 0;
  }

  .preview-piece {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }

  .preview-piece.red {
    background: radial-gradient(circle at 35% 30%, #ef4444, #991b1b);
    border: 3px solid #fca5a5;
  }

  .preview-piece.black {
    background: radial-gradient(circle at 35% 30%, #44403c, #1c1917);
    border: 3px solid #78716c;
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 280px;
  }

  .btn {
    padding: 16px 32px;
    border: none;
    border-radius: 12px;
    font-size: 1.15rem;
    font-family: 'Georgia', serif;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.05em;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .btn:hover::after { background: rgba(255,255,255,0.1); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: white;
    box-shadow: 0 8px 24px rgba(124,58,237,0.4);
  }

  .btn-secondary {
    background: linear-gradient(135deg, #b45309, #92400e);
    color: #fef3c7;
    box-shadow: 0 8px 24px rgba(180,83,9,0.4);
  }

  .btn-ghost {
    background: rgba(255,255,255,0.08);
    color: #d1d5db;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* ── DIFFICULTY ── */
  #difficulty-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    animation: fadeIn 0.4s ease;
  }

  .screen-title {
    font-size: 1.8rem;
    color: #fef3c7;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .diff-options {
    display: flex;
    gap: 14px;
  }

  .diff-btn {
    width: 90px;
    padding: 18px 0;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    color: #e5e7eb;
    font-size: 0.9rem;
    font-family: 'Georgia', serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .diff-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); }
  .diff-btn.active { background: rgba(124,58,237,0.3); border-color: #7c3aed; }
  .diff-icon { font-size: 1.6rem; }

  /* ── GAME ── */
  #game {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeIn 0.5s ease;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: var(--board-size);
  }

  .player-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s ease;
    min-width: 130px;
  }

  .player-card.active {
    background: rgba(255,255,255,0.12);
    border-color: rgba(250,204,21,0.5);
    box-shadow: 0 0 20px rgba(250,204,21,0.2);
  }

  .player-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .player-dot.red { background: radial-gradient(circle at 35% 30%, #ef4444, #991b1b); }
  .player-dot.black { background: radial-gradient(circle at 35% 30%, #44403c, #1c1917); }

  .player-name { color: #e5e7eb; font-size: 0.9rem; }
  .piece-count { color: #9ca3af; font-size: 0.8rem; margin-left: auto; }

  .turn-indicator {
    color: #fef3c7;
    font-size: 0.95rem;
    text-align: center;
    min-width: 100px;
    text-shadow: 0 0 10px rgba(251,191,36,0.4);
  }

  /* ── BOARD ── */
  .board-wrapper {
    position: relative;
    width: var(--board-size);
    height: var(--board-size);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow), 0 0 0 6px #92400e, 0 0 0 10px #78350f;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: default;
  }

  #boardCanvas { z-index: 1; }
  #pieceCanvas { z-index: 2; cursor: pointer; }
  #overlayCanvas { z-index: 3; pointer-events: none; }

  /* ── STATUS BAR ── */
  .status-bar {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .status-msg {
    color: #a78bfa;
    font-size: 0.92rem;
    letter-spacing: 0.03em;
    transition: opacity 0.3s;
  }

  /* ── WIN OVERLAY ── */
  #winOverlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 10;
    border-radius: 8px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.4s ease;
  }

  .win-text {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: #fef3c7;
    text-shadow: 0 0 30px rgba(251,191,36,0.7);
    text-align: center;
    padding: 0 20px;
  }

  .win-sub {
    color: #9ca3af;
    font-size: 0.95rem;
  }

  .win-btns {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 20px;
  }

  .win-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-family: 'Georgia', serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .win-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

  /* ── CAPTURED DISPLAY ── */
  .captured-row {
    display: flex;
    align-items: center;
    gap: 6px;
    width: var(--board-size);
    min-height: 28px;
    flex-wrap: wrap;
  }

  .cap-label { color: #6b7280; font-size: 0.78rem; margin-right: 4px; }

  .cap-piece {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: inline-block;
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .cap-piece.red { background: radial-gradient(circle at 35% 30%, #ef4444, #991b1b); }
  .cap-piece.black { background: radial-gradient(circle at 35% 30%, #44403c, #1c1917); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ── BOT THINKING ── */
  .thinking-dots {
    display: none;
    gap: 5px;
    align-items: center;
  }

  .thinking-dots.visible { display: flex; }

  .thinking-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #a78bfa;
    animation: bounce 1.2s infinite ease-in-out;
  }

  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── EXIT GAME (launcher) ── */
  .btn.gl-exit {
    color: #fca5a5;
    border-color: rgba(252,165,165,0.3);
  }
  #gl-exit-confirm {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    animation: fadeIn 0.25s ease;
  }
  .glx-panel {
    background: linear-gradient(160deg, #1e1b4b, #0f0e17);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    min-width: 280px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }
  .glx-title { font-size: 1.6rem; color: #fef3c7; letter-spacing: 0.05em; }
  .glx-body { font-size: 1rem; color: #e5e7eb; text-align: center; }
  .glx-row { display: flex; gap: 12px; width: 100%; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <div class="title">♟ Checkers</div>
  <div class="subtitle">Classic Strategy Board Game</div>
  <div class="menu-piece-preview">
    <div class="preview-piece red"></div>
    <div class="preview-piece black"></div>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="showDifficulty()">vs Bot 🤖</button>
    <button class="btn btn-secondary" onclick="startGame('local')">Local Multiplayer 👥</button>
    <button class="btn btn-secondary" onclick="startOnline()">Online Multiplayer 🌐</button>
    <button id="gl-exit-btn" class="btn btn-ghost gl-exit">Exit Game 🚪</button>
  </div>
</div>

<!-- DIFFICULTY -->
<div id="difficulty-screen">
  <div class="screen-title">Choose Difficulty</div>
  <div class="diff-options">
    <button class="diff-btn" onclick="selectDiff('easy')">
      <span class="diff-icon">🌱</span>Easy
    </button>
    <button class="diff-btn active" onclick="selectDiff('medium')">
      <span class="diff-icon">⚔️</span>Medium
    </button>
    <button class="diff-btn" onclick="selectDiff('hard')">
      <span class="diff-icon">🔥</span>Hard
    </button>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="startGame('bot')">Start Game</button>
    <button class="btn btn-ghost" onclick="showMenu()">Back</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <div class="player-card" id="card-red">
      <div class="player-dot red"></div>
      <div>
        <div class="player-name" id="name-red">Red</div>
        <div class="piece-count" id="count-red">12 pieces</div>
      </div>
    </div>
    <div class="turn-indicator" id="turnIndicator">Red's Turn</div>
    <div class="player-card" id="card-black">
      <div class="player-dot black"></div>
      <div>
        <div class="player-name" id="name-black">Black</div>
        <div class="piece-count" id="count-black">12 pieces</div>
      </div>
    </div>
  </div>

  <div class="board-wrapper">
    <canvas id="boardCanvas"></canvas>
    <canvas id="pieceCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
    <div id="winOverlay">
      <div class="win-text" id="winText"></div>
      <div class="win-sub" id="winSub"></div>
      <div class="win-btns">
        <button class="win-btn" style="background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;" onclick="startGame(currentMode)">Play Again</button>
        <button class="win-btn" style="background:rgba(255,255,255,0.1);color:#d1d5db;border:1px solid rgba(255,255,255,0.2);" onclick="showMenu()">Menu</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-msg" id="statusMsg">Click a piece to select it</div>
    <div class="thinking-dots" id="thinkingDots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="captured-row" id="capturedRow">
    <span class="cap-label">Captured:</span>
  </div>

  <button class="btn btn-ghost" style="padding:8px 22px;font-size:0.9rem;" onclick="openPauseMenu()">⏸ Pause</button>

  <!-- PAUSE MENU OVERLAY -->
  <div id="pauseOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(6px);animation:fadeIn 0.25s ease;">
    <div id="pausePanel" style="background:linear-gradient(160deg,#1e1b4b,#0f0e17);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:36px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;min-width:280px;box-shadow:0 30px 80px rgba(0,0,0,0.7);">

      <!-- Default view -->
      <div id="pauseMain" style="display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;">
        <div style="font-size:1.6rem;color:#fef3c7;letter-spacing:0.05em;">Game Paused</div>
        <button class="btn btn-ghost" style="width:100%;" onclick="closePauseMenu()">▶ Resume</button>
        <button class="btn btn-ghost" style="width:100%;color:#fca5a5;border-color:rgba(252,165,165,0.3);" onclick="showConfirm('restart')">↺ Restart</button>
        <button class="btn btn-ghost" style="width:100%;color:#c4b5fd;border-color:rgba(196,181,253,0.3);" onclick="showConfirm('menu')">⬅ Main Menu</button>
      </div>

      <!-- Confirm view -->
      <div id="pauseConfirm" style="display:none;flex-direction:column;align-items:center;gap:16px;width:100%;">
        <div style="font-size:1rem;color:#e5e7eb;text-align:center;" id="confirmMsg"></div>
        <div style="display:flex;gap:12px;width:100%;">
          <button class="btn" style="flex:1;background:rgba(255,255,255,0.06);color:#d1d5db;border:1px solid rgba(255,255,255,0.15);padding:12px;" onclick="backToPause()">Cancel</button>
          <button class="btn" style="flex:1;background:linear-gradient(135deg,#dc2626,#991b1b);color:white;padding:12px;" id="confirmYesBtn">Confirm</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  SOUND EFFECTS  (Web Audio API, no external files)
// ════════════════════════════════════════════════════════
const SFX = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  // Bandpass-filtered noise burst — great for wooden thuds and impacts
  function burst(vol, dur, freq, q = 1.5) {
    const c = ac(), t = c.currentTime;
    const buf = c.createBuffer(1, Math.ceil(c.sampleRate * dur), c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource(); src.buffer = buf;
    const f = c.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = q;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(c.destination);
    src.start(t); src.stop(t + dur + 0.02);
  }
  // Simple oscillator tone with attack + decay envelope
  function osc(freq, type, vol, dur, atk = 0.005) {
    const c = ac(), t = c.currentTime;
    const o = c.createOscillator(); const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + atk);
    g.gain.exponentialRampToValueAtTime(0.0001, t + atk + dur);
    o.start(t); o.stop(t + atk + dur + 0.02);
  }
  return {
    // Soft click: picking up a piece
    select() { osc(780, 'sine', 0.16, 0.055, 0.003); },
    // Wooden thud: normal piece slide & place
    move() { burst(0.65, 0.13, 210, 2); osc(155, 'sine', 0.22, 0.09, 0.002); },
    // Heavy impact: capture
    capture() {
      burst(1.0, 0.16, 290, 1.5); osc(320, 'triangle', 0.38, 0.07, 0.001);
      setTimeout(() => osc(640, 'sine', 0.12, 0.05, 0.008), 30);
    },
    // Regal ascending arpeggio: crowned king
    king() {
      [330, 415, 523, 659, 880].forEach((f, i) =>
        setTimeout(() => osc(f, 'triangle', 0.28, 0.18, 0.01), i * 85));
    },
    // Short buzz: invalid / wrong piece
    invalid() { osc(190, 'square', 0.12, 0.07, 0.002); },
    // Triumphant rising chords: win
    win() {
      [[523,659,784],[659,784,988],[784,988,1175]].forEach((chord, ci) =>
        chord.forEach(f => setTimeout(() => osc(f, 'triangle', 0.18, 0.38, 0.015), ci * 290)));
      setTimeout(() => osc(1568, 'sine', 0.2, 0.4, 0.01), 920);
    },
    // Descending sad tones: lose
    lose() {
      [440, 370, 311, 262].forEach((f, i) =>
        setTimeout(() => osc(f, 'triangle', 0.18, 0.3, 0.01), i * 240));
    },
  };
})();

// ════════════════════════════════════════════════════════
//  CONSTANTS & STATE
// ════════════════════════════════════════════════════════
const EMPTY = 0, RED = 1, BLACK = 2, RED_KING = 3, BLACK_KING = 4;
const RED_PLAYER = 'red', BLACK_PLAYER = 'black';

let boardCanvas, pieceCanvas, overlayCanvas;
let bCtx, pCtx, oCtx;
let CELL_SIZE;

let board = [];
let currentPlayer = RED_PLAYER;
let selectedCell = null;
let validMoves = [];
let mustJumps = [];
let currentMode = 'local';
let onlineColor = RED_PLAYER; // host=red, guest=black
let difficulty = 'medium';
let botColor = BLACK_PLAYER;
let capturedRed = 0, capturedBlack = 0;
let gameActive = false;
let animating = false;
let multiJumpPiece = null; // for chained jumps
let multiJumpCount = 0;   // captures in current multi-jump chain

// Animation state
let animations = [];

// ════════════════════════════════════════════════════════
//  MENU / SETUP
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
//  PAUSE MENU
// ════════════════════════════════════════════════════════
function openPauseMenu() {
  document.getElementById('pauseOverlay').style.display = 'flex';
  document.getElementById('pauseMain').style.display = 'flex';
  document.getElementById('pauseConfirm').style.display = 'none';
}

function closePauseMenu() {
  document.getElementById('pauseOverlay').style.display = 'none';
}

function showConfirm(action) {
  document.getElementById('pauseMain').style.display = 'none';
  document.getElementById('pauseConfirm').style.display = 'flex';
  document.getElementById('confirmMsg').textContent =
    action === 'restart'
      ? 'Restart the current game? All progress will be lost.'
      : 'Return to the main menu? Your game will be lost.';
  document.getElementById('confirmYesBtn').onclick = () => {
    closePauseMenu();
    if (action === 'restart') startGame(currentMode);
    else showMenu();
  };
}

function backToPause() {
  document.getElementById('pauseMain').style.display = 'flex';
  document.getElementById('pauseConfirm').style.display = 'none';
}

function showMenu() {
  document.getElementById('menu').style.display = 'flex';
  document.getElementById('difficulty-screen').style.display = 'none';
  document.getElementById('game').style.display = 'none';
  gameActive = false;
}

function showDifficulty() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('difficulty-screen').style.display = 'flex';
}

function selectDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function startGame(mode) {
  currentMode = mode;
  document.getElementById('menu').style.display = 'none';
  document.getElementById('difficulty-screen').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('winOverlay').style.display = 'none';

  // Setup names
  if (mode === 'bot') {
    document.getElementById('name-red').textContent = 'You (Red)';
    document.getElementById('name-black').textContent = `Bot (${difficulty})`;
    botColor = BLACK_PLAYER;
  } else {
    document.getElementById('name-red').textContent = 'Red Player';
    document.getElementById('name-black').textContent = 'Black Player';
  }

  capturedRed = 0;
  capturedBlack = 0;
  selectedCell = null;
  validMoves = [];
  mustJumps = [];
  multiJumpPiece = null;
  multiJumpCount = 0;
  animations = [];
  animating = false;
  gameActive = true;
  currentPlayer = RED_PLAYER;

  updateCapturedDisplay();
  initBoard();

  // Setup canvases
  requestAnimationFrame(() => {
    setupCanvases();
    drawBoard();
    drawPieces();
    drawOverlay();
    updateUI();
    computeMoves();
  });
}

function setupCanvases() {
  boardCanvas  = document.getElementById('boardCanvas');
  pieceCanvas  = document.getElementById('pieceCanvas');
  overlayCanvas = document.getElementById('overlayCanvas');

  const wrapper = boardCanvas.parentElement;
  const size = wrapper.offsetWidth;
  CELL_SIZE = size / 8;

  [boardCanvas, pieceCanvas, overlayCanvas].forEach(c => {
    c.width  = size;
    c.height = size;
  });

  bCtx = boardCanvas.getContext('2d');
  pCtx = pieceCanvas.getContext('2d');
  oCtx = overlayCanvas.getContext('2d');

  pieceCanvas.removeEventListener('click', handleClick);
  pieceCanvas.addEventListener('click', handleClick);
}

// ════════════════════════════════════════════════════════
//  ONLINE MULTIPLAYER
// ════════════════════════════════════════════════════════
function startOnline() {
  if (!window.LobbySDK) { alert('Lobby SDK not loaded yet — try again in a moment.'); return; }
  window.LobbySDK.init('checkers', {
    onConnected(isHost, _seat, oppName) {
      onlineColor = isHost ? RED_PLAYER : BLACK_PLAYER;
      startGame('online');
      const me  = (window.__picklePlayerName || 'You');
      const opp = oppName || 'Opponent';
      document.getElementById('name-red').textContent   = isHost ? me  : opp;
      document.getElementById('name-black').textContent = isHost ? opp : me;
    },
    onData(data) {
      if (data.type === 'move' && gameActive && !animating) {
        executeMove(data.move);
      }
    },
    onDisconnected() {
      if (gameActive) { gameActive = false; setStatus('Opponent disconnected.'); }
    },
  });
  window.LobbySDK.openLobby();
}

// ════════════════════════════════════════════════════════
//  BOARD INIT
// ════════════════════════════════════════════════════════
function initBoard() {
  board = Array.from({length: 8}, () => Array(8).fill(EMPTY));
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if ((r + c) % 2 === 1) {
        if (r < 3) board[r][c] = BLACK;
        else if (r > 4) board[r][c] = RED;
      }
    }
  }
}

// ════════════════════════════════════════════════════════
//  DRAWING - BOARD
// ════════════════════════════════════════════════════════
function drawBoard() {
  const cs = CELL_SIZE;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const dark = (r + c) % 2 === 1;
      bCtx.fillStyle = dark ? '#92400e' : '#fef9e7';
      bCtx.fillRect(c * cs, r * cs, cs, cs);

      if (dark) {
        // subtle inner shadow on dark squares
        const grad = bCtx.createLinearGradient(c*cs, r*cs, c*cs+cs, r*cs+cs);
        grad.addColorStop(0, 'rgba(0,0,0,0.08)');
        grad.addColorStop(1, 'rgba(255,255,255,0.04)');
        bCtx.fillStyle = grad;
        bCtx.fillRect(c * cs, r * cs, cs, cs);
      }
    }
  }
}

// ════════════════════════════════════════════════════════
//  DRAWING - PIECES
// ════════════════════════════════════════════════════════
function drawPieces(skipCell) {
  pCtx.clearRect(0, 0, pieceCanvas.width, pieceCanvas.height);
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (skipCell && skipCell[0] === r && skipCell[1] === c) continue;
      const p = board[r][c];
      if (p !== EMPTY) drawPiece(pCtx, r, c, p, 1.0);
    }
  }
}

function drawPiece(ctx, row, col, piece, scale) {
  const cs = CELL_SIZE;
  const cx = col * cs + cs / 2;
  const cy = row * cs + cs / 2;
  const radius = cs * 0.38 * scale;

  const isRed   = piece === RED   || piece === RED_KING;
  const isKing  = piece === RED_KING || piece === BLACK_KING;

  // Drop shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur  = 10 * scale;
  ctx.shadowOffsetY = 4 * scale;

  // Outer ring / edge
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = isRed ? '#7f1d1d' : '#0c0a09';
  ctx.fill();
  ctx.restore();

  // Main body gradient
  const bodyGrad = ctx.createRadialGradient(
    cx - radius * 0.3, cy - radius * 0.3, radius * 0.05,
    cx, cy, radius * 0.95
  );

  if (isRed) {
    bodyGrad.addColorStop(0, '#fca5a5');
    bodyGrad.addColorStop(0.3, '#ef4444');
    bodyGrad.addColorStop(1, '#991b1b');
  } else {
    bodyGrad.addColorStop(0, '#78716c');
    bodyGrad.addColorStop(0.3, '#44403c');
    bodyGrad.addColorStop(1, '#1c1917');
  }

  ctx.beginPath();
  ctx.arc(cx, cy, radius * 0.9, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Highlight
  const hGrad = ctx.createRadialGradient(
    cx - radius * 0.28, cy - radius * 0.28, 0,
    cx - radius * 0.1,  cy - radius * 0.1,  radius * 0.6
  );
  hGrad.addColorStop(0, 'rgba(255,255,255,0.45)');
  hGrad.addColorStop(1, 'rgba(255,255,255,0)');

  ctx.beginPath();
  ctx.arc(cx, cy, radius * 0.85, 0, Math.PI * 2);
  ctx.fillStyle = hGrad;
  ctx.fill();

  // King crown
  if (isKing) {
    ctx.save();
    ctx.translate(cx, cy);
    const cr = radius * 0.42;

    // Crown base
    ctx.fillStyle = isRed ? '#fcd34d' : '#d4af37';
    ctx.strokeStyle = isRed ? '#92400e' : '#78350f';
    ctx.lineWidth = 1.5;

    ctx.beginPath();
    ctx.moveTo(-cr, cr * 0.4);
    ctx.lineTo(-cr * 0.9, -cr * 0.1);
    ctx.lineTo(-cr * 0.4, cr * 0.3);
    ctx.lineTo(0, -cr * 0.6);
    ctx.lineTo(cr * 0.4, cr * 0.3);
    ctx.lineTo(cr * 0.9, -cr * 0.1);
    ctx.lineTo(cr, cr * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Crown gems
    ctx.fillStyle = isRed ? '#dc2626' : '#1c1917';
    [-cr * 0.5, 0, cr * 0.5].forEach(x => {
      ctx.beginPath();
      ctx.arc(x, cr * 0.1, cr * 0.12, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.restore();
  }
}

// ════════════════════════════════════════════════════════
//  DRAWING - OVERLAY (highlights, valid moves)
// ════════════════════════════════════════════════════════
function drawOverlay() {
  oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  const cs = CELL_SIZE;

  // Selected cell
  if (selectedCell) {
    const [r, c] = selectedCell;
    oCtx.fillStyle = 'rgba(250, 204, 21, 0.45)';
    oCtx.fillRect(c * cs, r * cs, cs, cs);
    // Border glow
    oCtx.strokeStyle = 'rgba(250, 204, 21, 0.9)';
    oCtx.lineWidth = 3;
    oCtx.strokeRect(c * cs + 1.5, r * cs + 1.5, cs - 3, cs - 3);
  }

  // Valid move targets
  validMoves.forEach(m => {
    const [, , tr, tc] = m;
    const cx = tc * cs + cs / 2;
    const cy = tr * cs + cs / 2;

    // Dot indicator
    oCtx.beginPath();
    oCtx.arc(cx, cy, cs * 0.18, 0, Math.PI * 2);
    oCtx.fillStyle = 'rgba(34, 197, 94, 0.75)';
    oCtx.fill();
    oCtx.strokeStyle = 'rgba(34, 197, 94, 1)';
    oCtx.lineWidth = 2;
    oCtx.stroke();
  });

  // Must-jump indicators (pulse on pieces that must jump)
  if (mustJumps.length > 0 && !selectedCell) {
    const cells = new Set(mustJumps.map(m => `${m[0]},${m[1]}`));
    cells.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      oCtx.strokeStyle = 'rgba(250, 204, 21, 0.7)';
      oCtx.lineWidth = 3;
      oCtx.strokeRect(c * cs + 1.5, r * cs + 1.5, cs - 3, cs - 3);
    });
  }
}

// ════════════════════════════════════════════════════════
//  GAME LOGIC - MOVE GENERATION
// ════════════════════════════════════════════════════════
function isRed(p)   { return p === RED   || p === RED_KING; }
function isBlack(p) { return p === BLACK || p === BLACK_KING; }
function isKing(p)  { return p === RED_KING || p === BLACK_KING; }
function isEmpty(r, c) { return r >= 0 && r < 8 && c >= 0 && c < 8 && board[r][c] === EMPTY; }
function isEnemy(piece, r, c) {
  if (r < 0 || r >= 8 || c < 0 || c >= 8) return false;
  const t = board[r][c];
  return t !== EMPTY && (isRed(piece) ? isBlack(t) : isRed(t));
}

function getMovesForPiece(r, c, brd) {
  const piece = brd ? brd[r][c] : board[r][c];
  if (piece === EMPTY) return { steps: [], jumps: [] };

  const dirs = [];
  if (isRed(piece) || isKing(piece)) dirs.push([-1, -1], [-1, 1]); // red moves up
  if (isBlack(piece) || isKing(piece)) dirs.push([1, -1], [1, 1]); // black moves down
  // For kings we need all 4 regardless
  const allDirs = isKing(piece) ? [[-1,-1],[-1,1],[1,-1],[1,1]] : dirs;

  const boardRef = brd || board;
  const steps = [], jumps = [];

  allDirs.forEach(([dr, dc]) => {
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
      if (boardRef[nr][nc] === EMPTY) {
        steps.push([r, c, nr, nc]);
      } else {
        const pr2 = r + dr*2, pc2 = c + dc*2;
        if (pr2 >= 0 && pr2 < 8 && pc2 >= 0 && pc2 < 8 && boardRef[pr2][pc2] === EMPTY) {
          const target = boardRef[nr][nc];
          const canJump = isRed(piece) ? isBlack(target) : isRed(target);
          if (canJump) jumps.push([r, c, pr2, pc2, nr, nc]); // [fr,fc,tr,tc, captured_r, captured_c]
        }
      }
    }
  });

  return { steps, jumps };
}

function getAllMoves(player, brd) {
  const b = brd || board;
  const isPlayerPiece = player === RED_PLAYER ? isRed : isBlack;
  let allSteps = [], allJumps = [];

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (isPlayerPiece(b[r][c])) {
        const { steps, jumps } = getMovesForPiece(r, c, b);
        allSteps.push(...steps);
        allJumps.push(...jumps);
      }
    }
  }

  return { steps: allSteps, jumps: allJumps };
}

function computeMoves() {
  if (!gameActive) return;
  const { steps, jumps } = getAllMoves(currentPlayer);
  mustJumps = jumps;

  if (selectedCell) {
    const [r, c] = selectedCell;
    const { steps: ps, jumps: pj } = getMovesForPiece(r, c);
    validMoves = jumps.length > 0
      ? pj.filter(m => m[0] === r && m[1] === c)
      : ps.filter(m => m[0] === r && m[1] === c);
  } else {
    validMoves = [];
  }

  drawOverlay();

  // Check game over
  if (steps.length === 0 && jumps.length === 0) {
    endGame(currentPlayer === RED_PLAYER ? BLACK_PLAYER : RED_PLAYER);
  }
}

// ════════════════════════════════════════════════════════
//  GAME LOGIC - MAKE MOVE
// ════════════════════════════════════════════════════════
function applyMove(move, brd) {
  const b = brd ? brd.map(r => [...r]) : board.map(r => [...r]);
  const [fr, fc, tr, tc] = move;
  const piece = b[fr][fc];

  b[tr][tc] = piece;
  b[fr][fc] = EMPTY;

  // Capture
  if (move.length >= 6) {
    const [,,,,cr, cc] = move;
    b[cr][cc] = EMPTY;
  }

  // Kinging
  if (piece === RED   && tr === 0) b[tr][tc] = RED_KING;
  if (piece === BLACK && tr === 7) b[tr][tc] = BLACK_KING;

  return b;
}

// ════════════════════════════════════════════════════════
//  CLICK HANDLER
// ════════════════════════════════════════════════════════
function handleClick(e) {
  if (!gameActive || animating) return;
  if (currentMode === 'bot' && currentPlayer === botColor) return;
  if (currentMode === 'online' && currentPlayer !== onlineColor) return;

  const rect = pieceCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.floor(x / CELL_SIZE);
  const row = Math.floor(y / CELL_SIZE);

  // If in multi-jump mode, only allow the chained piece
  if (multiJumpPiece) {
    const move = validMoves.find(m => m[2] === row && m[3] === col);
    if (move) {
      executeMove(move);
    }
    return;
  }

  // Clicking a valid move target
  if (selectedCell) {
    const move = validMoves.find(m => m[2] === row && m[3] === col);
    if (move) {
      executeMove(move);
      return;
    }
  }

  // Select a piece
  const piece = board[row][col];
  const isCurrentPlayer = currentPlayer === RED_PLAYER ? isRed(piece) : isBlack(piece);
  if (isCurrentPlayer) {
    // If jumps are available, only allow selecting a piece that can jump
    if (mustJumps.length > 0) {
      const canJump = mustJumps.some(m => m[0] === row && m[1] === col);
      if (!canJump) {
        SFX.invalid();
        setStatus('You must capture a piece!');
        return;
      }
    }
    SFX.select();
    selectedCell = [row, col];
    computeMoves();
    setStatus('');
  } else if (piece !== EMPTY) {
    SFX.invalid();
    setStatus("That's not your piece.");
  }
}

// ════════════════════════════════════════════════════════
//  EXECUTE MOVE WITH ANIMATION
// ════════════════════════════════════════════════════════
function executeMove(move) {
  if (currentMode === 'online' && currentPlayer === onlineColor && window.LobbySDK) {
    window.LobbySDK.send({ type:'move', move });
  }
  animating = true;
  const [fr, fc, tr, tc] = move;
  const piece = board[fr][fc];
  const isJump = move.length >= 6;
  if (isJump) SFX.capture(); else SFX.move();

  // Animate piece sliding
  animatePieceMove(fr, fc, tr, tc, piece, () => {
    // Apply the move
    if (isJump) {
      const [,,,,cr, cc] = move;
      board[cr][cc] = EMPTY;
      // Count capture
      if (isRed(piece)) capturedBlack++;
      else capturedRed++;
      updateCapturedDisplay();
    }

    board[tr][tc] = piece;
    board[fr][fc] = EMPTY;

    // Kinging
    let kinged = false;
    if (piece === RED && tr === 0)   { board[tr][tc] = RED_KING;   kinged = true; }
    if (piece === BLACK && tr === 7) { board[tr][tc] = BLACK_KING; kinged = true; }

    if (kinged) {
      SFX.king();
      animateKing(tr, tc);
      if (window.GameSDK && GameSDK.gameId) GameSDK.unlockAchievement('king_me', 'King Me');
    }

    drawPieces();
    updateUI();

    // Check for multi-jump
    if (isJump && !kinged) {
      const { jumps: nextJumps } = getMovesForPiece(tr, tc);
      if (nextJumps.length > 0) {
        // Multi-jump!
        multiJumpCount++;
        selectedCell = [tr, tc];
        validMoves = nextJumps;
        multiJumpPiece = [tr, tc];
        animating = false;
        drawOverlay();
        setStatus('Keep jumping!');
        return;
      }
    }

    // Chain reaction achievement: 3+ captures in one turn (multiJumpCount starts at 0, first jump = 1 after increment above would miss it — count the initial jump too)
    const totalJumpsThisTurn = isJump ? multiJumpCount + 1 : 0;
    if (totalJumpsThisTurn >= 3 && window.GameSDK && GameSDK.gameId) {
      GameSDK.unlockAchievement('chain_jump', 'Chain Reaction');
    }
    multiJumpCount = 0;
    multiJumpPiece = null;
    selectedCell = null;
    validMoves = [];

    animating = false;
    switchTurn();
  });
}

function animatePieceMove(fr, fc, tr, tc, piece, callback) {
  const cs = CELL_SIZE;
  const startX = fc * cs + cs/2;
  const startY = fr * cs + cs/2;
  const endX   = tc * cs + cs/2;
  const endY   = tr * cs + cs/2;

  const duration = 250;
  const start = performance.now();

  // Draw all pieces except moving one
  drawPieces([[fr, fc]]);
  drawOverlay();

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic

    const cx = startX + (endX - startX) * ease;
    const cy = startY + (endY - startY) * ease;

    // Clear anim layer (use piece canvas as animation layer)
    pCtx.clearRect(0, 0, pieceCanvas.width, pieceCanvas.height);
    // Redraw static pieces
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        if (r === fr && c === fc) continue;
        const p = board[r][c];
        if (p !== EMPTY) drawPiece(pCtx, r, c, p, 1.0);
      }
    }

    // Draw moving piece with slight elevation effect
    const scale = 1 + Math.sin(t * Math.PI) * 0.12;
    pCtx.save();
    pCtx.translate(cx, cy);
    pCtx.scale(scale, scale);
    pCtx.translate(-cx, -cy);
    drawPieceAt(pCtx, cx, cy, piece, cs * 0.38 * scale);
    pCtx.restore();

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      callback();
    }
  }

  requestAnimationFrame(frame);
}

function drawPieceAt(ctx, cx, cy, piece, radius) {
  const isRd  = piece === RED   || piece === RED_KING;
  const isKg  = piece === RED_KING || piece === BLACK_KING;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur  = 16;
  ctx.shadowOffsetY = 6;

  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = isRd ? '#7f1d1d' : '#0c0a09';
  ctx.fill();
  ctx.restore();

  const bodyGrad = ctx.createRadialGradient(cx - radius*0.3, cy - radius*0.3, radius*0.05, cx, cy, radius*0.95);
  if (isRd) {
    bodyGrad.addColorStop(0, '#fca5a5');
    bodyGrad.addColorStop(0.3, '#ef4444');
    bodyGrad.addColorStop(1, '#991b1b');
  } else {
    bodyGrad.addColorStop(0, '#78716c');
    bodyGrad.addColorStop(0.3, '#44403c');
    bodyGrad.addColorStop(1, '#1c1917');
  }

  ctx.beginPath();
  ctx.arc(cx, cy, radius * 0.9, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  const hGrad = ctx.createRadialGradient(cx-radius*0.28, cy-radius*0.28, 0, cx-radius*0.1, cy-radius*0.1, radius*0.6);
  hGrad.addColorStop(0, 'rgba(255,255,255,0.45)');
  hGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, radius*0.85, 0, Math.PI*2);
  ctx.fillStyle = hGrad;
  ctx.fill();

  if (isKg) {
    const cr = radius * 0.42;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = isRd ? '#fcd34d' : '#d4af37';
    ctx.strokeStyle = '#78350f';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-cr, cr*0.4);
    ctx.lineTo(-cr*0.9, -cr*0.1);
    ctx.lineTo(-cr*0.4, cr*0.3);
    ctx.lineTo(0, -cr*0.6);
    ctx.lineTo(cr*0.4, cr*0.3);
    ctx.lineTo(cr*0.9, -cr*0.1);
    ctx.lineTo(cr, cr*0.4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = isRd ? '#dc2626' : '#1c1917';
    [-cr*0.5, 0, cr*0.5].forEach(x => {
      ctx.beginPath(); ctx.arc(x, cr*0.1, cr*0.12, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }
}

function animateKing(r, c) {
  const cs = CELL_SIZE;
  const cx = c * cs + cs/2;
  const cy = r * cs + cs/2;
  const piece = board[r][c];

  let scale = 1;
  const frames = 20;
  let f = 0;

  function pulse() {
    if (f >= frames) { drawPieces(); return; }
    const t = f / frames;
    scale = 1 + 0.3 * Math.sin(t * Math.PI);

    pCtx.clearRect(c*cs, r*cs, cs, cs);
    pCtx.save();
    pCtx.translate(cx, cy);
    pCtx.scale(scale, scale);
    pCtx.translate(-cx, -cy);
    drawPieceAt(pCtx, cx, cy, piece, cs * 0.38);
    pCtx.restore();

    f++;
    requestAnimationFrame(pulse);
  }

  requestAnimationFrame(pulse);
  setStatus('👑 Kinged!');
  setTimeout(() => setStatus(''), 1500);
}

// ════════════════════════════════════════════════════════
//  TURN MANAGEMENT
// ════════════════════════════════════════════════════════
function switchTurn() {
  currentPlayer = currentPlayer === RED_PLAYER ? BLACK_PLAYER : RED_PLAYER;
  updateUI();
  computeMoves();

  if (currentMode === 'bot' && currentPlayer === botColor && gameActive) {
    setTimeout(runBot, 500);
  }
}

function updateUI() {
  // Active cards
  document.getElementById('card-red').classList.toggle('active', currentPlayer === RED_PLAYER);
  document.getElementById('card-black').classList.toggle('active', currentPlayer === BLACK_PLAYER);

  // Turn indicator
  const name = currentMode === 'bot'
    ? (currentPlayer === RED_PLAYER ? "Your Turn" : "Bot Thinking...")
    : (currentPlayer === RED_PLAYER ? "Red's Turn" : "Black's Turn");
  document.getElementById('turnIndicator').textContent = name;

  // Piece counts
  let rc = 0, bc = 0;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++) {
      if (isRed(board[r][c])) rc++;
      if (isBlack(board[r][c])) bc++;
    }
  document.getElementById('count-red').textContent   = `${rc} piece${rc!==1?'s':''}`;
  document.getElementById('count-black').textContent = `${bc} piece${bc!==1?'s':''}`;

  // Bot thinking indicator
  const showThinking = currentMode === 'bot' && currentPlayer === botColor;
  document.getElementById('thinkingDots').classList.toggle('visible', showThinking);
  document.getElementById('statusMsg').style.display = showThinking ? 'none' : 'block';
}

function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

function updateCapturedDisplay() {
  const row = document.getElementById('capturedRow');
  row.innerHTML = '<span class="cap-label">Captured:</span>';

  for (let i = 0; i < capturedBlack; i++) {
    const d = document.createElement('div');
    d.className = 'cap-piece black';
    row.appendChild(d);
  }
  for (let i = 0; i < capturedRed; i++) {
    const d = document.createElement('div');
    d.className = 'cap-piece red';
    row.appendChild(d);
  }
}

function endGame(winner) {
  gameActive = false;
  if (currentMode === 'bot') { if (winner === RED_PLAYER) SFX.win(); else SFX.lose(); }
  else SFX.win();

  // ── GameSDK reporting ──────────────────────────────────────────
  if (window.GameSDK && GameSDK.gameId) {
    GameSDK.incrementStat('total_games');
    GameSDK.incrementStat('pieces_captured', capturedRed + capturedBlack);
    GameSDK.unlockAchievement('first_game', 'Opening Move');

    if (currentMode === 'bot' && winner === RED_PLAYER) {
      GameSDK.incrementStat('bot_wins');
      GameSDK.unlockAchievement('first_bot_win', 'Outsmarted');
      if (difficulty === 'hard') GameSDK.unlockAchievement('hard_bot_win', 'Grand Master');
    }
    if (currentMode === 'local') {
      GameSDK.unlockAchievement('first_local_win', 'Champion');
    }
    // Clean sweep: winner took all 12
    const loserPieceCount = winner === RED_PLAYER ? capturedBlack : capturedRed;
    if (loserPieceCount >= 12) GameSDK.unlockAchievement('clean_sweep', 'Clean Sweep');
    const winnerPiecesLost = winner === RED_PLAYER ? capturedRed : capturedBlack;
    if (winnerPiecesLost <= 8) GameSDK.unlockAchievement('flawless', 'Flawless');
  }

  const ov = document.getElementById('winOverlay');
  const wt = document.getElementById('winText');
  const ws = document.getElementById('winSub');

  if (currentMode === 'bot') {
    if ((winner === RED_PLAYER)) {
      wt.textContent = '🎉 You Win!';
      ws.textContent = 'Congratulations! You defeated the bot.';
    } else {
      wt.textContent = '🤖 Bot Wins';
      ws.textContent = 'Better luck next time!';
    }
  } else {
    wt.textContent = `${winner === RED_PLAYER ? 'Red' : 'Black'} Wins! 🏆`;
    ws.textContent = `${winner === RED_PLAYER ? 'Black' : 'Red'} has no more moves.`;
  }

  ov.style.display = 'flex';
}

// ════════════════════════════════════════════════════════
//  BOT AI - MINIMAX WITH ALPHA-BETA
// ════════════════════════════════════════════════════════
function boardScore(brd) {
  let score = 0;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = brd[r][c];
      if (p === EMPTY) continue;

      let val = 0;
      const isRd = isRed(p);
      const isKg = isKing(p);

      val += isKg ? 3.5 : 1;

      // Positional bonus
      if (!isKg) {
        const advancement = isRd ? (7 - r) : r;
        val += advancement * 0.05;
      }

      // Center control
      const dc = Math.abs(c - 3.5);
      val += (3.5 - dc) * 0.04;

      // Edge penalty (kings)
      if (isKg && (c === 0 || c === 7)) val -= 0.15;

      // Back row bonus (defensive)
      if (!isKg && ((isRd && r === 7) || (!isRd && r === 0))) val += 0.2;

      score += isRd ? -val : val;
    }
  }
  return score;
}

function minimax(brd, depth, alpha, beta, maximizing) {
  const player = maximizing ? BLACK_PLAYER : RED_PLAYER;
  const { steps, jumps } = getAllMoves(player, brd);
  const moves = jumps.length > 0 ? jumps : steps;

  if (depth === 0 || moves.length === 0) {
    return { score: boardScore(brd), move: null };
  }

  let best = { score: maximizing ? -Infinity : Infinity, move: null };

  for (const move of moves) {
    const nb = applyMove(move, brd);
    // Multi-jump: same player moves again
    let score;
    if (jumps.length > 0) {
      const [,,tr,tc,,] = move;
      const { jumps: nextJumps } = getMovesForPiece(tr, tc, nb);
      if (nextJumps.length > 0 && nb[tr][tc] !== (maximizing ? BLACK_KING : RED_KING)) {
        // Continue multi-jump (simplified: pick best continuation)
        const cont = minimax(nb, depth, alpha, beta, maximizing);
        score = cont.score;
      } else {
        score = minimax(nb, depth - 1, alpha, beta, !maximizing).score;
      }
    } else {
      score = minimax(nb, depth - 1, alpha, beta, !maximizing).score;
    }

    if (maximizing ? score > best.score : score < best.score) {
      best = { score, move };
    }

    if (maximizing) alpha = Math.max(alpha, score);
    else            beta  = Math.min(beta,  score);
    if (beta <= alpha) break;
  }

  return best;
}

function runBot() {
  if (!gameActive) return;

  const depths = { easy: 2, medium: 4, hard: 6 };
  const depth = depths[difficulty] || 4;

  // Add slight jitter for easy mode
  const { steps, jumps } = getAllMoves(botColor);
  const moves = jumps.length > 0 ? jumps : steps;
  if (moves.length === 0) return;

  let chosen;
  if (difficulty === 'easy' && Math.random() < 0.35) {
    chosen = moves[Math.floor(Math.random() * moves.length)];
  } else {
    const result = minimax(board, depth, -Infinity, Infinity, true);
    chosen = result.move || moves[0];
  }

  selectedCell = [chosen[0], chosen[1]];
  validMoves = [chosen];
  drawOverlay();

  setTimeout(() => {
    executeMove(chosen);
  }, 300);
}

window.addEventListener('resize', () => {
  if (document.getElementById('game').style.display !== 'none') {
    setupCanvases();
    drawBoard();
    drawPieces();
    drawOverlay();
  }
});

showMenu();
</script>

<!-- EXIT GAME CONFIRM (launcher) -->
<div id="gl-exit-confirm" style="display:none">
  <div class="glx-panel">
    <div class="glx-title">Exit Game?</div>
    <div class="glx-body">Leave the board and return to the launcher?</div>
    <div class="glx-row">
      <button id="gl-exit-no" class="btn" style="flex:1;background:rgba(255,255,255,0.06);color:#d1d5db;border:1px solid rgba(255,255,255,0.15);padding:12px;">Cancel</button>
      <button id="gl-exit-yes" class="btn" style="flex:1;background:linear-gradient(135deg,#dc2626,#991b1b);color:white;padding:12px;">Exit</button>
    </div>
  </div>
</div>
<script>
(function(){
  function init(){
    var btn = document.getElementById('gl-exit-btn'),
        ov  = document.getElementById('gl-exit-confirm'),
        yes = document.getElementById('gl-exit-yes'),
        no  = document.getElementById('gl-exit-no');
    if(!btn || !ov || !yes || !no) return;
    function show(){ ov.style.display='flex'; }
    function hide(){ ov.style.display='none'; }
    btn.addEventListener('click', show);
    no.addEventListener('click', hide);
    yes.addEventListener('click', function(){ window.close(); });
    document.addEventListener('keydown', function(e){
      if(e.key==='Escape' && ov.style.display!=='none'){ e.stopPropagation(); hide(); }
    }, true);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
