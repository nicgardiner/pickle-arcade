<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0f;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    user-select: none;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 90px; height: 90px;
    margin-bottom: 28px;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    animation: spin 1.4s linear infinite;
  }
  .ring1 {
    border-top-color: #10b981;
    animation-duration: 1.4s;
  }
  .ring2 {
    inset: 12px;
    border-top-color: #6ee7b7;
    animation-duration: 1.0s;
    animation-direction: reverse;
  }
  .ring3 {
    inset: 24px;
    border-top-color: #10b981;
    animation-duration: 0.7s;
  }

  .dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    top: -1px; left: 50%;
    transform: translateX(-50%);
  }
  .dot1 { background: #10b981; }
  .dot2 { background: #6ee7b7; }
  .dot3 { background: #10b981; }

  .core {
    position: absolute;
    inset: 33px;
    border-radius: 50%;
    background: radial-gradient(circle, #10b981 0%, #065f46 60%, #0a0a0f 100%);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; transform: scale(0.95); }
    50%       { opacity: 1;   transform: scale(1.05); }
  }

  .logo {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 8px;
  }
  .logo span { color: #10b981; }

  .sub {
    font-size: 11px;
    letter-spacing: 6px;
    color: #6ee7b7;
    opacity: 0.7;
    text-transform: uppercase;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 0.9; }
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="ring ring1"><div class="dot dot1"></div></div>
    <div class="ring ring2"><div class="dot dot2"></div></div>
    <div class="ring ring3"><div class="dot dot3"></div></div>
    <div class="core"></div>
  </div>
  <div class="logo">🥒 <span>PICKLE</span> ARCADE</div>
  <div class="sub">LOADING</div>
</body>
</html>
