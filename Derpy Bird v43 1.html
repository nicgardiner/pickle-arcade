<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Derpy Bird</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:linear-gradient(180deg,#87ceeb 0%,#b0e0ff 35%,#e0f4ff 60%,#c8e8a0 85%,#7ab648 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial,sans-serif;overflow:hidden;user-select:none;}
  canvas{border:3px solid #00ced1;border-radius:8px;box-shadow:0 0 30px rgba(0,206,209,0.4);cursor:pointer;}
  #score-display{color:#00ced1;font-size:18px;margin-bottom:10px;letter-spacing:2px;text-shadow:0 0 10px rgba(0,206,209,0.6);}
  #hint{display:none;}
</style>
</head>
<body>
<div id="score-display">SCORE: <span id="score">0</span> &nbsp;|&nbsp; BEST: <span id="best">0</span> &nbsp;|&nbsp; coins: <span id="coins">0</span></div>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<div id="hint">ESC or P to pause</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),coinsEl=document.getElementById('coins');

// ── Helpers ───────────────────────────────────────────────────────────────────
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
function fillRR(x,y,w,h,r,c){ctx.fillStyle=c;ctx.beginPath();rr(x,y,w,h,r);ctx.fill();}
function strokeRR(x,y,w,h,r,c,lw){ctx.strokeStyle=c;ctx.lineWidth=lw||1.5;ctx.beginPath();rr(x,y,w,h,r);ctx.stroke();}

// ── Audio ─────────────────────────────────────────────────────────────────────
let musicVolume=0.05,sfxVolume=0.5;
const SFX_BASE=0.05;
const AC=window.AudioContext||window.webkitAudioContext;
let audioCtx=null,masterGain=null,sfxGainNode=null,musicOn=true,lofiNodes=null;
let lofiScheduler=null,nextBarTime=0,currentChord=0;
const BPM=72,BEAT=60/BPM,BAR=BEAT*4;
const CHORD_ROOTS=[261.63,220.00,174.61,196.00];
const CHORD_TYPES=[[1,5/4,3/2,15/8],[1,6/5,3/2,9/5],[1,5/4,3/2,15/8],[1,5/4,3/2,7/4]];
// Hell mode dark music
const DARK_BPM=55,DARK_BEAT=60/DARK_BPM,DARK_BAR=DARK_BEAT*4;
const DARK_ROOTS=[65.41,55.00,43.65,49.00]; // C2,A1,F1,G1 — deep & ominous
const DARK_CHORDS=[[1,6/5,3/2,9/5],[1,6/5,17/12,9/5],[1,6/5,3/2,16/9],[1,6/5,17/12,16/9]];
let hellMusicActive=false;
function getAC(){if(!audioCtx)audioCtx=new AC();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function startLofi(){
  const ac=getAC();if(lofiNodes)return;
  masterGain=ac.createGain();masterGain.gain.value=musicVolume;
  const cg=ac.createGain();cg.gain.value=0.018;
  const nb=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate);const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  const crackle=ac.createBufferSource();crackle.buffer=nb;crackle.loop=true;
  const clp=ac.createBiquadFilter();clp.type='lowpass';clp.frequency.value=800;
  crackle.connect(clp);clp.connect(cg);cg.connect(masterGain);crackle.start();
  const mlp=ac.createBiquadFilter();mlp.type='lowpass';mlp.frequency.value=3200;mlp.Q.value=0.7;
  masterGain.connect(mlp);mlp.connect(ac.destination);
  const rg=ac.createGain();rg.gain.value=0.18;const conv=ac.createConvolver();
  const irLen=ac.sampleRate*1.5;const irBuf=ac.createBuffer(2,irLen,ac.sampleRate);
  for(let c=0;c<2;c++){const d=irBuf.getChannelData(c);for(let i=0;i<irLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/irLen,2.5);}
  conv.buffer=irBuf;masterGain.connect(conv);conv.connect(rg);rg.connect(mlp);
  sfxGainNode=ac.createGain();sfxGainNode.gain.value=sfxVolume;sfxGainNode.connect(ac.destination);
  lofiNodes={crackle,masterGain,masterLP:mlp};nextBarTime=ac.currentTime+0.1;currentChord=0;scheduleBar();
}
function scheduleBar(){
  const ac=audioCtx,t=nextBarTime,ch=currentChord;
  if(hellMusicActive){
    playDarkPad(t,ch);playDarkBass(t,ch);
    for(let b=0;b<4;b++){const bt=t+b*DARK_BEAT;playHellKick(bt);if(b===1||b===3)playHellSnare(bt);}
    currentChord=(currentChord+1)%4;nextBarTime+=DARK_BAR;
  } else {
    playChordPad(t,ch);playBass(t,ch);
    for(let b=0;b<4;b++){const bt=t+b*BEAT;if(b===0||b===2)playKick(bt);if(b===1||b===3)playSnare(bt);playHat(bt);playHat(bt+BEAT*0.5+(b%2===0?0.02:0));}
    currentChord=(currentChord+1)%4;nextBarTime+=BAR;
  }
  lofiScheduler=setTimeout(scheduleBar,(nextBarTime-ac.currentTime-0.1)*1000);
}
function playChordPad(st,ci){
  const ac=audioCtx,root=CHORD_ROOTS[ci];
  CHORD_TYPES[ci].forEach((ratio,i)=>{const osc=ac.createOscillator(),g=ac.createGain();osc.type='triangle';osc.frequency.value=root*ratio*(1+(Math.random()-0.5)*0.003);osc.detune.value=(Math.random()-0.5)*8;const v=0.055-i*0.006;g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(v,st+0.15);g.gain.setValueAtTime(v,st+BAR-0.3);g.gain.linearRampToValueAtTime(0,st+BAR+0.1);osc.connect(g);g.connect(masterGain);osc.start(st);osc.stop(st+BAR+0.15);});
}
function playBass(st,ci){
  const ac=audioCtx,root=CHORD_ROOTS[ci]/2;
  [[0,root],[BEAT*1.5,root*1.5],[BEAT*2.5,root],[BEAT*3,root*1.25]].forEach(([off,freq])=>{const osc=ac.createOscillator(),g=ac.createGain();osc.type='sine';osc.frequency.value=freq;const t=st+off;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.14,t+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);osc.connect(g);g.connect(masterGain);osc.start(t);osc.stop(t+0.4);});
}
function playKick(t){const ac=audioCtx,osc=ac.createOscillator(),g=ac.createGain();osc.type='sine';osc.frequency.setValueAtTime(160,t);osc.frequency.exponentialRampToValueAtTime(40,t+0.08);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.5,t+0.005);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);osc.connect(g);g.connect(masterGain);osc.start(t);osc.stop(t+0.25);}
function playSnare(t){const ac=audioCtx,bufLen=ac.sampleRate*0.15,buf=ac.createBuffer(1,bufLen,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<bufLen;i++)d[i]=Math.random()*2-1;const src=ac.createBufferSource();src.buffer=buf;const g=ac.createGain(),hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.005);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);src.connect(hp);hp.connect(g);g.connect(masterGain);src.start(t);src.stop(t+0.16);const body=ac.createOscillator(),bg=ac.createGain();body.type='triangle';body.frequency.value=200;bg.gain.setValueAtTime(0,t);bg.gain.linearRampToValueAtTime(0.08,t+0.005);bg.gain.exponentialRampToValueAtTime(0.001,t+0.09);body.connect(bg);bg.connect(masterGain);body.start(t);body.stop(t+0.12);}
function playHat(t){const ac=audioCtx,bufLen=ac.sampleRate*0.05,buf=ac.createBuffer(1,bufLen,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<bufLen;i++)d[i]=Math.random()*2-1;const src=ac.createBufferSource();src.buffer=buf;const g=ac.createGain(),hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=7000;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.003);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);src.connect(hp);hp.connect(g);g.connect(masterGain);src.start(t);src.stop(t+0.06);}
function playDarkPad(st,ci){
  const ac=audioCtx,root=DARK_ROOTS[ci];
  DARK_CHORDS[ci].forEach((ratio,i)=>{
    const osc=ac.createOscillator(),g=ac.createGain();
    osc.type='square';osc.frequency.value=root*ratio*(1+(Math.random()-0.5)*0.004);
    const v=(0.04-i*0.007)*0.6;
    g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(v,st+0.3);
    g.gain.setValueAtTime(v,st+DARK_BAR-0.4);g.gain.linearRampToValueAtTime(0,st+DARK_BAR+0.1);
    const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600+i*80;
    osc.connect(lp);lp.connect(g);g.connect(masterGain);osc.start(st);osc.stop(st+DARK_BAR+0.2);
  });
  // Low drone
  const drone=ac.createOscillator(),dg=ac.createGain();
  drone.type='sawtooth';drone.frequency.value=DARK_ROOTS[ci]/2;
  drone.detune.value=(Math.random()-0.5)*4;
  dg.gain.setValueAtTime(0.06,st);dg.gain.setValueAtTime(0.06,st+DARK_BAR);dg.gain.linearRampToValueAtTime(0,st+DARK_BAR+0.05);
  const dlp=ac.createBiquadFilter();dlp.type='lowpass';dlp.frequency.value=200;
  drone.connect(dlp);dlp.connect(dg);dg.connect(masterGain);drone.start(st);drone.stop(st+DARK_BAR+0.1);
}
function playDarkBass(st,ci){
  const ac=audioCtx,root=DARK_ROOTS[ci];
  [[0,root],[DARK_BEAT,root*3/2],[DARK_BEAT*2,root],[DARK_BEAT*3,root*DARK_CHORDS[ci][1]]].forEach(([off,freq])=>{
    const osc=ac.createOscillator(),g=ac.createGain();
    osc.type='sawtooth';osc.frequency.value=freq;
    const t=st+off;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.06);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=300;
    osc.connect(lp);lp.connect(g);g.connect(masterGain);osc.start(t);osc.stop(t+0.6);
  });
}
function playHellKick(t){
  const ac=audioCtx,osc=ac.createOscillator(),g=ac.createGain();
  osc.type='sine';osc.frequency.setValueAtTime(120,t);osc.frequency.exponentialRampToValueAtTime(28,t+0.15);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.9,t+0.005);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  osc.connect(g);g.connect(masterGain);osc.start(t);osc.stop(t+0.45);
}
function playHellSnare(t){
  const ac=audioCtx,bufLen=ac.sampleRate*0.25,buf=ac.createBuffer(1,bufLen,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<bufLen;i++)d[i]=Math.random()*2-1;
  const src=ac.createBufferSource();src.buffer=buf;
  const g=ac.createGain(),lp=ac.createBiquadFilter();
  lp.type='lowpass';lp.frequency.value=1200;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.008);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  src.connect(lp);lp.connect(g);g.connect(masterGain);src.start(t);src.stop(t+0.26);
  // Deep body thud
  const body=ac.createOscillator(),bg=ac.createGain();
  body.type='sine';body.frequency.value=80;
  bg.gain.setValueAtTime(0,t);bg.gain.linearRampToValueAtTime(0.2,t+0.005);bg.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  body.connect(bg);bg.connect(masterGain);body.start(t);body.stop(t+0.18);
}
function makeDemonicLaugh(){
  const ac=getAC(),now=ac.currentTime,vol=sfxVolume*0.35;
  for(let h=0;h<3;h++){
    const t=now+h*0.11;
    const osc=ac.createOscillator(),g=ac.createGain(),dist=ac.createWaveShaper();
    const n=256,curve=new Float32Array(n);
    for(let i=0;i<n;i++){const x=(i*2)/n-1;curve[i]=Math.tanh(x*7)*0.55;}
    dist.curve=curve;
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(88+h*8,t);
    osc.frequency.linearRampToValueAtTime(130+h*6,t+0.04);
    osc.frequency.linearRampToValueAtTime(72+h*6,t+0.09);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.linearRampToValueAtTime(0,t+0.1);
    osc.connect(dist);dist.connect(g);g.connect(ac.destination);
    osc.start(t);osc.stop(t+0.12);
  }
}
function checkMusicMode(){
  const shouldBeHell=typeof isHellMode==='function'&&isHellMode();
  if(shouldBeHell===hellMusicActive)return;
  hellMusicActive=shouldBeHell;
  if(lofiNodes){stopLofi();if(musicOn){setTimeout(()=>{startLofi();},100);}}
}
function stopLofi(){if(lofiScheduler)clearTimeout(lofiScheduler);lofiScheduler=null;if(lofiNodes){try{lofiNodes.crackle.stop();}catch(e){}try{lofiNodes.masterGain.disconnect();}catch(e){}try{lofiNodes.masterLP.disconnect();}catch(e){}}lofiNodes=null;masterGain=null;}

function loadUwuBuffer(){
  if(uwuBuffer||!audioCtx)return;
  const raw=atob(UWU_B64),bytes=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
  audioCtx.decodeAudioData(bytes.buffer).then(buf=>{uwuBuffer=buf;}).catch(()=>{});
}
function makeQuack(){
  const ac=getAC(),now=ac.currentTime,vol=SFX_BASE*sfxVolume;
  if(typeof isHellMode==='function'&&isHellMode()){makeDemonicLaugh();return;}
  const uwuMode=equippedItem&&equippedItem.id==='catphones'&&equippedTrail&&equippedTrail.id==='trail_rainbow';
  if(uwuMode){
    loadUwuBuffer();
    if(uwuBuffer){
      const src=ac.createBufferSource(),g=ac.createGain();
      src.buffer=uwuBuffer;g.gain.value=sfxVolume;
      src.connect(g);g.connect(ac.destination);src.start(now);
    }
    return;
  }
  function qt(freq,off,dur){const osc=ac.createOscillator(),bp=ac.createBiquadFilter(),g=ac.createGain();bp.type='bandpass';bp.frequency.value=freq;bp.Q.value=6;osc.type='sine';osc.frequency.setValueAtTime(freq*0.85,now+off);osc.frequency.linearRampToValueAtTime(freq*1.3,now+off+0.04);osc.frequency.exponentialRampToValueAtTime(freq*0.92,now+off+dur);g.gain.setValueAtTime(0,now+off);g.gain.linearRampToValueAtTime(vol,now+off+0.02);g.gain.setValueAtTime(vol,now+off+dur*0.5);g.gain.linearRampToValueAtTime(0,now+off+dur+0.04);osc.connect(bp);bp.connect(g);g.connect(ac.destination);osc.start(now+off);osc.stop(now+off+dur+0.06);}
  qt(520,0,0.14);qt(480,0.15,0.12);
}

// ── Durable save helpers ──────────────────────────────────────────────────
// Progression (coins, owned/equipped items & skins, discovered combos) routes
// through the launcher's durable save so it survives reinstalls. Falls back to
// plain localStorage when opened directly in a browser (no launcher / GameSDK).
// One-time migration: if the durable blob is empty, read any legacy db_save /
// db_combos keys so existing local progress carries over on first run.
function _dbRead(){
  if(window.GameSDK){const d=GameSDK.loadGameData();if(d&&Object.keys(d).length)return d;}
  try{
    const raw=localStorage.getItem('db_save');
    const data=raw?JSON.parse(raw):{};
    if(data.combos==null){try{data.combos=JSON.parse(localStorage.getItem('db_combos')||'[]');}catch{data.combos=[];}}
    return data;
  }catch{return {};}
}
function _dbWrite(data){
  if(window.GameSDK){GameSDK.saveGameData(data);return;}
  try{localStorage.setItem('db_save',JSON.stringify(data));}catch{}
}
function _dbCombos(){const d=_dbRead();return Array.isArray(d.combos)?d.combos:[];}
function saveGame(){
  const prev=_dbRead();
  const data={coins,items:SHOP_ITEMS.map(i=>({id:i.id,owned:i.owned,equipped:i.equipped})),skins:SKIN_ITEMS.map(s=>({id:s.id,owned:s.owned,equipped:s.equipped})),combos:prev.combos||[]};
  _dbWrite(data);
}
function loadGame(){
  try{
    const data=_dbRead();if(!data||!Object.keys(data).length)return;
    if(data.coins!=null){coins=data.coins;coinsEl.textContent=coins;}
    if(data.items)data.items.forEach(d=>{const item=SHOP_ITEMS.find(i=>i.id===d.id);if(!item)return;item.owned=d.owned;item.equipped=d.equipped;if(d.equipped&&item.category==='hat')equippedItem=item;if(d.equipped&&item.category==='trail')equippedTrail=item;});
    if(data.skins)data.skins.forEach(d=>{const skin=SKIN_ITEMS.find(s=>s.id===d.id);if(!skin)return;skin.owned=d.owned;skin.equipped=d.equipped;if(d.equipped)equippedSkin=skin;});
  }catch(e){}
}
loadGame();
function discoverCombo(id){
  const data=_dbRead();
  const found=Array.isArray(data.combos)?data.combos:[];
  if(found.includes(id))return;
  found.push(id);
  data.combos=found;
  _dbWrite(data);
  GameSDK.setStat('secret_combos',found.length);
  GameSDK.unlockAchievement('combo_hunter','Combo Hunter');
  if(found.length>=3)GameSDK.unlockAchievement('master_alchemist','Master Alchemist');
}

function drawTrailParticles(){
  trailParticles.forEach(p=>{
    ctx.globalAlpha=p.life;
    if(p.type==='sparkle'){
      ctx.fillStyle=p.color;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.twinkle||0);ctx.beginPath();
      for(let s=0;s<4;s++){const a=s*Math.PI/2,ra=(s+0.5)*Math.PI/2;if(s===0)ctx.moveTo(Math.cos(a)*p.size,Math.sin(a)*p.size);else ctx.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size);ctx.lineTo(Math.cos(ra)*p.size*0.35,Math.sin(ra)*p.size*0.35);}
      ctx.closePath();ctx.fill();ctx.restore();
    } else if(p.type==='rainbow_band'){
      ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y-p.h/2,p.w,p.h);
    } else if(p.type==='nyan_streak'){
      // Solid horizontal bar that fades — Nyan cat style
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x-200*p.life, p.y-p.h/2, 200*p.life, p.h);
    } else if(p.type==='galaxy_streak'){
      const grad=ctx.createLinearGradient(p.x,p.y,p.x+p.len,p.y);

    } else if(p.type==='galaxy_star'){
      const s=p.size*(0.6+0.4*Math.sin(p.twinkle));ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;

      for(let i=0;i<4;i++){const a=i*Math.PI/2,ra=a+Math.PI/4;if(i===0)ctx.moveTo(Math.cos(a)*s,Math.sin(a)*s);else ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);ctx.lineTo(Math.cos(ra)*s*0.3,Math.sin(ra)*s*0.3);}

      ctx.shadowColor=p.color;ctx.shadowBlur=12;ctx.fillStyle=p.color;

function spawnPipe(){const minY=80,maxY=canvas.height-PIPE_GAP-80;pipes.push({x:canvas.width+PIPE_WIDTH,topH:Math.random()*(maxY-minY)+minY,passed:false});}
function checkCollision(p){const br=14;if(bird.x+br>p.x&&bird.x-br<p.x+PIPE_WIDTH){if(bird.y-br<p.topH||bird.y+br>p.topH+PIPE_GAP)return true;}return false;}
function die(){
  state='dead';makeQuack();
  GameSDK.setStat('best_score',score,true);
  GameSDK.incrementStat('total_runs');
  GameSDK.incrementStat('total_coins',runCoins);
  GameSDK.unlockAchievement('first_flap','First Flap');
  if(score>=10)GameSDK.unlockAchievement('score_10','Getting Good');
  if(score>=25)GameSDK.unlockAchievement('score_25','Bird Brain');
  if(score>=50)GameSDK.unlockAchievement('score_50','Derpy Legend');
  if(score>=100)GameSDK.unlockAchievement('century_bird','Century Bird');
  if(score>=250)GameSDK.unlockAchievement('score_250','Untouchable');
  const _st=GameSDK.getStats();
  if((_st.total_coins||0)>=50)GameSDK.unlockAchievement('coin_hoarder','Coin Hoarder');
  if((_st.total_runs||0)>=25)GameSDK.unlockAchievement('veteran','Veteran Birdie');
  if(isHellMode())discoverCombo('hell');
  if(isKawaiiMode())discoverCombo('kawaii');
  if(equippedItem&&equippedItem.id==='potleaf'&&equippedTrail&&equippedTrail.id==='trail_fire')discoverCombo('high');
  saveGame();
}
function update(){
  if(lofiNodes)checkMusicMode();
  clouds.forEach(c=>{c.x-=c.s;if(c.x+c.w<0)c.x=canvas.width+c.w;});
  if(cheatMsgTimer>0)cheatMsgTimer--;
  if(birdScaleTimer>0){birdScaleTimer--;}else{birdScale=1;}
  if(rainbowTimer>0){rainbowTimer--;rainbowHue=(rainbowHue+6)%360;}
  if(boobsTimer>0){
    boobsTimer--;
    boobVel+=(-boobBounce)*0.2+bird.vy*0.06;
    boobVel*=0.72;
    boobBounce+=boobVel;
    boobBounce=Math.max(-5,Math.min(5,boobBounce));
  }
  if(state!=='playing')return;
  frameCount++;bird.vy+=GRAVITY;bird.y+=bird.vy;bird.angle=Math.max(-0.5,Math.min(Math.PI/2,bird.vy*0.07));bird.wingAngle+=0.25;
  leafVel+=(-leafAngle)*0.15+bird.vy*0.005;leafVel*=0.75;leafAngle+=leafVel;leafAngle=Math.max(-0.6,Math.min(0.6,leafAngle));
  if(Math.random()<0.03)bird.eyeJitter=(Math.random()-0.5)*2;else bird.eyeJitter*=0.85;
  bird.blinkTimer++;if(bird.blinkTimer>120+Math.random()*80){bird.blinking=true;bird.blinkTimer=0;}if(bird.blinkTimer>8)bird.blinking=false;
  if(frameCount%PIPE_INTERVAL===0)spawnPipe();
  pipes.forEach(p=>{p.x-=PIPE_SPEED;if(!p.passed&&p.x+PIPE_WIDTH<bird.x){p.passed=true;score++;runCoins++;coins++;scoreEl.textContent=score;coinsEl.textContent=coins;if(score>best){best=score;bestEl.textContent=best;}}});
  pipes=pipes.filter(p=>p.x+PIPE_WIDTH>-10);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.06;});particles=particles.filter(p=>p.life>0);
  // Scroll existing trail points left with the world, then add current bird pos
  birdTrail.forEach(pt=>pt.x-=PIPE_SPEED);
  birdTrail=birdTrail.filter(pt=>pt.x>-20);
  birdTrail.push({x:bird.x,y:bird.y});
  spawnTrailParticles();updateTrailParticles();
  if(bird.y+16>canvas.height-40){die();return;}
  if(bird.y-16<0){bird.y=16;bird.vy=Math.max(0,bird.vy);}
  for(const p of pipes){if(checkCollision(p)){die();return;}}
}

      [[-Math.PI*0.5,38],[-Math.PI*0.68,32],[-Math.PI*0.32,32],[-Math.PI*0.85,24],[-Math.PI*0.15,24],[-Math.PI,18],[0,18]].forEach(([a,l])=>pf(a,l));

      ctx.beginPath(); ctx.ellipse(-18,-3,10,12,-0.1,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=PINK;
      ctx.beginPath(); ctx.ellipse(-19,-3,8,10,-0.1,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=SHELL;
      ctx.beginPath(); ctx.ellipse(-19,-3,5,7,-0.1,0,Math.PI*2); ctx.fill();

    }
    else if(id==='devilhorns'){
      ctx.shadowColor='#cc0000';ctx.shadowBlur=10;
      // Left horn — curved outward then tapers to sharp tip
      ctx.fillStyle='#cc0000';
      ctx.beginPath();
      ctx.moveTo(-5,-13);                                    // inner base
      ctx.bezierCurveTo(-2,-20,-24,-20,-17,-36);            // inner edge sweeps out then up to tip
      ctx.bezierCurveTo(-24,-26,-22,-16,-15,-13);           // outer edge curves back to base

      ctx.moveTo(-7,-15);
      ctx.bezierCurveTo(-5,-21,-21,-21,-16,-34);

}

}
function drawCloset(){
  const px=40,py=115,pw=320,ph=445;
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,canvas.width,canvas.height);
  fillRR(px,py,pw,ph,16,'rgba(8,16,36,0.97)');
  ctx.shadowColor='#00ced1';ctx.shadowBlur=10;strokeRR(px,py,pw,ph,16,'#00ced1',2);ctx.shadowBlur=0;
  ctx.fillStyle='#00ced1';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText('CLOSET',canvas.width/2,py+36);
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='12px Arial';ctx.fillText('Your owned items',canvas.width/2,py+54);
  // Tabs
  [['hat','Hats'],['trail','Trails'],['skins','Skins']].forEach(([id,label],ti)=>{
    const tx=66+ti*92,ty=py+64,tw=84,th=26,active=closetTab===id;
    fillRR(tx,ty,tw,th,8,active?'#00ced1':'rgba(255,255,255,0.08)');
    if(!active)strokeRR(tx,ty,tw,th,8,'rgba(0,206,209,0.3)',1);
    ctx.fillStyle=active?'#001a1a':'rgba(255,255,255,0.6)';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.fillText(label,tx+tw/2,ty+18);
  });
  // Close button
  ctx.shadowColor='#ff5050';ctx.shadowBlur=6;fillRR(314,py+10,34,34,8,'rgba(220,60,60,0.9)');ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.fillText('X',331,py+33);
  const startX=px+20,startY=py+102,slotW=130,slotH=100,padX=20,padY=8;
  if(closetTab==='skins'){
    const ownedSkins=SKIN_ITEMS.filter(s=>s.owned);
    const sw=50,sg=10,scols=SKIN_COLS,sx0=55,sy0=startY;
    if(ownedSkins.length===0){
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='14px Arial';ctx.textAlign='center';ctx.fillText('No skins owned yet!',canvas.width/2,py+210);
    } else {
      ownedSkins.forEach((skin,i)=>{
        const col=i%scols,row=Math.floor(i/scols);
        const sx=sx0+col*(sw+sg),sy=sy0+row*(sw+sg);
        if(sy+sw>py+ph-20)return;
        ctx.fillStyle=skin.col;ctx.beginPath();ctx.arc(sx+sw/2,sy+sw/2,sw/2-2,0,Math.PI*2);ctx.fill();
        if(skin.equipped){ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.shadowColor='#fff';ctx.shadowBlur=8;}
        else{ctx.strokeStyle='#00ced1';ctx.lineWidth=1.5;ctx.shadowBlur=0;}
        ctx.beginPath();ctx.arc(sx+sw/2,sy+sw/2,sw/2-2,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
        ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='9px Arial';ctx.textAlign='center';ctx.fillText(skin.name,sx+sw/2,sy+sw+10);
      });
    }
  } else {
    const ownedItems=SHOP_ITEMS.filter(i=>i.category===closetTab&&i.owned);
    if(ownedItems.length===0){
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='14px Arial';ctx.textAlign='center';ctx.fillText('Nothing owned yet — visit the Shop!',canvas.width/2,py+210);
    } else {
      ownedItems.slice(0,ITEMS_PER_PAGE).forEach((item,i)=>{
        const col=i%SHOP_COLS,row=Math.floor(i/SHOP_COLS),sx=startX+col*(slotW+padX),sy=startY+row*(slotH+padY);
        fillRR(sx,sy,slotW,slotH,10,item.equipped?'rgba(0,206,209,0.2)':'rgba(255,255,255,0.06)');
        strokeRR(sx,sy,slotW,slotH,10,item.equipped?'#00ced1':'rgba(255,255,255,0.2)',1.5);
        ctx.font='32px Arial';ctx.textAlign='center';ctx.fillText(item.icon,sx+slotW/2,sy+40);
        ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.fillText(item.name,sx+slotW/2,sy+60);
        ctx.fillStyle=item.equipped?'#ffd700':'#00ced1';ctx.font='bold 11px Arial';
        ctx.textAlign='center';ctx.fillText(item.equipped?'✓ EQUIPPED':'EQUIP',sx+slotW/2,sy+78);
      });
    }
  }
}
function drawConfirm(){
  if(!confirmItem)return;
  const item=confirmItem;
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,canvas.width,canvas.height);
  const bx=60,by=210,bw=280,bh=170;
  fillRR(bx,by,bw,bh,14,'rgba(8,16,36,0.98)');
  ctx.shadowColor='#ffd700';ctx.shadowBlur=12;strokeRR(bx,by,bw,bh,14,'#ffd700',2);ctx.shadowBlur=0;
  ctx.font='22px Arial';ctx.textAlign='center';ctx.fillText(item.icon,canvas.width/2,by+44);
  ctx.fillStyle='#fff';ctx.font='bold 14px Arial';ctx.fillText('Buy '+item.name+'?',canvas.width/2,by+68);
  ctx.fillStyle='#ffd700';ctx.font='13px Arial';ctx.fillText('Cost: '+item.price+' coins',canvas.width/2,by+88);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 13px Arial';ctx.fillText('Are you quacking sure? 🐦',canvas.width/2,by+108);
  // YES button
  ctx.shadowColor='#00dd00';ctx.shadowBlur=8;fillRR(bx+20,by+124,110,34,8,'#00aa00');ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 14px Arial';ctx.fillText('YES',bx+75,by+146);
  // NO button
  ctx.shadowColor='#dd0000';ctx.shadowBlur=8;fillRR(bx+150,by+124,110,34,8,'#aa0000');ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 14px Arial';ctx.fillText('NO',bx+205,by+146);
}
function drawUI(){
  if(state==='waiting'){ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(60,220,280,110);ctx.strokeStyle='#00ced1';ctx.lineWidth=2;ctx.strokeRect(60,220,280,110);ctx.fillStyle='#fff';ctx.font='bold 30px Arial';ctx.textAlign='center';ctx.fillText('DERPY BIRD',canvas.width/2,258);ctx.font='16px Arial';ctx.fillStyle='#00e5ee';ctx.fillText('Click / Space to flap!',canvas.width/2,292);}
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(60,158,280,252);ctx.strokeStyle='#ff4444';ctx.lineWidth=2;ctx.strokeRect(60,158,280,252);
    ctx.fillStyle='#ff6666';ctx.font='bold 32px Arial';ctx.textAlign='center';ctx.fillText('Oh Quack...',canvas.width/2,198);
    ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.fillText('Score: '+score,canvas.width/2,228);
    ctx.fillStyle='#ffd700';ctx.font='13px Arial';ctx.fillText('+'+runCoins+' coins  (total: '+coins+')',canvas.width/2,250);
    if(score>=best&&score>0){ctx.fillStyle='#ffd700';ctx.font='18px Arial';ctx.fillText('NEW BEST!',canvas.width/2,274);}
    else{ctx.fillStyle='#aaa';ctx.font='18px Arial';ctx.fillText('Best: '+best,canvas.width/2,274);}
    ctx.fillStyle='#00e5ee';ctx.font='13px Arial';ctx.fillText('Click / Space to try again',canvas.width/2,298);
    ctx.shadowColor='#00ced1';ctx.shadowBlur=8;fillRR(CLOSET_BTN.x,CLOSET_BTN.y,CLOSET_BTN.w,CLOSET_BTN.h,8,'#00ced1');ctx.shadowBlur=0;
    ctx.fillStyle='#001a1a';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText('CLOSET',CLOSET_BTN.x+CLOSET_BTN.w/2,CLOSET_BTN.y+22);
    ctx.shadowColor='#ffd700';ctx.shadowBlur=8;fillRR(SHOP_BTN.x,SHOP_BTN.y,SHOP_BTN.w,SHOP_BTN.h,8,'#ffd700');ctx.shadowBlur=0;
    ctx.fillStyle='#1a1000';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText('SHOP',SHOP_BTN.x+SHOP_BTN.w/2,SHOP_BTN.y+22);
    if(closetOpen)drawCloset();
  }
  if(state==='paused')drawPauseMenu();
  if(state==='shop'){drawShop();drawConfirm();}
}
function drawRainbowTrail(){
  if(!equippedTrail||equippedTrail.id!=='trail_rainbow'||birdTrail.length<2)return;
  const totalH=NYAN_COLORS.length*NYAN_BAND_H;
  NYAN_COLORS.forEach((col,lane)=>{
    const offsetY=-totalH/2+lane*NYAN_BAND_H;
    ctx.beginPath();
    ctx.strokeStyle=col;
    ctx.lineWidth=NYAN_BAND_H-0.5;
    ctx.lineCap='square';
    birdTrail.forEach((pt,i)=>{
      const alpha=i/birdTrail.length; // fade older points
      ctx.globalAlpha=alpha;
      if(i===0)ctx.moveTo(pt.x,pt.y+offsetY);
      else ctx.lineTo(pt.x,pt.y+offsetY);
    });
    ctx.stroke();
  });
  ctx.globalAlpha=1;ctx.lineCap='butt';
}
function drawDragonTrail(){
  if(!equippedTrail||birdTrail.length<2)return;
  const id=equippedTrail.id;
  if(id!=='trail_dragon'&&id!=='trail_fire')return;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  if(id==='trail_dragon'){
    // Solid green body
    ctx.globalAlpha=0.92;ctx.lineWidth=14;ctx.strokeStyle='#00aa22';ctx.shadowColor='#00ff44';ctx.shadowBlur=6;
    ctx.beginPath();birdTrail.forEach((pt,i)=>{if(i===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y);});ctx.stroke();
    // Yellow stripe 5px above the body
    ctx.globalAlpha=0.95;ctx.lineWidth=3;ctx.strokeStyle='#ffee00';ctx.shadowColor='#ffdd00';ctx.shadowBlur=4;
    ctx.beginPath();birdTrail.forEach((pt,i)=>{if(i===0)ctx.moveTo(pt.x,pt.y-5);else ctx.lineTo(pt.x,pt.y-5);});ctx.stroke();
    // Tiny red spikes pointing straight up
    ctx.shadowBlur=0;
    for(let i=4;i<birdTrail.length;i+=8){
      const pt=birdTrail[i];
      ctx.globalAlpha=0.9;ctx.fillStyle='#ff1a00';
      ctx.beginPath();
      ctx.moveTo(pt.x-3,pt.y-7);  // base left
      ctx.lineTo(pt.x+3,pt.y-7);  // base right
      ctx.lineTo(pt.x,pt.y-15);   // tip straight up
      ctx.closePath();ctx.fill();
    }
  } else {
    // Fire trail — orange/red scale diamonds
    for(let i=5;i<birdTrail.length;i+=7){
      const t=i/birdTrail.length;
      const pt=birdTrail[i];
      const sz=7*(1-t*0.5);
      ctx.globalAlpha=t*0.8;
      ctx.shadowColor='#ff4400';ctx.shadowBlur=5;
      ctx.fillStyle=t>0.5?'#ff2200':'#ff8800';
      ctx.beginPath();
      ctx.moveTo(pt.x,pt.y-sz);
      ctx.lineTo(pt.x+sz*0.6,pt.y);
      ctx.lineTo(pt.x,pt.y+sz);
      ctx.lineTo(pt.x-sz*0.6,pt.y);
      ctx.closePath();ctx.fill();
    }
  }
  ctx.restore();ctx.globalAlpha=1;ctx.shadowBlur=0;
}

let _dbLastFrame=0;
function loop(ts=0){
  requestAnimationFrame(loop);
  if(ts-_dbLastFrame<14)return;
  _dbLastFrame=ts;
  try {
    update();
    drawBg();
    drawDragonTrail();
    drawRainbowTrail();
    drawTrailParticles();
    pipes.forEach(drawPipe);
    drawBird();
    drawParticles();
    drawUI();
  } catch(e) {
    ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#ff4444';ctx.font='bold 14px Arial';ctx.textAlign='center';
    ctx.fillText('JS ERROR:',canvas.width/2,canvas.height/2-30);
    ctx.fillStyle='#fff';ctx.font='12px Arial';
    const words=e.message.match(/.{1,38}/g)||[e.message];
    words.forEach((w,i)=>ctx.fillText(w,canvas.width/2,canvas.height/2-10+i*18));
    const loc=(e.stack||'').split('\n')[1]||'';
    ctx.fillStyle='#aaa';ctx.font='11px Arial';ctx.fillText(loc.trim().slice(0,50),canvas.width/2,canvas.height/2+60);
  }
}

reset();
loop();
</script>
