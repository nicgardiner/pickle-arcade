<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <!-- Dark floor-to-void gradient -->
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#060400"/>
    <stop offset="30%" stop-color="#0e0b00"/>
    <stop offset="65%" stop-color="#1a1400"/>
    <stop offset="100%" stop-color="#0a0800"/>
  </linearGradient>
  <!-- Ceiling gradient (slightly lighter yellow-tan) -->
  <linearGradient id="ceilGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a3018"/>
    <stop offset="100%" stop-color="#282010"/>
  </linearGradient>
  <!-- Floor gradient -->
  <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#302808"/>
    <stop offset="100%" stop-color="#1a1400"/>
  </linearGradient>
  <!-- Left wall -->
  <linearGradient id="wallLeftGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0a0800"/>
    <stop offset="100%" stop-color="#2a2208"/>
  </linearGradient>
  <!-- Right wall -->
  <linearGradient id="wallRightGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#2a2208"/>
    <stop offset="100%" stop-color="#0a0800"/>
  </linearGradient>
  <!-- Fluorescent light glow -->
  <radialGradient id="lightGlow1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c8b560" stop-opacity="0.8"/>
    <stop offset="60%" stop-color="#c8b560" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#c8b560" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="lightGlow2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c8b560" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#c8b560" stop-opacity="0"/>
  </radialGradient>
  <!-- Entity shadow -->
  <radialGradient id="entityGrad" cx="50%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#1a1200"/>
    <stop offset="50%" stop-color="#0a0800"/>
    <stop offset="100%" stop-color="#000000"/>
  </radialGradient>
  <!-- Title glow -->
  <filter id="titleGlow" x="-25%" y="-60%" width="150%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
    <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Entity glow (red eyes) -->
  <filter id="eyeGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Exit sign glow -->
  <filter id="exitGlow" x="-40%" y="-60%" width="180%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Corridor fade -->
  <radialGradient id="corridorFade" cx="50%" cy="55%" r="40%">
    <stop offset="0%" stop-color="#302800" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <!-- Clip path for the whole canvas -->
  <clipPath id="canvas">
    <rect width="680" height="1020"/>
  </clipPath>
</defs>

<!-- Background (deep void) -->
<rect width="680" height="1020" fill="url(#bgGrad)"/>

<!-- ══ CORRIDOR PERSPECTIVE ══ -->
<!-- The vanishing point is at roughly (340, 560) — middle of the image -->

<!-- Ceiling (upper panel) -->
<polygon points="0,200 680,200 500,420 180,420" fill="url(#ceilGrad)"/>
<!-- Ceiling shadow at edges -->
<polygon points="0,200 180,420 0,420" fill="#000" opacity="0.5"/>
<polygon points="680,200 500,420 680,420" fill="#000" opacity="0.5"/>

<!-- Floor (lower panel) -->
<polygon points="0,820 680,820 500,620 180,620" fill="url(#floorGrad)"/>
<!-- Floor edge shadows -->
<polygon points="0,820 180,620 0,620" fill="#000" opacity="0.55"/>
<polygon points="680,820 500,620 680,620" fill="#000" opacity="0.55"/>

<!-- Left wall -->
<polygon points="0,200 180,420 180,620 0,820" fill="url(#wallLeftGrad)"/>
<!-- Right wall -->
<polygon points="680,200 500,420 500,620 680,820" fill="url(#wallRightGrad)"/>

<!-- Wallpaper pattern on left wall (tiny dots/grid) -->
<g opacity="0.18" clip-path="url(#canvas)">
  <!-- Row pattern on left wall -->
  <polygon points="0,200 180,420 180,620 0,820" fill="none" stroke="#c8b560" stroke-width="0.5"/>
  <!-- Horizontal lines on left wall -->
  <line x1="0" y1="280" x2="150" y2="450" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="360" x2="150" y2="500" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="440" x2="150" y2="555" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="520" x2="150" y2="600" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="600" x2="150" y2="635" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="680" x2="150" y2="665" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <!-- Vertical lines on left wall -->
  <line x1="30" y1="200" x2="68" y2="820" stroke="#c8b560" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="200" x2="114" y2="820" stroke="#c8b560" stroke-width="0.5" opacity="0.3"/>
  <line x1="130" y1="200" x2="152" y2="820" stroke="#c8b560" stroke-width="0.5" opacity="0.3"/>
  <!-- Right wall lines -->
  <line x1="680" y1="280" x2="530" y2="450" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="680" y1="360" x2="530" y2="500" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="680" y1="440" x2="530" y2="555" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="680" y1="520" x2="530" y2="600" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="680" y1="600" x2="530" y2="635" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="680" y1="680" x2="530" y2="665" stroke="#c8b560" stroke-width="0.5" opacity="0.4"/>
  <line x1="650" y1="200" x2="612" y2="820" stroke="#c8b560" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="200" x2="566" y2="820" stroke="#c8b560" stroke-width="0.5" opacity="0.3"/>
  <line x1="550" y1="200" x2="528" y2="820" stroke="#c8b560" stroke-width="0.5" opacity="0.3"/>
</g>

<!-- Ceiling tiles grid -->
<g opacity="0.15" stroke="#c8b560" stroke-width="0.5" fill="none">
  <line x1="0" y1="200" x2="680" y2="200"/>
  <line x1="60" y1="200" x2="204" y2="420"/>
  <line x1="170" y1="200" x2="232" y2="420"/>
  <line x1="280" y1="200" x2="270" y2="420"/>
  <line x1="400" y1="200" x2="310" y2="420"/>
  <line x1="510" y1="200" x2="380" y2="420"/>
  <line x1="620" y1="200" x2="460" y2="420"/>
  <line x1="0" y1="270" x2="680" y2="270"/>
  <line x1="0" y1="340" x2="680" y2="340"/>
</g>

<!-- Floor tiles -->
<g opacity="0.1" stroke="#c8b560" stroke-width="0.5" fill="none">
  <line x1="180" y1="620" x2="0" y2="820"/>
  <line x1="236" y1="620" x2="64" y2="820"/>
  <line x1="292" y1="620" x2="148" y2="820"/>
  <line x1="340" y1="620" x2="220" y2="820"/>
  <line x1="380" y1="620" x2="300" y2="820"/>
  <line x1="430" y1="620" x2="400" y2="820"/>
  <line x1="478" y1="620" x2="500" y2="820"/>
  <line x1="500" y1="620" x2="616" y2="820"/>
  <!-- Horizontal floor lines -->
  <line x1="155" y1="650" x2="525" y2="650"/>
  <line x1="120" y1="690" x2="560" y2="690"/>
  <line x1="70" y1="745" x2="610" y2="745"/>
  <line x1="30" y1="790" x2="650" y2="790"/>
</g>

<!-- ══ FLUORESCENT LIGHTS ══ -->
<!-- Light 1 (near) -->
<g>
  <rect x="250" y="204" width="180" height="16" rx="3" fill="#c8b560" opacity="0.9"/>
  <rect x="258" y="204" width="164" height="8" rx="2" fill="#fff8d0" opacity="0.8"/>
  <ellipse cx="340" cy="212" rx="200" ry="80" fill="url(#lightGlow1)" opacity="0.7"/>
</g>
<!-- Light 2 (mid) -->
<g>
  <rect x="292" y="340" width="96" height="10" rx="2" fill="#c8b560" opacity="0.75"/>
  <rect x="296" y="340" width="88" height="5" rx="2" fill="#fff8d0" opacity="0.6"/>
  <ellipse cx="340" cy="345" rx="130" ry="50" fill="url(#lightGlow2)" opacity="0.5"/>
</g>
<!-- Light 3 (far, near vanishing point) -->
<g>
  <rect x="318" y="400" width="44" height="6" rx="2" fill="#c8b560" opacity="0.55"/>
  <ellipse cx="340" cy="403" rx="60" ry="25" fill="url(#lightGlow2)" opacity="0.3"/>
</g>
<!-- Light 4 (deepest) -->
<g>
  <rect x="330" y="435" width="20" height="4" rx="1" fill="#c8b560" opacity="0.4"/>
</g>

<!-- Light spill on walls and floor -->
<rect x="0" y="200" width="680" height="250" fill="url(#corridorFade)" opacity="0.8"/>

<!-- Baseboard molding left -->
<polygon points="0,800 20,780 20,820 0,820" fill="#c8b060" opacity="0.12"/>
<!-- Baseboard molding right -->
<polygon points="680,800 660,780 660,820 680,820" fill="#c8b060" opacity="0.12"/>

<!-- ══ THE ENTITY (dark silhouette, far end, lurking) ══ -->
<g transform="translate(308, 435)" opacity="0.88">
  <!-- Body mass (tall, thin, wrong proportions) -->
  <!-- Legs (too long) -->
  <rect x="8" y="100" width="10" height="70" rx="3" fill="#0d0b00"/>
  <rect x="26" y="100" width="10" height="75" rx="3" fill="#0d0b00"/>
  <!-- Arms (too long, hanging) -->
  <rect x="-18" y="30" width="8" height="80" rx="4" fill="#0d0b00" transform="rotate(10, -14, 70)"/>
  <rect x="50" y="30" width="8" height="80" rx="4" fill="#0d0b00" transform="rotate(-10, 54, 70)"/>
  <!-- Torso -->
  <rect x="4" y="10" width="35" height="95" rx="6" fill="#0d0b00"/>
  <!-- Head (slightly too large, slightly too wide) -->
  <ellipse cx="21" cy="0" rx="26" ry="22" fill="#0d0b00"/>
  <!-- Eyes (red, glowing) -->
  <circle cx="12" cy="-2" r="4.5" fill="#cc1100" filter="url(#eyeGlow)" opacity="0.95"/>
  <circle cx="30" cy="-2" r="4.5" fill="#cc1100" filter="url(#eyeGlow)" opacity="0.95"/>
  <!-- Pupils (darker core) -->
  <circle cx="12" cy="-2" r="2" fill="#ff3300"/>
  <circle cx="30" cy="-2" r="2" fill="#ff3300"/>
  <!-- Fingers (creepy long) -->
  <line x1="-10" y1="108" x2="-18" y2="126" stroke="#0d0b00" stroke-width="4" stroke-linecap="round"/>
  <line x1="-14" y1="110" x2="-24" y2="128" stroke="#0d0b00" stroke-width="3" stroke-linecap="round"/>
  <line x1="-6" y1="106" x2="-10" y2="124" stroke="#0d0b00" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="108" x2="62" y2="126" stroke="#0d0b00" stroke-width="4" stroke-linecap="round"/>
  <line x1="58" y1="110" x2="68" y2="128" stroke="#0d0b00" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="106" x2="54" y2="124" stroke="#0d0b00" stroke-width="3" stroke-linecap="round"/>
</g>

<!-- Entity ambient glow (red tint) -->
<ellipse cx="340" cy="490" rx="80" ry="60" fill="#440000" opacity="0.18"/>

<!-- ══ EXIT SIGN ══ -->
<g transform="translate(280, 475)" filter="url(#exitGlow)">
  <rect x="0" y="0" width="80" height="28" rx="3" fill="#003300" stroke="#00aa00" stroke-width="1.5"/>
  <rect x="2" y="2" width="76" height="24" rx="2" fill="#004400"/>
  <text x="40" y="19" font-family="monospace" font-size="13" font-weight="bold"
        text-anchor="middle" fill="#00ff44" letter-spacing="2">EXIT</text>
  <!-- Arrow -->
  <polygon points="62,10 70,14 62,18" fill="#00ff44" opacity="0.9"/>
</g>

<!-- Darkness vignette (top and bottom) -->
<rect width="680" height="200" fill="url(#bgGrad)" opacity="0.4"/>
<rect x="0" y="820" width="680" height="200" fill="#000" opacity="0.7"/>
<rect x="0" y="0" width="100" height="1020" fill="url(#wallLeftGrad)" opacity="0.4"/>
<rect x="580" y="0" width="100" height="1020" fill="url(#wallRightGrad)" opacity="0.4"/>

<!-- ══ TITLE ══ -->
<text x="340" y="122" font-family="'Courier New', monospace"
      font-size="54" font-weight="900" text-anchor="middle"
      letter-spacing="8" fill="#c8b560" filter="url(#titleGlow)" opacity="0.95">THE</text>
<text x="340" y="200" font-family="'Courier New', monospace"
      font-size="62" font-weight="900" text-anchor="middle"
      letter-spacing="4" fill="#c8b560" filter="url(#titleGlow)">BACKROOMS</text>

<!-- Decorative rule under title -->
<line x1="100" y1="218" x2="580" y2="218" stroke="#c8b560" stroke-width="1" opacity="0.4"/>
<line x1="140" y1="224" x2="540" y2="224" stroke="#c8b560" stroke-width="0.5" opacity="0.25"/>

<!-- Level counter decoration -->
<text x="340" y="960" font-family="'Courier New', monospace"
      font-size="18" text-anchor="middle" fill="#c8b560" opacity="0.45" letter-spacing="4">50 LEVELS AWAIT</text>

<!-- Noise grain overlay (subtle dot stipple) -->
<g opacity="0.06" fill="#c8b560">
  <circle cx="45" cy="250" r="1"/><circle cx="88" cy="310" r="1"/><circle cx="32" cy="380" r="1"/>
  <circle cx="120" cy="290" r="1"/><circle cx="60" cy="450" r="1"/><circle cx="100" cy="520" r="1"/>
  <circle cx="145" cy="350" r="1"/><circle cx="22" cy="480" r="1"/><circle cx="75" cy="560" r="1"/>
  <circle cx="635" cy="250" r="1"/><circle cx="592" cy="310" r="1"/><circle cx="648" cy="380" r="1"/>
  <circle cx="560" cy="290" r="1"/><circle cx="620" cy="450" r="1"/><circle cx="580" cy="520" r="1"/>
  <circle cx="535" cy="350" r="1"/><circle cx="658" cy="480" r="1"/><circle cx="605" cy="560" r="1"/>
  <circle cx="200" cy="700" r="1"/><circle cx="350" cy="750" r="1"/><circle cx="480" cy="710" r="1"/>
  <circle cx="150" cy="770" r="1"/><circle cx="420" cy="800" r="1"/><circle cx="530" cy="760" r="1"/>
</g>

</svg>