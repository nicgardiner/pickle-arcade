<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#08091a"/>
    <stop offset="60%" stop-color="#0a0c18"/>
    <stop offset="100%" stop-color="#040509"/>
  </linearGradient>
  <filter id="titleGlow" x="-30%" y="-60%" width="160%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="mineGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="numGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="fadeOut" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#08091a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#08091a" stop-opacity="1"/>
  </linearGradient>
  <radialGradient id="explodeGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff3b5c" stop-opacity="0.45"/>
    <stop offset="60%" stop-color="#ff3b5c" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#ff3b5c" stop-opacity="0"/>
  </radialGradient>
  <!-- scanline overlay -->
  <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="680" height="2" fill="rgba(0,0,0,0.07)"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="680" height="1020" fill="url(#bgGrad)"/>

<!-- Subtle grid guide lines (94px stride) -->
<g opacity="0.07">
