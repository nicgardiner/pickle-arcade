<svg viewBox="0 0 680 1020" width="400" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="pat" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="3" fill="rgba(255,190,36,0.18)"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vign" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#110e05" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="1020" fill="#110e05"/>
  <rect width="680" height="1020" fill="url(#pat)" opacity="0.9"/>
  <rect width="680" height="1020" fill="url(#vign)"/>

  <!-- Corner accents -->
  <polyline points="20,20 20,60 60,60" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <polyline points="660,20 660,60 620,60" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <polyline points="20,1000 20,960 60,960" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
  <polyline points="660,1000 660,960 620,960" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>

  <!-- Title -->
  <text x="340" y="144" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-size="82" font-weight="900"
        letter-spacing="2" fill="#fbbf24" filter="url(#glow)"
        opacity="0.5">2048</text>
  <text x="344" y="148" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-size="82" font-weight="900"
        letter-spacing="2" fill="rgba(0,0,0,0.5)">2048</text>
  <text x="340" y="144" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-size="82" font-weight="900"
        letter-spacing="2" fill="#fbbf24" filter="url(#glow2)">2048</text>

  <!-- Central icon -->
  <text x="340" y="620" text-anchor="middle" font-size="280" filter="url(#glow)">🔢</text>
  <text x="340" y="620" text-anchor="middle" font-size="280">🔢</text>

  <!-- Decorative line -->
  <line x1="80" y1="180" x2="600" y2="180" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="186" x2="600" y2="186" stroke="#fbbf24" stroke-width="0.5" opacity="0.2"/>

  <!-- Bottom bar -->
  <rect x="0" y="940" width="680" height="80" fill="#110e05" opacity="0.8"/>
  <line x1="0" y1="940" x2="680" y2="940" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <text x="340" y="990" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-size="22" font-weight="700"
        letter-spacing="8" fill="#fbbf24" opacity="0.7">PICKLE GAME LIBRARY</text>
</svg>