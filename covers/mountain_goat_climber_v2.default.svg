<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#020b18"/>
      <stop offset="60%"  stop-color="#061a2e"/>
      <stop offset="100%" stop-color="#0c2a18"/>
    </linearGradient>
    <linearGradient id="mtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a3a5c"/>
      <stop offset="100%" stop-color="#111e2e"/>
    </linearGradient>
    <linearGradient id="mt2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e2e1e"/>
      <stop offset="100%" stop-color="#0c180c"/>
    </linearGradient>
    <filter id="titleGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goatShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="680" height="1020" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <g fill="white">
    <circle cx="55"  cy="60"  r="1.5" opacity="0.9"/>
    <circle cx="130" cy="35"  r="1"   opacity="0.7"/>
    <circle cx="200" cy="90"  r="1.8" opacity="0.8"/>
    <circle cx="290" cy="45"  r="1"   opacity="0.6"/>
    <circle cx="360" cy="75"  r="1.5" opacity="0.9"/>
    <circle cx="450" cy="30"  r="1.2" opacity="0.7"/>
    <circle cx="520" cy="95"  r="1.8" opacity="0.8"/>
    <circle cx="600" cy="50"  r="1"   opacity="0.6"/>
    <circle cx="650" cy="110" r="1.5" opacity="0.7"/>
    <circle cx="80"  cy="160" r="1"   opacity="0.5"/>
    <circle cx="180" cy="200" r="1.3" opacity="0.6"/>
    <circle cx="340" cy="140" r="1"   opacity="0.7"/>
    <circle cx="480" cy="170" r="1.5" opacity="0.5"/>
    <circle cx="580" cy="145" r="1.2" opacity="0.8"/>
    <circle cx="640" cy="200" r="1"   opacity="0.6"/>
    <circle cx="30"  cy="280" r="1.3" opacity="0.5"/>
    <circle cx="120" cy="310" r="1"   opacity="0.4"/>
    <circle cx="620" cy="280" r="1.5" opacity="0.6"/>
    <!-- Twinkling big stars -->
    <circle cx="410" cy="55"  r="2.5" opacity="0.9"/>
    <circle cx="160" cy="120" r="2"   opacity="0.8"/>
    <circle cx="550" cy="80"  r="2"   opacity="0.85"/>
  </g>

  <!-- Far mountain (bluish, behind) -->
  <polygon points="0,680 120,380 240,500 340,300 460,480 560,340 680,500 680,680" fill="url(#mtGrad)" opacity="0.7"/>
  <!-- Snow cap on far mountain -->
  <polygon points="320,300 340,258 360,300 350,310 330,310" fill="white" opacity="0.7"/>
  <polygon points="540,340 560,295 580,340 568,348 552,348" fill="white" opacity="0.6"/>

  <!-- Near mountain (green-dark, foreground) -->
  <polygon points="-20,900 160,480 300,620 400,400 520,580 660,460 720,900" fill="url(#mt2Grad)"/>
  <!-- Near snow cap -->
  <polygon points="378,400 400,348 422,400 410,414 390,414" fill="white" opacity="0.85"/>
  <polygon points="638,460 660,405 682,460 668,470 650,470" fill="white" opacity="0.75"/>

  <!-- Platform above-left -->
  <rect x="60"  y="560" width="200" height="22" rx="5" fill="#2a5c2a" opacity="0.85"/>
  <rect x="60"  y="560" width="200" height="7"  rx="3" fill="#3a8a3a" opacity="0.6"/>

  <!-- Platform above-right -->
  <rect x="430" y="440" width="200" height="22" rx="5" fill="#2a5c2a" opacity="0.85"/>
  <rect x="430" y="440" width="200" height="7"  rx="3" fill="#3a8a3a" opacity="0.6"/>

  <!-- Coin on upper platform -->
  <circle cx="500" cy="427" r="12" fill="#f5c518" opacity="0.9"/>
  <circle cx="500" cy="427" r="8"  fill="#e8b000" opacity="0.8"/>
  <text x="500" y="432" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff8" opacity="0.9">$</text>

  <!-- Coin on left platform -->
  <circle cx="130" cy="547" r="12" fill="#f5c518" opacity="0.85"/>
  <circle cx="130" cy="547" r="8"  fill="#e8b000" opacity="0.75"/>

  <!-- ── GOAT SPRITE at center=(290,760), scale=6 ─────────────── -->
  <!-- All offsets multiplied by 6, centered at (290, 760) -->
  <!-- facing right (default) -->
  <g transform="translate(290,760)" filter="url(#goatShadow)">

    <!-- Body: fillRect(-12,-8, 24,14) × 6 → rect(-72,-48, 144,84) -->
    <rect x="-72" y="-48" width="144" height="84" fill="#f0f0e8"/>

    <!-- Tail: fillRect(-13,-5, 5,5) × 6 → rect(-78,-30, 30,30) -->
    <rect x="-78" y="-30" width="30" height="30" fill="#f0f0e8"/>

    <!-- Head: fillRect(8,-16, 14,12) × 6 → rect(48,-96, 84,72) -->
    <rect x="48" y="-96" width="84" height="72" fill="#f0f0e8"/>

    <!-- Ear: fillRect(8,-17, 4,4) × 6 → rect(48,-102, 24,24) -->
    <rect x="48" y="-102" width="24" height="24" fill="#f0c0a0"/>

    <!-- Horns: fillRect(10,-20, 3,6) × 6 → rect(60,-120,18,36) -->
    <rect x="60" y="-120" width="18" height="36" fill="#c8a060"/>
    <!-- fillRect(14,-22, 3,7) × 6 → rect(84,-132,18,42) -->
    <rect x="84" y="-132" width="18" height="42" fill="#c8a060"/>

    <!-- Eye: fillRect(18,-14, 2,2) × 6 → rect(108,-84, 12,12) -->
    <rect x="108" y="-84" width="12" height="12" fill="#222"/>

    <!-- Nose: fillRect(20,-10, 3,2) × 6 → rect(120,-60, 18,12) -->
    <rect x="120" y="-60" width="18" height="12" fill="#ffaaaa"/>

    <!-- Beard: fillRect(18,-6, 5,6) × 6 → rect(108,-36, 30,36) -->
    <rect x="108" y="-36" width="30" height="36" fill="#ddd8c0"/>

    <!-- Legs (no swing, standing): fillRect at x=-6,0,4,10 y=4 h=8 × 6 -->
    <!-- Leg1: fillRect(-6,4,3,8) → rect(-36,24,18,48) -->
    <rect x="-36" y="24" width="18" height="48" fill="#e0e0d8"/>
    <!-- Leg2: fillRect(0,4,3,8)  → rect(0,24,18,48) -->
    <rect x="0"   y="24" width="18" height="48" fill="#e0e0d8"/>
    <!-- Leg3: fillRect(4,4,3,8)  → rect(24,24,18,48) -->
    <rect x="24"  y="24" width="18" height="48" fill="#e0e0d8"/>
    <!-- Leg4: fillRect(10,4,3,8) → rect(60,24,18,48) -->
    <rect x="60"  y="24" width="18" height="48" fill="#e0e0d8"/>

    <!-- Hooves: fillRect at same x, y=11, h=3 × 6 -->
    <rect x="-36" y="66" width="18" height="18" fill="#555"/>
    <rect x="0"   y="66" width="18" height="18" fill="#555"/>
    <rect x="24"  y="66" width="18" height="18" fill="#555"/>
    <rect x="60"  y="66" width="18" height="18" fill="#555"/>

  </g>
  <!-- ── END GOAT ───────────────────────────────────────────── -->

  <!-- Title at top -->
  <text x="340" y="100" font-family="'Arial Black', Arial, sans-serif" font-size="58" font-weight="900"
        text-anchor="middle" letter-spacing="4" fill="#88ee88" filter="url(#titleGlow)" opacity="0.97">MOUNTAIN</text>
  <text x="340" y="162" font-family="'Arial Black', Arial, sans-serif" font-size="52" font-weight="900"
        text-anchor="middle" letter-spacing="3" fill="#88ee88" filter="url(#titleGlow)" opacity="0.9">GOAT</text>
  <text x="340" y="218" font-family="'Arial Black', Arial, sans-serif" font-size="64" font-weight="900"
        text-anchor="middle" letter-spacing="5" fill="#88ee88" filter="url(#titleGlow)" opacity="0.95">CLIMBER</text>
  <line x1="80" y1="238" x2="600" y2="238" stroke="#88ee88" stroke-width="2" opacity="0.35"/>

  <!-- Bottom bar -->
  <rect x="0" y="960" width="680" height="60" fill="#050f20" opacity="0.9"/>
  <line x1="0" y1="960" x2="680" y2="960" stroke="#3a8a3a" stroke-width="2" opacity="0.5"/>
  <text x="340" y="998" font-family="Arial, sans-serif" font-size="22" font-weight="700"
        text-anchor="middle" letter-spacing="4" fill="#3a8a3a" opacity="0.65">HOP · CLIMB · CONQUER</text>
</svg>
