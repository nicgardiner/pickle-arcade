<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600" role="img">
<title>Floe Fighters cover</title>
<defs>
  <linearGradient id="gSky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#bfe7ff"/><stop offset="0.45" stop-color="#7fc1ee"/><stop offset="1" stop-color="#1a6fa8"/>
  </linearGradient>
  <linearGradient id="gSea" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1a6fa8"/><stop offset="1" stop-color="#06243f"/>
  </linearGradient>
  <radialGradient id="gFloe" cx="50%" cy="38%" r="70%">
    <stop offset="0" stop-color="#ffffff"/><stop offset="0.6" stop-color="#eaf6ff"/><stop offset="1" stop-color="#bfe3ff"/>
  </radialGradient>
  <radialGradient id="gBody" cx="64%" cy="26%" r="72%">
    <stop offset="0" stop-color="#93c5fd"/><stop offset="0.30" stop-color="#3b82f6"/><stop offset="0.62" stop-color="#1d4ed8"/><stop offset="1" stop-color="#172554"/>
  </radialGradient>
  <radialGradient id="gBeak" cx="52%" cy="36%" r="88%">
    <stop offset="0" stop-color="#fff3c4"/><stop offset="0.18" stop-color="#ffdd88"/><stop offset="0.42" stop-color="#ffa31a"/><stop offset="0.76" stop-color="#c07000"/><stop offset="1" stop-color="#7a4800"/>
  </radialGradient>
  <radialGradient id="gFlipL" cx="32%" cy="28%" r="68%">
    <stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#172554"/>
  </radialGradient>
  <radialGradient id="gFlipR" cx="58%" cy="26%" r="66%">
    <stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#1d4ed8"/>
  </radialGradient>
  <radialGradient id="gSpec" cx="62%" cy="22%" r="36%">
    <stop offset="0" stop-color="rgba(255,255,255,0.50)"/><stop offset="1" stop-color="rgba(255,255,255,0)"/>
  </radialGradient>
  <radialGradient id="gGreen" cx="62%" cy="26%" r="70%">
    <stop offset="0" stop-color="#86efac"/><stop offset="0.32" stop-color="#46d160"/><stop offset="0.68" stop-color="#16a34a"/><stop offset="1" stop-color="#14532d"/>
  </radialGradient>
  <radialGradient id="gGBeak" cx="52%" cy="36%" r="88%">
    <stop offset="0" stop-color="#ffdd88"/><stop offset="0.5" stop-color="#ffa31a"/><stop offset="1" stop-color="#7a4800"/>
  </radialGradient>
</defs>

<rect width="680" height="1020" fill="url(#gSky)"/>
<rect y="560" width="680" height="460" fill="url(#gSea)"/>

<g fill="#ffffff" opacity="0.82">
  <circle cx="80" cy="300" r="4"/><circle cx="150" cy="430" r="3"/><circle cx="240" cy="250" r="3.5"/>
  <circle cx="600" cy="470" r="4"/><circle cx="330" cy="200" r="2.5"/>
  <circle cx="120" cy="540" r="3"/><circle cx="540" cy="558" r="2.5"/><circle cx="410" cy="500" r="3"/>
  <circle cx="60" cy="638" r="3"/><circle cx="500" cy="288" r="2.5"/>
  <circle cx="190" cy="358" r="2"/><circle cx="90" cy="178" r="3"/>
</g>
<g fill="#9fd2f2" opacity="0.5">
  <ellipse cx="130" cy="700" rx="35" ry="5"/><ellipse cx="420" cy="870" rx="55" ry="8"/><ellipse cx="100" cy="900" rx="40" ry="5"/>
</g>

<!-- ICE FLOE -->
<ellipse cx="350" cy="855" rx="245" ry="60" fill="#06243f" opacity="0.35"/>
<path d="M120 720 Q105 660 175 645 Q230 612 320 628 Q420 600 500 640 Q585 650 575 715 Q600 770 520 800 Q420 845 320 828 Q205 845 150 798 Q98 768 120 720 Z" fill="url(#gFloe)" stroke="#bfe3ff" stroke-width="3"/>
<path d="M175 660 Q300 632 470 660" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.7"/>
<path d="M300 640 L320 720 L290 790" stroke="#bfe3ff" stroke-width="3" fill="none" opacity="0.7"/>
<path d="M430 650 L455 740" stroke="#bfe3ff" stroke-width="3" fill="none" opacity="0.6"/>

<!-- EXPLOSION on ice -->
<g transform="translate(510, 668)">
  <ellipse cx="0" cy="0" rx="110" ry="24" fill="#ffd23f" opacity="0.72"/>
  <ellipse cx="0" cy="0" rx="80" ry="16" fill="#ff9a3c" opacity="0.68"/>
  <g stroke="#ffd23f" stroke-width="8" stroke-linecap="round" opacity="0.85">
    <line x1="0" y1="-16" x2="0" y2="-101"/>
    <line x1="0" y1="-16" x2="67" y2="-70"/>
    <line x1="0" y1="-16" x2="99" y2="-5"/>
    <line x1="0" y1="-16" x2="67" y2="53"/>
    <line x1="0" y1="-16" x2="0" y2="58"/>
    <line x1="0" y1="-16" x2="-67" y2="53"/>
    <line x1="0" y1="-16" x2="-99" y2="-5"/>
    <line x1="0" y1="-16" x2="-67" y2="-70"/>
  </g>
  <circle cx="0" cy="-16" r="55" fill="#ff7a59" opacity="0.92"/>
  <circle cx="0" cy="-16" r="37" fill="#ffd23f"/>
  <circle cx="0" cy="-16" r="17" fill="#ffffff" opacity="0.90"/>
  <circle cx="-60" cy="-92" r="34" fill="rgba(195,210,225,0.62)"/>
  <circle cx="48" cy="-87" r="26" fill="rgba(205,218,230,0.58)"/>
  <circle cx="14" cy="-117" r="31" fill="rgba(215,225,238,0.54)"/>
  <circle cx="-23" cy="-132" r="22" fill="rgba(228,233,242,0.48)"/>
  <polygon points="-32,-53 -18,-99 -51,-85" fill="#eaf6ff" opacity="0.85"/>
  <polygon points="35,-46 53,-94 23,-80" fill="#eaf6ff" opacity="0.80"/>
  <polygon points="-78,-55 -94,-30 -62,-38" fill="#bfe3ff" opacity="0.72"/>
  <polygon points="71,-48 92,-26 71,-18" fill="#bfe3ff" opacity="0.68"/>
</g>

<!-- GREEN PENGUIN — rightward, 42° tilt, no belly -->
<g transform="translate(558, 392) rotate(42)">
  <ellipse cx="-14" cy="78" rx="17" ry="7" fill="#ffa31a"/>
  <ellipse cx="14" cy="78" rx="17" ry="7" fill="#ffa31a"/>
  <ellipse cx="-56" cy="-12" rx="11" ry="34" fill="#16a34a" transform="rotate(-40,-56,-12)"/>
  <path d="M 0,-82 A44,44 0 0 1 44,-38 L44,38 A44,44 0 0 1 -44,38 L-44,-38 A44,44 0 0 1 0,-82 Z" fill="url(#gGreen)"/>
  <ellipse cx="56" cy="-12" rx="11" ry="34" fill="#22c55e" transform="rotate(40,56,-12)"/>
  <circle cx="-26" cy="-56" r="11" fill="#ffffff"/>
  <circle cx="26" cy="-56" r="11" fill="#ffffff"/>
  <circle cx="-26" cy="-56" r="6" fill="#16202b"/>
  <circle cx="26" cy="-56" r="6" fill="#16202b"/>
  <circle cx="0" cy="-42" r="10" fill="url(#gGBeak)"/>
  <circle cx="0" cy="-42" r="10" fill="none" stroke="#7a4800" stroke-width="1" opacity="0.5"/>
</g>

<!-- BLUE HERO PENGUIN — no belly, feet spread wider -->
<ellipse cx="340" cy="836" rx="115" ry="20" fill="#06243f" opacity="0.26"/>
<ellipse cx="296" cy="831" rx="33" ry="12" fill="#ffa31a" transform="rotate(-14,296,831)"/>
<ellipse cx="384" cy="831" rx="33" ry="12" fill="#ffa31a" transform="rotate(14,384,831)"/>
<ellipse cx="298" cy="838" rx="28" ry="6" fill="#7a4800" opacity="0.28" transform="rotate(-14,298,838)"/>
<ellipse cx="386" cy="838" rx="28" ry="6" fill="#7a4800" opacity="0.28" transform="rotate(14,386,838)"/>

<ellipse cx="216" cy="678" rx="27" ry="80" fill="url(#gFlipL)" transform="rotate(20,216,678)"/>

<path d="M 340 458 A120 120 0 0 1 460 578 L460 718 A120 120 0 0 1 220 718 L220 578 A120 120 0 0 1 340 458 Z" fill="url(#gBody)"/>
<path d="M 340 458 A120 120 0 0 1 460 578 L460 718 A120 120 0 0 1 220 718 L220 578 A120 120 0 0 1 340 458 Z" fill="url(#gSpec)" opacity="0.55"/>
<path d="M 222 582 L222 716 A120 120 0 0 1 292 830" fill="none" stroke="rgba(147,197,253,0.18)" stroke-width="7"/>

<ellipse cx="466" cy="676" rx="27" ry="80" fill="url(#gFlipR)" transform="rotate(-20,466,676)"/>
<ellipse cx="474" cy="655" rx="11" ry="28" fill="#93c5fd" opacity="0.45" transform="rotate(-20,474,655)"/>

<!-- Eyes: wide apart, r=12 pupils -->
<circle cx="288" cy="546" r="25" fill="#ffffff"/>
<circle cx="392" cy="546" r="25" fill="#ffffff"/>
<circle cx="288" cy="546" r="12" fill="#16202b"/>
<circle cx="392" cy="546" r="12" fill="#16202b"/>

<!-- Beak cone -->
<circle cx="340" cy="598" r="24" fill="url(#gBeak)"/>
<circle cx="340" cy="598" r="24" fill="none" stroke="#7a4800" stroke-width="1.5" opacity="0.55"/>

<!-- Bow tie -->
<polygon points="307,638 337,649 307,660" fill="#0f172a"/>
<polygon points="373,638 343,649 373,660" fill="#0f172a"/>
<rect x="333" y="642" width="14" height="14" rx="2" fill="#1c2432"/>
<rect x="335" y="644" width="10" height="5" rx="1" fill="#374151" opacity="0.5"/>

<!-- TITLE: 2 lines -->
<text x="340" y="90" text-anchor="middle" font-family="'Fredoka','Arial Black',sans-serif" font-weight="700" font-size="82" letter-spacing="-1" paint-order="stroke" stroke="rgba(255,255,255,0.82)" stroke-width="7" stroke-linejoin="round" fill="#1a6fa8">FLOE</text>
<text x="340" y="174" text-anchor="middle" font-family="'Fredoka','Arial Black',sans-serif" font-weight="700" font-size="82" letter-spacing="-1" paint-order="stroke" stroke="rgba(255,255,255,0.82)" stroke-width="7" stroke-linejoin="round" fill="#ff7a59">FIGHTERS</text>
<text x="340" y="208" text-anchor="middle" font-family="'Fredoka',sans-serif" font-weight="600" font-size="22" fill="#1a6fa8" opacity="0.90" paint-order="stroke" stroke="rgba(255,255,255,0.78)" stroke-width="4">keep calm and waddle on</text>

<!-- Bottom label -->
<rect x="0" y="980" width="680" height="40" fill="rgba(6,36,63,0.45)"/>
<text x="340" y="1007" text-anchor="middle" font-family="'Fredoka',sans-serif" font-weight="600" font-size="22" fill="#bfe7ff" letter-spacing="2">UP TO 4 PLAYERS · KNOCK 'EM IN</text>
</svg>
