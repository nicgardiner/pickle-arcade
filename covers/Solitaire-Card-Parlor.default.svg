<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="feltBg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d2b1a"/>
    <stop offset="50%" stop-color="#1d5e44"/>
    <stop offset="100%" stop-color="#0f2318"/>
  </linearGradient>
  <radialGradient id="tableGlow" cx="50%" cy="55%" r="55%">
    <stop offset="0%" stop-color="#2a7757" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#0a1a10" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="cardFace" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0%" stop-color="#fffdf6"/>
    <stop offset="100%" stop-color="#e7ddc6"/>
  </linearGradient>
  <linearGradient id="cardBack1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#26543f"/>
    <stop offset="100%" stop-color="#173b2c"/>
  </linearGradient>
  <linearGradient id="cardBack2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1f2d52"/>
    <stop offset="100%" stop-color="#11183a"/>
  </linearGradient>
  <filter id="goldGlow" x="-25%" y="-60%" width="150%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
    <feMerge>
      <feMergeNode in="blur1"/>
      <feMergeNode in="blur2"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="cardShadow" x="-15%" y="-10%" width="145%" height="140%">
    <feDropShadow dx="5" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
  </filter>
</defs>

<!-- Background felt -->
<rect width="680" height="1020" fill="url(#feltBg)"/>
<rect width="680" height="1020" fill="url(#tableGlow)"/>

<!-- Subtle felt weave -->
<g opacity="0.055">
  <line x1="-100" y1="0" x2="780" y2="880" stroke="#c9a24b" stroke-width="1.2"/>
  <line x1="-100" y1="110" x2="780" y2="990" stroke="#c9a24b" stroke-width="1.2"/>
  <line x1="-100" y1="220" x2="780" y2="1100" stroke="#c9a24b" stroke-width="1.2"/>
  <line x1="-160" y1="0" x2="720" y2="880" stroke="#c9a24b" stroke-width="1.2"/>
  <line x1="-320" y1="0" x2="560" y2="880" stroke="#c9a24b" stroke-width="1.2"/>
  <line x1="40" y1="0" x2="920" y2="880" stroke="#c9a24b" stroke-width="1.2"/>
</g>

<!-- Oval table border -->
<ellipse cx="340" cy="600" rx="300" ry="360" fill="none" stroke="#c9a24b" stroke-width="2.5" opacity="0.3"/>

<!-- Background suit symbols -->
<text x="62" y="380" font-size="130" text-anchor="middle" fill="#23211e" opacity="0.16" font-family="serif">♠</text>
<text x="620" y="380" font-size="130" text-anchor="middle" fill="#b23b3b" opacity="0.16" font-family="serif">♥</text>
<text x="72" y="870" font-size="120" text-anchor="middle" fill="#b23b3b" opacity="0.14" font-family="serif">♦</text>
<text x="610" y="870" font-size="120" text-anchor="middle" fill="#23211e" opacity="0.14" font-family="serif">♣</text>

<!-- ============================================================ -->
<!-- CARDS — 15% bigger (241x338), moved 60px up to y=580 -->
<!-- Each card is 241x338, fan centered around y=580 -->

<!-- Card 1: back (dark green), far left, steep rotation -->
<g transform="translate(340,580) rotate(-30) translate(-120.5,-169)" filter="url(#cardShadow)">
  <rect width="241" height="338" rx="16" fill="url(#cardBack1)" stroke="#9c7b34" stroke-width="2.5"/>
  <rect x="13" y="13" width="215" height="312" rx="12" fill="none" stroke="#c9a24b" stroke-width="1.5" opacity="0.55"/>
  <line x1="13" y1="13" x2="228" y2="325" stroke="#c9a24b" stroke-width="0.7" opacity="0.28"/>
  <line x1="228" y1="13" x2="13" y2="325" stroke="#c9a24b" stroke-width="0.7" opacity="0.28"/>
</g>

<!-- Card 2: back (midnight blue), left -->
<g transform="translate(340,580) rotate(-16) translate(-120.5,-169)" filter="url(#cardShadow)">
  <rect width="241" height="338" rx="16" fill="url(#cardBack2)" stroke="#9c7b34" stroke-width="2.5"/>
  <rect x="13" y="13" width="215" height="312" rx="12" fill="none" stroke="#c9a24b" stroke-width="1.2" opacity="0.45"/>
  <line x1="13" y1="13" x2="228" y2="325" stroke="#c9a24b" stroke-width="0.6" opacity="0.22"/>
  <line x1="228" y1="13" x2="13" y2="325" stroke="#c9a24b" stroke-width="0.6" opacity="0.22"/>
</g>

<!-- Card 3: Ace of Spades, slight left tilt -->
<g transform="translate(340,580) rotate(-4) translate(-120.5,-169)" filter="url(#cardShadow)">
  <rect width="241" height="338" rx="16" fill="url(#cardFace)" stroke="rgba(0,0,0,0.22)" stroke-width="2"/>
  <text x="16" y="44" font-family="Georgia,serif" font-size="34" font-weight="bold" fill="#23211e">A</text>
  <text x="16" y="67" font-family="serif" font-size="25" fill="#23211e">♠</text>
  <text x="120.5" y="205" text-anchor="middle" dominant-baseline="central" font-family="serif" font-size="124" fill="#23211e">♠</text>
  <g transform="translate(225,324) rotate(180)">
    <text x="0" y="25" font-family="Georgia,serif" font-size="34" font-weight="bold" fill="#23211e">A</text>
    <text x="0" y="51" font-family="serif" font-size="25" fill="#23211e">♠</text>
  </g>
</g>

<!-- Card 4: Queen of Hearts, slight right tilt -->
<g transform="translate(340,580) rotate(10) translate(-120.5,-169)" filter="url(#cardShadow)">
  <rect width="241" height="338" rx="16" fill="url(#cardFace)" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
  <text x="16" y="44" font-family="Georgia,serif" font-size="34" font-weight="bold" fill="#b23b3b">Q</text>
  <text x="16" y="67" font-family="serif" font-size="25" fill="#b23b3b">♥</text>
  <text x="120.5" y="193" text-anchor="middle" dominant-baseline="central" font-family="serif" font-size="106" fill="#b23b3b">♛</text>
  <g transform="translate(225,324) rotate(180)">
    <text x="0" y="25" font-family="Georgia,serif" font-size="34" font-weight="bold" fill="#b23b3b">Q</text>
    <text x="0" y="51" font-family="serif" font-size="25" fill="#b23b3b">♥</text>
  </g>
</g>

<!-- Card 5: King of Diamonds, far right -->
<g transform="translate(340,580) rotate(24) translate(-120.5,-169)" filter="url(#cardShadow)">
  <rect width="241" height="338" rx="16" fill="url(#cardFace)" stroke="rgba(0,0,0,0.18)" stroke-width="2"/>
  <text x="16" y="44" font-family="Georgia,serif" font-size="34" font-weight="bold" fill="#b23b3b">K</text>
  <text x="16" y="67" font-family="serif" font-size="25" fill="#b23b3b">♦</text>
  <text x="120.5" y="193" text-anchor="middle" dominant-baseline="central" font-family="serif" font-size="106" fill="#b23b3b">♚</text>
  <g transform="translate(225,324) rotate(180)">
    <text x="0" y="25" font-family="Georgia,serif" font-size="34" font-weight="bold" fill="#b23b3b">K</text>
    <text x="0" y="51" font-family="serif" font-size="25" fill="#b23b3b">♦</text>
  </g>
</g>
<!-- ============================================================ -->

<!-- Wooden table edge -->
<rect x="0" y="955" width="680" height="65" fill="#3b2a1d"/>
<line x1="0" y1="955" x2="680" y2="955" stroke="#c9a24b" stroke-width="2.5"/>
<line x1="0" y1="957" x2="680" y2="957" stroke="#e8c977" stroke-width="0.7" opacity="0.4"/>
<g opacity="0.1">
  <line x1="0" y1="968" x2="680" y2="971" stroke="#e8c977" stroke-width="1"/>
  <line x1="0" y1="984" x2="680" y2="981" stroke="#c9a24b" stroke-width="1"/>
  <line x1="0" y1="999" x2="680" y2="1003" stroke="#e8c977" stroke-width="0.8"/>
</g>

<!-- Title bar -->
<rect x="0" y="0" width="680" height="195" fill="rgba(0,0,0,0.65)"/>
<line x1="0" y1="195" x2="680" y2="195" stroke="#c9a24b" stroke-width="2"/>
<line x1="0" y1="197" x2="680" y2="197" stroke="#e8c977" stroke-width="0.6" opacity="0.4"/>

<!-- Corner suit decorations -->
<text x="28" y="58" font-family="serif" font-size="30" fill="#c9a24b" opacity="0.7">♠</text>
<text x="652" y="58" text-anchor="middle" font-family="serif" font-size="30" fill="#c9a24b" opacity="0.7">♠</text>
<text x="28" y="178" font-family="serif" font-size="24" fill="#b23b3b" opacity="0.7">♥</text>
<text x="652" y="178" text-anchor="middle" font-family="serif" font-size="24" fill="#b23b3b" opacity="0.7">♥</text>

<!-- Rule lines flanking SOLITAIRE -->
<line x1="58" y1="94" x2="168" y2="94" stroke="#c9a24b" stroke-width="1" opacity="0.5"/>
<line x1="512" y1="94" x2="622" y2="94" stroke="#c9a24b" stroke-width="1" opacity="0.5"/>

<!-- SOLITAIRE title -->
<text x="341" y="96" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
      font-size="76" font-weight="700" fill="rgba(0,0,0,0.5)" letter-spacing="3">SOLITAIRE</text>
<text x="338" y="93" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
      font-size="76" font-weight="700" fill="#e8c977" letter-spacing="3"
      filter="url(#goldGlow)">SOLITAIRE</text>

<!-- CARD PARLOR subtitle — bigger, fills the space -->
<text x="340" y="172" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
      font-size="46" fill="#c9a24b" letter-spacing="10">CARD PARLOR</text>

<!-- Tagline at bottom -->
<rect x="0" y="928" width="680" height="27" fill="rgba(0,0,0,0.5)"/>
<text x="340" y="947" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
      font-size="17" fill="#c9a24b" letter-spacing="4" opacity="0.85">SIX CLASSIC GAMES · ONE TABLE</text>
</svg>