<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#0d0208"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="52%" r="62%">
      <stop offset="35%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#000000bb"/>
    </radialGradient>
    <radialGradient id="redPiece" cx="36%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#fca5a5"/>
      <stop offset="30%"  stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="redHighlight" cx="30%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#ffffff66"/>
      <stop offset="100%" stop-color="#ffffff00"/>
    </radialGradient>
    <radialGradient id="pieceGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fbbf2455"/>
      <stop offset="55%"  stop-color="#b4530922"/>
      <stop offset="100%" stop-color="#00000000"/>
    </radialGradient>
    <linearGradient id="crownGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d0208" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d0208" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d0208" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d0208" stop-opacity="1"/>
    </linearGradient>
    <filter id="titleGlow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pieceGlowF" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="1020" fill="url(#bgGrad)"/>

  <!-- ── Checkerboard — 8×8 at 105px/sq, translated+rotated to zoom in ── -->
  <g transform="translate(340,490) rotate(10) translate(-420,-420)">
    <!-- Row 0 -->
    <rect x="0"   y="0"   width="105" height="105" fill="#92400e"/>
    <rect x="105" y="0"   width="105" height="105" fill="#fef3c7"/>
    <rect x="210" y="0"   width="105" height="105" fill="#92400e"/>
    <rect x="315" y="0"   width="105" height="105" fill="#fef3c7"/>
    <rect x="420" y="0"   width="105" height="105" fill="#92400e"/>
    <rect x="525" y="0"   width="105" height="105" fill="#fef3c7"/>
    <rect x="630" y="0"   width="105" height="105" fill="#92400e"/>
    <rect x="735" y="0"   width="105" height="105" fill="#fef3c7"/>
    <!-- Row 1 -->
    <rect x="0"   y="105" width="105" height="105" fill="#fef3c7"/>
    <rect x="105" y="105" width="105" height="105" fill="#92400e"/>
    <rect x="210" y="105" width="105" height="105" fill="#fef3c7"/>
    <rect x="315" y="105" width="105" height="105" fill="#92400e"/>
    <rect x="420" y="105" width="105" height="105" fill="#fef3c7"/>
    <rect x="525" y="105" width="105" height="105" fill="#92400e"/>
    <rect x="630" y="105" width="105" height="105" fill="#fef3c7"/>
    <rect x="735" y="105" width="105" height="105" fill="#92400e"/>
    <!-- Row 2 -->
    <rect x="0"   y="210" width="105" height="105" fill="#92400e"/>
    <rect x="105" y="210" width="105" height="105" fill="#fef3c7"/>
    <rect x="210" y="210" width="105" height="105" fill="#92400e"/>
    <rect x="315" y="210" width="105" height="105" fill="#fef3c7"/>
    <rect x="420" y="210" width="105" height="105" fill="#92400e"/>
    <rect x="525" y="210" width="105" height="105" fill="#fef3c7"/>
    <rect x="630" y="210" width="105" height="105" fill="#92400e"/>
    <rect x="735" y="210" width="105" height="105" fill="#fef3c7"/>
    <!-- Row 3 -->
    <rect x="0"   y="315" width="105" height="105" fill="#fef3c7"/>
    <rect x="105" y="315" width="105" height="105" fill="#92400e"/>
    <rect x="210" y="315" width="105" height="105" fill="#fef3c7"/>
    <rect x="315" y="315" width="105" height="105" fill="#92400e"/>
    <rect x="420" y="315" width="105" height="105" fill="#fef3c7"/>
    <rect x="525" y="315" width="105" height="105" fill="#92400e"/>
    <rect x="630" y="315" width="105" height="105" fill="#fef3c7"/>
    <rect x="735" y="315" width="105" height="105" fill="#92400e"/>
    <!-- Row 4 -->
    <rect x="0"   y="420" width="105" height="105" fill="#92400e"/>
    <rect x="105" y="420" width="105" height="105" fill="#fef3c7"/>
    <rect x="210" y="420" width="105" height="105" fill="#92400e"/>
    <rect x="315" y="420" width="105" height="105" fill="#fef3c7"/>
    <rect x="420" y="420" width="105" height="105" fill="#92400e"/>
    <rect x="525" y="420" width="105" height="105" fill="#fef3c7"/>
    <rect x="630" y="420" width="105" height="105" fill="#92400e"/>
    <rect x="735" y="420" width="105" height="105" fill="#fef3c7"/>
    <!-- Row 5 -->
    <rect x="0"   y="525" width="105" height="105" fill="#fef3c7"/>
    <rect x="105" y="525" width="105" height="105" fill="#92400e"/>
    <rect x="210" y="525" width="105" height="105" fill="#fef3c7"/>
    <rect x="315" y="525" width="105" height="105" fill="#92400e"/>
    <rect x="420" y="525" width="105" height="105" fill="#fef3c7"/>
    <rect x="525" y="525" width="105" height="105" fill="#92400e"/>
    <rect x="630" y="525" width="105" height="105" fill="#fef3c7"/>
    <rect x="735" y="525" width="105" height="105" fill="#92400e"/>
    <!-- Row 6 -->
    <rect x="0"   y="630" width="105" height="105" fill="#92400e"/>
    <rect x="105" y="630" width="105" height="105" fill="#fef3c7"/>
    <rect x="210" y="630" width="105" height="105" fill="#92400e"/>
    <rect x="315" y="630" width="105" height="105" fill="#fef3c7"/>
    <rect x="420" y="630" width="105" height="105" fill="#92400e"/>
    <rect x="525" y="630" width="105" height="105" fill="#fef3c7"/>
    <rect x="630" y="630" width="105" height="105" fill="#92400e"/>
    <rect x="735" y="630" width="105" height="105" fill="#fef3c7"/>
    <!-- Row 7 -->
    <rect x="0"   y="735" width="105" height="105" fill="#fef3c7"/>
    <rect x="105" y="735" width="105" height="105" fill="#92400e"/>
    <rect x="210" y="735" width="105" height="105" fill="#fef3c7"/>
    <rect x="315" y="735" width="105" height="105" fill="#92400e"/>
    <rect x="420" y="735" width="105" height="105" fill="#fef3c7"/>
    <rect x="525" y="735" width="105" height="105" fill="#92400e"/>
    <rect x="630" y="735" width="105" height="105" fill="#fef3c7"/>
    <rect x="735" y="735" width="105" height="105" fill="#92400e"/>
  </g>

  <!-- Vignette over board -->
  <rect width="680" height="1020" fill="url(#vignette)"/>

  <!-- Top fade for title area -->
  <rect width="680" height="340" fill="url(#topFade)"/>

  <!-- Bottom fade for subtitle area -->
  <rect y="680" width="680" height="340" fill="url(#botFade)"/>

  <!-- Amber glow behind piece -->
  <ellipse cx="340" cy="490" rx="180" ry="160" fill="url(#pieceGlow)"/>

  <!-- ── King Piece centered at (340, 480) ── -->
  <g transform="translate(340,480)" filter="url(#pieceGlowF)">
    <!-- Drop shadow -->
    <ellipse cx="4" cy="78" rx="78" ry="20" fill="#00000066"/>
    <!-- Edge ring -->
    <circle cx="0" cy="0" r="88" fill="#5c0a00"/>
    <!-- Main body -->
    <circle cx="0" cy="0" r="80" fill="url(#redPiece)"/>
    <!-- Highlight -->
    <circle cx="0" cy="0" r="75" fill="url(#redHighlight)"/>
    <!-- Subtle inner ring -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="#dc262622" stroke-width="4"/>

    <!-- ── Crown ── -->
    <!-- Base band -->
    <rect x="-40" y="10" width="80" height="20" rx="4" fill="url(#crownGold)" stroke="#78350f" stroke-width="1.5"/>
    <!-- Crown shape -->
    <polygon points="-40,10 -40,-32 -28,-10 -20,-38 0,-12 20,-38 28,-10 40,-32 40,10"
             fill="url(#crownGold)" stroke="#78350f" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Gem row -->
    <circle cx="-20" cy="4"  r="7" fill="#b91c1c" stroke="#fca5a5" stroke-width="1.5"/>
    <circle cx="0"   cy="4"  r="7" fill="#b91c1c" stroke="#fca5a5" stroke-width="1.5"/>
    <circle cx="20"  cy="4"  r="7" fill="#b91c1c" stroke="#fca5a5" stroke-width="1.5"/>
    <!-- Tip jewels -->
    <circle cx="-20" cy="-30" r="5.5" fill="#fcd34d" stroke="#92400e" stroke-width="1"/>
    <circle cx="0"   cy="-38" r="7"   fill="#fcd34d" stroke="#92400e" stroke-width="1"/>
    <circle cx="20"  cy="-30" r="5.5" fill="#fcd34d" stroke="#92400e" stroke-width="1"/>
  </g>

  <!-- ── Title ── -->
  <!-- Glow pass -->
  <text x="340" y="195" text-anchor="middle"
        font-family="Georgia, serif" font-size="88" font-weight="bold" letter-spacing="5"
        fill="#fbbf24" opacity="0.4" filter="url(#titleGlow)">CHECKERS</text>
  <!-- Solid pass -->
  <text x="340" y="195" text-anchor="middle"
        font-family="Georgia, serif" font-size="88" font-weight="bold" letter-spacing="5"
        fill="#fef3c7">CHECKERS</text>

  <!-- Rule line -->
  <rect x="130" y="214" width="420" height="2" rx="1" fill="#b45309" opacity="0.65"/>

  <!-- Subtitle -->
  <text x="340" y="252" text-anchor="middle"
        font-family="Georgia, serif" font-size="22" letter-spacing="7"
        fill="#a16207" opacity="0.9">CLASSIC BOARD GAME</text>

  <!-- Bottom label -->
  <text x="340" y="942" text-anchor="middle"
        font-family="Georgia, serif" font-size="19" letter-spacing="4"
        fill="#92400e" opacity="0.8">BOT · MULTIPLAYER</text>

  <!-- Corner mini-board motifs -->
  <rect x="34"  y="954" width="11" height="11" fill="#92400e" opacity="0.55"/>
  <rect x="45"  y="954" width="11" height="11" fill="#fef3c7" opacity="0.3"/>
  <rect x="56"  y="954" width="11" height="11" fill="#92400e" opacity="0.55"/>
  <rect x="34"  y="965" width="11" height="11" fill="#fef3c7" opacity="0.3"/>
  <rect x="45"  y="965" width="11" height="11" fill="#92400e" opacity="0.55"/>
  <rect x="56"  y="965" width="11" height="11" fill="#fef3c7" opacity="0.3"/>

  <rect x="602" y="954" width="11" height="11" fill="#fef3c7" opacity="0.3"/>
  <rect x="613" y="954" width="11" height="11" fill="#92400e" opacity="0.55"/>
  <rect x="624" y="954" width="11" height="11" fill="#fef3c7" opacity="0.3"/>
  <rect x="602" y="965" width="11" height="11" fill="#92400e" opacity="0.55"/>
  <rect x="613" y="965" width="11" height="11" fill="#fef3c7" opacity="0.3"/>
  <rect x="624" y="965" width="11" height="11" fill="#92400e" opacity="0.55"/>
</svg>
