<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="aaBg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#070d24"/>
    <stop offset="0.42" stop-color="#122048"/>
    <stop offset="0.72" stop-color="#1b2f5e"/>
    <stop offset="1" stop-color="#0b1530"/>
  </linearGradient>
  <radialGradient id="aaMoon" cx="38%" cy="34%" r="70%">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset="0.65" stop-color="#dbe6f5"/>
    <stop offset="1" stop-color="#aebfd9"/>
  </radialGradient>
  <radialGradient id="aaMoonHalo" cx="50%" cy="50%" r="50%">
    <stop offset="0.55" stop-color="rgba(214,230,255,0.35)"/>
    <stop offset="1" stop-color="rgba(214,230,255,0)"/>
  </radialGradient>
  <linearGradient id="aaBeam" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="rgba(125,255,160,0.85)"/>
    <stop offset="1" stop-color="rgba(125,255,160,0.05)"/>
  </linearGradient>
  <linearGradient id="aaSnowA" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#e9f0fc"/>
    <stop offset="1" stop-color="#9fb4d8"/>
  </linearGradient>
  <linearGradient id="aaSnowB" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#b9c9e6"/>
    <stop offset="1" stop-color="#7288b3"/>
  </linearGradient>
  <radialGradient id="aaHeadShine" cx="35%" cy="28%" r="75%">
    <stop offset="0" stop-color="#8ef07a"/>
    <stop offset="0.6" stop-color="#63d94e"/>
    <stop offset="1" stop-color="#3d9c33"/>
  </radialGradient>
  <linearGradient id="aaDeck" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#19e0ad"/>
    <stop offset="1" stop-color="#0e8f6e"/>
  </linearGradient>
  <filter id="aaGlow" x="-30%" y="-60%" width="160%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="aaSoft" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
  </filter>
</defs>

<!-- 1. night sky -->
<rect width="680" height="1020" fill="url(#aaBg)"/>

<!-- 2. aurora curtains -->
<path d="M -20 340 C 120 240 260 320 420 210 C 520 145 620 190 700 130 L 700 40 C 560 110 430 60 300 160 C 180 250 60 230 -20 300 Z"
      fill="#3ddc97" opacity="0.16" filter="url(#aaSoft)"/>
<path d="M -20 300 C 140 210 300 270 460 170 C 560 110 640 150 700 100 L 700 60 C 580 120 470 80 330 170 C 210 250 80 230 -20 280 Z"
      fill="#66f0c8" opacity="0.12" filter="url(#aaSoft)"/>

<!-- 3. stars -->
<g fill="#e8eeff">
  <circle cx="60" cy="90" r="2"/><circle cx="150" cy="60" r="1.4"/><circle cx="240" cy="120" r="1.7" opacity=".8"/>
  <circle cx="320" cy="70" r="1.3"/><circle cx="430" cy="95" r="2.1"/><circle cx="80" cy="220" r="1.5" opacity=".7"/>
  <circle cx="180" cy="260" r="1.2"/><circle cx="612" cy="80" r="1.6"/><circle cx="650" cy="330" r="1.8" opacity=".8"/>
  <circle cx="40" cy="420" r="1.5"/><circle cx="120" cy="380" r="1.2" opacity=".7"/><circle cx="280" cy="330" r="1.4"/>
  <circle cx="380" cy="280" r="1.8"/><circle cx="470" cy="360" r="1.3" opacity=".8"/><circle cx="580" cy="420" r="1.5"/>
  <circle cx="35" cy="560" r="1.4" opacity=".7"/><circle cx="640" cy="520" r="1.6"/><circle cx="520" cy="180" r="1.3"/>
</g>

<!-- 4. moon with craters -->
<circle cx="552" cy="252" r="128" fill="url(#aaMoonHalo)"/>
<circle cx="552" cy="252" r="72" fill="url(#aaMoon)"/>
<circle cx="530" cy="230" r="13" fill="#b7c8de" opacity=".7"/>
<circle cx="575" cy="270" r="9" fill="#b7c8de" opacity=".6"/>
<circle cx="548" cy="290" r="6" fill="#b7c8de" opacity=".55"/>
<circle cx="586" cy="228" r="5" fill="#c3d2e6" opacity=".5"/>
<path d="M 610 200 A 72 72 0 0 1 610 305 A 95 95 0 0 0 610 200 Z" fill="#0a1130" opacity=".5"/>

<!-- 5. saucer + tractor beam + cow -->
<g transform="translate(120,330)">
  <polygon points="-46,26 46,26 78,150 -78,150" fill="url(#aaBeam)"/>
  <ellipse cx="0" cy="20" rx="62" ry="18" fill="#b9c6d6"/>
  <ellipse cx="0" cy="12" rx="34" ry="14" fill="#93a3b6"/>
  <ellipse cx="0" cy="9" rx="28" ry="8" fill="#c7d2e0"/>
  <ellipse cx="0" cy="11" rx="28" ry="8" fill="none" stroke="#6f7f93" stroke-width="1.4" opacity=".55"/>
  <path d="M -24 6 A 26 20 0 0 1 24 6 L 24 12 L -24 12 Z" fill="#8de3ff" opacity=".85"/>
  <path d="M -24 6 A 26 20 0 0 1 24 6" fill="none" stroke="#eaf9ff" stroke-width="1.6" opacity=".7"/>
  <ellipse cx="0" cy="7" rx="24" ry="5.5" fill="none" stroke="#6f7f93" stroke-width="2"/>
  <ellipse cx="-8" cy="-3" rx="7" ry="4" fill="#dbf5ff" opacity=".5"/>
  <circle cx="-10" cy="0" r="2.3" fill="#eaffff"/><circle cx="0" cy="-3" r="2.3" fill="#eaffff"/><circle cx="10" cy="0" r="2.3" fill="#eaffff"/>
  <circle cx="-20" cy="12" r="1.5" fill="#6f7f93"/><circle cx="20" cy="12" r="1.5" fill="#6f7f93"/><circle cx="0" cy="14" r="1.5" fill="#6f7f93"/>
  <circle cx="-40" cy="24" r="4" fill="#ffd76b"/><circle cx="-14" cy="30" r="4" fill="#ff5d5d"/>
  <circle cx="14" cy="30" r="4" fill="#8dff9a"/><circle cx="40" cy="24" r="4" fill="#ffd76b"/>
  <!-- abductee -->
  <g transform="translate(-4,112) rotate(-14)">
    <ellipse cx="0" cy="0" rx="26" ry="15" fill="#f2f0ea"/>
    <ellipse cx="-8" cy="-3" rx="9" ry="6" fill="#2b2a28"/>
    <ellipse cx="10" cy="5" rx="7" ry="5" fill="#2b2a28"/>
    <rect x="18" y="-12" width="13" height="11" rx="3" fill="#f2f0ea"/>
    <rect x="26" y="-6" width="6" height="4" fill="#e8b8c8"/>
    <rect x="-16" y="12" width="5" height="9" fill="#f2f0ea"/><rect x="6" y="12" width="5" height="9" fill="#f2f0ea"/>
  </g>
</g>

<!-- 6. slopes: steep >45° upper face, dropped low, descending left -> right -->
<polygon points="-10,580 242,751 462,692 690,923 690,1030 -10,1030" fill="url(#aaSnowB)"/>
<polygon points="-10,690 252,821 502,754 690,957 690,1030 -10,1030" fill="url(#aaSnowA)"/>

<!-- 7. pines: small distant pair on the back mountain, big ones up front -->
<g>
  <g transform="translate(210,782) scale(.7)"><polygon points="0,-52 22,10 -22,10" fill="#173a2e"/><polygon points="0,-52 13,-18 -13,-18" fill="#e9f0fc"/><rect x="-4" y="10" width="8" height="14" fill="#5b4230"/></g>
  <g transform="translate(560,868) scale(.75)"><polygon points="0,-52 22,10 -22,10" fill="#173a2e"/><polygon points="0,-52 13,-18 -13,-18" fill="#e9f0fc"/><rect x="-4" y="10" width="8" height="14" fill="#5b4230"/></g>
  <g transform="translate(150,852) scale(1.25)"><polygon points="0,-52 22,10 -22,10" fill="#1d4636"/><polygon points="0,-52 13,-18 -13,-18" fill="#e9f0fc"/><rect x="-4" y="10" width="8" height="14" fill="#5b4230"/></g>
  <g transform="translate(648,950) scale(1.4)"><polygon points="0,-52 22,10 -22,10" fill="#1d4636"/><polygon points="0,-52 13,-18 -13,-18" fill="#e9f0fc"/><rect x="-4" y="10" width="8" height="14" fill="#5b4230"/></g>
  <g transform="translate(38,880) scale(1.6)"><polygon points="0,-52 22,10 -22,10" fill="#1d4636"/><polygon points="0,-52 13,-18 -13,-18" fill="#e9f0fc"/><rect x="-4" y="10" width="8" height="14" fill="#5b4230"/></g>
</g>

<!-- 8. snow spray behind the rider -->
<g fill="#ffffff" transform="translate(0,-102)">
  <circle cx="205" cy="795" r="9" opacity=".8"/><circle cx="175" cy="815" r="13" opacity=".6"/>
  <circle cx="150" cy="840" r="17" opacity=".4"/><circle cx="235" cy="805" r="6" opacity=".9"/>
  <circle cx="128" cy="862" r="21" opacity=".25"/><circle cx="255" cy="785" r="4" opacity=".9"/>
</g>

<!-- 9. the alien, mid-air indy grab -->
<g transform="translate(360,618) rotate(-14)">
  <!-- board -->
  <g transform="rotate(8)">
    <rect x="-95" y="52" width="190" height="20" rx="10" fill="url(#aaDeck)"/>
    <rect x="-30" y="52" width="60" height="20" fill="#0c2b28"/>
    <rect x="-95" y="55" width="190" height="4" rx="2" fill="#baffe9" opacity=".5"/>
    <rect x="-38" y="40" width="22" height="14" rx="3" fill="#1a222c"/>
    <rect x="18" y="40" width="22" height="14" rx="3" fill="#1a222c"/>
  </g>
  <!-- legs -->
  <path d="M -22 -6 L -34 26 L -28 46 L -12 42 L -14 18 Z" fill="#25313f"/>
  <path d="M 18 -8 L 34 22 L 30 46 L 14 44 L 12 14 Z" fill="#25313f"/>
  <!-- torso -->
  <path d="M -26 -66 L 26 -62 L 30 -4 L -28 -8 Z" fill="#e8543f"/>
  <rect x="-4" y="-62" width="7" height="56" fill="#ffd9c4" opacity=".85"/>
  <!-- back arm up -->
  <path d="M 20 -58 L 56 -84 L 64 -72 L 30 -44 Z" fill="#c23c2c"/>
  <circle cx="62" cy="-80" r="9" fill="#1b232e"/>
  <!-- front arm reaching to grab the board -->
  <path d="M -22 -50 L -46 8 L -34 18 L -12 -34 Z" fill="#c23c2c"/>
  <circle cx="-40" cy="16" r="9" fill="#1b232e"/>
  <!-- scarf -->
  <path d="M -18 -76 Q 0 -66 20 -74 L 18 -58 Q 0 -52 -16 -60 Z" fill="#d9483b"/>
  <path d="M -16 -66 Q -46 -52 -62 -28 L -50 -20 Q -34 -44 -12 -56 Z" fill="#c23c30"/>
  <!-- head -->
  <ellipse cx="2" cy="-102" rx="34" ry="40" fill="url(#aaHeadShine)"/>
  <ellipse cx="4" cy="-72" rx="16" ry="11" fill="#4fb83e"/>
  <ellipse cx="-11" cy="-104" rx="9" ry="15" fill="#0a0e13" transform="rotate(-14 -11 -104)"/>
  <ellipse cx="19" cy="-102" rx="9" ry="15" fill="#0a0e13" transform="rotate(10 19 -102)"/>
  <path d="M -6 -138 L -12 -158" stroke="#63d94e" stroke-width="4" stroke-linecap="round"/>
  <circle cx="-13" cy="-161" r="6" fill="#b0ff8a"/>
  <path d="M 14 -138 L 22 -156" stroke="#63d94e" stroke-width="4" stroke-linecap="round"/>
  <circle cx="24" cy="-159" r="6" fill="#b0ff8a"/>
</g>

<!-- 10. title: glow layer beneath, bordered lettering on top -->
<text x="343" y="143" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900"
      font-size="92" letter-spacing="6" fill="rgba(0,0,0,0.5)">ALIEN ALPS</text>
<text x="340" y="140" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900"
      font-size="92" letter-spacing="6" fill="#7dffa0" filter="url(#aaGlow)">ALIEN ALPS</text>
<text x="340" y="140" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900"
      font-size="92" letter-spacing="6" fill="#7dffa0" stroke="#0a2e18" stroke-width="2.5"
      paint-order="stroke">ALIEN ALPS</text>

<!-- 11. tagline quote, bottom -->
<text x="343" y="983" text-anchor="middle" font-family="Arial,'Helvetica Neue',Helvetica,sans-serif"
      font-weight="400" font-size="40" letter-spacing="3" fill="rgba(0,0,0,0.55)">"Out of this World!"</text>
<text x="340" y="980" text-anchor="middle" font-family="Arial,'Helvetica Neue',Helvetica,sans-serif"
      font-weight="400" font-size="40" letter-spacing="3" fill="#c8ffe0">"Out of this World!"</text>
</svg>
