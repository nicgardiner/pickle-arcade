<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#02010a"/>
    <stop offset="30%" stop-color="#08041a"/>
    <stop offset="65%" stop-color="#100820"/>
    <stop offset="85%" stop-color="#1a0808"/>
    <stop offset="100%" stop-color="#240c04"/>
  </linearGradient>
  <linearGradient id="stoneFloor" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1c1c28"/>
    <stop offset="100%" stop-color="#0a0a14"/>
  </linearGradient>
  <linearGradient id="swordBlade" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#c8c0d8"/>
    <stop offset="40%" stop-color="#aaa0b8"/>
    <stop offset="100%" stop-color="#666078"/>
  </linearGradient>
  <radialGradient id="bossEyeL" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff4400"/>
    <stop offset="100%" stop-color="#cc1100"/>
  </radialGradient>
  <radialGradient id="knightGlow" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#c0a04044" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#00000000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="runeGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#4422cc" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#220088" stop-opacity="0"/>
  </radialGradient>
  <filter id="titleGlow" x="-25%" y="-60%" width="150%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur1"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
    <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="plumeGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="680" height="1020" fill="url(#bgGrad)"/>

<!-- Ambient red/purple atmospheric glow -->
<ellipse cx="340" cy="700" rx="300" ry="200" fill="#aa1100" opacity="0.12"/>
<ellipse cx="340" cy="400" rx="250" ry="300" fill="#220055" opacity="0.15"/>

<!-- Stone wall bricks (background, top) -->
<g opacity="0.35" fill="#14141e">
  <!-- brick rows -->
  <rect x="0" y="0" width="680" height="14"/>
  <rect x="0" y="15" width="680" height="1" fill="#0a0a14"/>
  <rect x="0" y="28" width="680" height="14"/>
  <rect x="0" y="29" width="680" height="1" fill="#0a0a14"/>
  <rect x="0" y="42" width="680" height="14"/>
  <rect x="0" y="43" width="680" height="1" fill="#0a0a14"/>
  <rect x="0" y="56" width="680" height="14"/>
  <rect x="0" y="57" width="680" height="1" fill="#0a0a14"/>
</g>
<!-- Vertical mortar lines (offset per row) -->
<g opacity="0.2" fill="#0a0a14">
  <rect x="0" y="0" width="1" height="14"/><rect x="56" y="0" width="1" height="14"/><rect x="112" y="0" width="1" height="14"/><rect x="168" y="0" width="1" height="14"/><rect x="224" y="0" width="1" height="14"/><rect x="280" y="0" width="1" height="14"/><rect x="336" y="0" width="1" height="14"/><rect x="392" y="0" width="1" height="14"/><rect x="448" y="0" width="1" height="14"/><rect x="504" y="0" width="1" height="14"/><rect x="560" y="0" width="1" height="14"/><rect x="616" y="0" width="1" height="14"/>
  <rect x="28" y="28" width="1" height="14"/><rect x="84" y="28" width="1" height="14"/><rect x="140" y="28" width="1" height="14"/><rect x="196" y="28" width="1" height="14"/><rect x="252" y="28" width="1" height="14"/><rect x="308" y="28" width="1" height="14"/><rect x="364" y="28" width="1" height="14"/><rect x="420" y="28" width="1" height="14"/><rect x="476" y="28" width="1" height="14"/><rect x="532" y="28" width="1" height="14"/><rect x="588" y="28" width="1" height="14"/><rect x="644" y="28" width="1" height="14"/>
</g>

<!-- Dungeon archway -->
<rect x="180" y="200" width="320" height="600" fill="#08060f" opacity="0.6"/>
<rect x="178" y="198" width="6" height="600" fill="#1e1a2e"/>
<rect x="496" y="198" width="6" height="600" fill="#1e1a2e"/>
<!-- Arch curve (top of doorway) -->
<ellipse cx="340" cy="200" rx="163" ry="50" fill="#08060f" opacity="0.7"/>
<ellipse cx="340" cy="200" rx="163" ry="50" fill="none" stroke="#1e1a2e" stroke-width="6"/>

<!-- Stone floor -->
<rect x="0" y="850" width="680" height="170" fill="url(#stoneFloor)"/>
<rect x="0" y="850" width="680" height="2" fill="#2e2e48" opacity="0.6"/>
<!-- Floor tile lines -->
<g opacity="0.15" stroke="#2e2e48" stroke-width="1">
  <line x1="0" y1="872" x2="680" y2="872"/>
  <line x1="0" y1="894" x2="680" y2="894"/>
  <line x1="0" y1="916" x2="680" y2="916"/>
  <line x1="90" y1="850" x2="90" y2="1020"/>
  <line x1="180" y1="850" x2="180" y2="1020"/>
  <line x1="270" y1="850" x2="270" y2="1020"/>
  <line x1="360" y1="850" x2="360" y2="1020"/>
  <line x1="450" y1="850" x2="450" y2="1020"/>
  <line x1="540" y1="850" x2="540" y2="1020"/>
  <line x1="630" y1="850" x2="630" y2="1020"/>
</g>

<!-- Rune circle on floor -->
<g filter="url(#softGlow)">
  <ellipse cx="340" cy="870" rx="90" ry="20" fill="none" stroke="#4422cc" stroke-width="2" opacity="0.6"/>
  <ellipse cx="340" cy="870" rx="60" ry="12" fill="none" stroke="#6633ee" stroke-width="1" opacity="0.4"/>
  <line x1="260" y1="870" x2="420" y2="870" stroke="#4422cc" stroke-width="1" opacity="0.3"/>
  <line x1="295" y1="854" x2="385" y2="886" stroke="#4422cc" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="854" x2="295" y2="886" stroke="#4422cc" stroke-width="1" opacity="0.3"/>
</g>

<!-- ══ CRYPT LORD BOSS (background, looming) ══ -->
<g transform="translate(340, 490)" opacity="0.78">
  <!-- Glow behind boss -->
  <ellipse cx="0" cy="0" rx="130" ry="170" fill="#cc1100" opacity="0.12"/>
  <!-- Robes -->
  <polygon points="-70,180 70,180 55,-10 -55,-10" fill="#1a0808"/>
  <polygon points="-55,-10 55,-10 40,-30 -40,-30" fill="#220a0a"/>
  <!-- Skull head -->
  <ellipse cx="0" cy="-70" rx="48" ry="44" fill="#6a5840"/>
  <ellipse cx="0" cy="-60" rx="38" ry="32" fill="#7a6848"/>
  <!-- Jaw -->
  <rect x="-22" y="-44" width="44" height="14" rx="4" fill="#5a4830"/>
  <!-- Teeth -->
  <rect x="-18" y="-44" width="5" height="8" fill="#c8c0a0"/>
  <rect x="-9" y="-44" width="5" height="10" fill="#c8c0a0"/>
  <rect x="0" y="-44" width="5" height="8" fill="#c8c0a0"/>
  <rect x="9" y="-44" width="5" height="10" fill="#c8c0a0"/>
  <!-- Eye sockets -->
  <ellipse cx="-16" cy="-70" rx="12" ry="11" fill="#100808"/>
  <ellipse cx="16" cy="-70" rx="12" ry="11" fill="#100808"/>
  <!-- Glowing eyes -->
  <ellipse cx="-16" cy="-70" rx="7" ry="6" fill="#ff3300" filter="url(#redGlow)" opacity="0.9"/>
  <ellipse cx="16" cy="-70" rx="7" ry="6" fill="#ff3300" filter="url(#redGlow)" opacity="0.9"/>
  <!-- Crown -->
  <rect x="-36" y="-118" width="72" height="12" fill="#c09040"/>
  <polygon points="-30,-118 -24,-138 -18,-118" fill="#c09040"/>
  <polygon points="-8,-118 0,-142 8,-118" fill="#c09040"/>
  <polygon points="18,-118 24,-138 30,-118" fill="#c09040"/>
  <!-- Bony hands reaching -->
  <g fill="#7a6848">
    <rect x="-70" y="20" width="14" height="60" rx="4" transform="rotate(-20,-63,50)"/>
    <rect x="-74" y="78" width="6" height="22" rx="2" transform="rotate(-15,-71,89)"/>
    <rect x="-66" y="78" width="6" height="22" rx="2" transform="rotate(-5,-63,89)"/>
    <rect x="56" y="20" width="14" height="60" rx="4" transform="rotate(20,63,50)"/>
    <rect x="60" y="78" width="6" height="22" rx="2" transform="rotate(15,63,89)"/>
    <rect x="68" y="78" width="6" height="22" rx="2" transform="rotate(5,71,89)"/>
  </g>
</g>

<!-- ══ SKELETON ENEMY (fallen, bottom left) ══ -->
<g transform="translate(100, 820) rotate(-30)" opacity="0.7" fill="#ccc0a8">
  <ellipse cx="0" cy="-40" rx="14" ry="14"/>
  <rect x="-6" y="-26" width="12" height="22"/>
  <rect x="-16" y="-22" width="12" height="5" rx="2"/>
  <rect x="4" y="-22" width="12" height="5" rx="2"/>
  <rect x="-5" y="-4" width="4" height="18" transform="rotate(-10,-3,6)"/>
  <rect x="1" y="-4" width="4" height="18" transform="rotate(10,3,6)"/>
</g>

<!-- Bone shards -->
<g fill="#bbb098" opacity="0.5">
  <rect x="55" y="838" width="14" height="3" rx="1" transform="rotate(25,62,840)"/>
  <rect x="72" y="848" width="10" height="2" rx="1" transform="rotate(-15,77,849)"/>
  <rect x="38" y="852" width="8" height="2" rx="1" transform="rotate(40,42,853)"/>
</g>

<!-- ══ THE BLACK KNIGHT SPRITE (main, center, large) ══ -->
<!-- Scaled up, centered at x=340, standing on floor at y=850 -->
<!-- Base: s=7 (7px per game unit) centered -->
<!-- Knight sprite from code: 16 game-units wide, ~22 tall with plume -->
<g transform="translate(340, 570)">
  <!-- Knight glow -->
  <ellipse cx="0" cy="100" rx="100" ry="140" fill="url(#knightGlow)"/>

  <!-- PLUME (extends above helmet) — glow version -->
  <g filter="url(#plumeGlow)">
    <rect x="-10" y="-168" width="20" height="42" rx="4" fill="#cc4422"/>
    <rect x="-8" y="-168" width="16" height="14" rx="3" fill="#ee6633"/>
  </g>
  <!-- Plume solid on top -->
  <rect x="-9" y="-168" width="18" height="42" rx="3" fill="#cc4422"/>
  <rect x="-7" y="-168" width="14" height="14" rx="2" fill="#ee6633"/>

  <!-- HELMET -->
  <rect x="-42" y="-126" width="84" height="28" fill="#1a1a2e"/>
  <rect x="-42" y="-126" width="84" height="70" rx="6" fill="#2e2e48"/>
  <rect x="-28" y="-112" width="56" height="42" fill="#3a3a58"/>
  <rect x="-14" y="-98" width="28" height="14" fill="#221f10"/>
  <!-- Visor slit -->
  <rect x="-10" y="-91" width="20" height="4" fill="#c09040" opacity="0.6"/>
  <!-- Face peek -->
  <rect x="-7" y="-95" width="14" height="6" fill="#c09040"/>
  <!-- Gold collar trim -->
  <rect x="-49" y="-56" width="98" height="10" fill="#c09040"/>

  <!-- LEFT ARM (shield side) -->
  <rect x="-70" y="-42" width="28" height="84" rx="6" fill="#383858"/>
  <rect x="-56" y="-42" width="14" height="70" rx="3" fill="#2a2a48"/>
  <!-- SHIELD -->
  <rect x="-84" y="-35" width="20" height="70" rx="4" fill="#555060"/>
  <rect x="-77" y="-35" width="10" height="70" rx="2" fill="#6a6888"/>
  <rect x="-77" y="-7" width="10" height="20" fill="#aa8822"/>

  <!-- BODY ARMOUR -->
  <rect x="-49" y="-56" width="98" height="112" rx="4" fill="#181826"/>
  <rect x="-35" y="-46" width="70" height="98" fill="#22223a"/>
  <rect x="-21" y="-35" width="42" height="84" fill="#2e2e48"/>

  <!-- RIGHT ARM (sword side) -->
  <rect x="42" y="-60" width="28" height="70" rx="6" fill="#383858"/>
  <rect x="42" y="-60" width="14" height="56" rx="3" fill="#2a2a48"/>

  <!-- SWORD (raised) -->
  <!-- Crossguard -->
  <rect x="56" y="14" width="42" height="10" rx="2" fill="#c0b080"/>
  <!-- Handle -->
  <rect x="63" y="24" width="14" height="28" rx="3" fill="#5a4820"/>
  <!-- Pommel -->
  <ellipse cx="70" cy="56" rx="10" ry="8" fill="#c0b080"/>
  <!-- Blade -->
  <rect x="63" y="-84" width="8" height="100" fill="url(#swordBlade)"/>
  <rect x="65" y="-84" width="4" height="100" fill="#c8c0d8" opacity="0.6"/>
  <!-- Blade tip -->
  <polygon points="63,-84 71,-84 67,-112" fill="#c8c0d8"/>

  <!-- LEGS -->
  <rect x="-28" y="56" width="24" height="70" rx="4" fill="#1a1826"/>
  <rect x="4" y="56" width="24" height="70" rx="4" fill="#1a1826"/>
  <!-- Boots -->
  <rect x="-35" y="112" width="28" height="20" rx="4" fill="#141420"/>
  <rect x="7" y="112" width="28" height="20" rx="4" fill="#141420"/>

  <!-- Gold trim details on body -->
  <rect x="-21" y="-35" width="42" height="6" fill="#c09040" opacity="0.5"/>
  <rect x="-21" y="49" width="42" height="5" fill="#c09040" opacity="0.5"/>
</g>

<!-- ══ FLOATING CARD ICONS (roguelite flavour) ══ -->
<g opacity="0.55" font-family="serif" text-anchor="middle" dominant-baseline="middle">
  <!-- Card silhouette left -->
  <rect x="58" y="440" width="78" height="100" rx="6" fill="#09070e" stroke="#2a1e14" stroke-width="1.5"/>
  <rect x="64" y="446" width="66" height="56" rx="3" fill="#100d18"/>
  <text x="97" y="476" font-size="22" fill="#cc4422">⚔</text>
  <text x="97" y="518" font-size="11" fill="#c09040" letter-spacing="1" font-family="monospace">ATTACK</text>
  <!-- Card silhouette right -->
  <rect x="544" y="460" width="78" height="100" rx="6" fill="#09070e" stroke="#2a1e14" stroke-width="1.5"/>
  <rect x="550" y="466" width="66" height="56" rx="3" fill="#100d18"/>
  <text x="583" y="496" font-size="22" fill="#4488dd">🛡</text>
  <text x="583" y="538" font-size="11" fill="#c09040" letter-spacing="1" font-family="monospace">DEFEND</text>
  <!-- Partial card top-right -->
  <rect x="572" y="370" width="78" height="100" rx="6" fill="#09070e" stroke="#2a1e14" stroke-width="1.5" opacity="0.7" transform="rotate(12,611,420)"/>
  <!-- Partial card top-left -->
  <rect x="28" y="360" width="78" height="100" rx="6" fill="#09070e" stroke="#2a1e14" stroke-width="1.5" opacity="0.6" transform="rotate(-8,67,410)"/>
</g>

<!-- Atmospheric particles / dust motes -->
<g fill="#c09040" opacity="0.3">
  <circle cx="160" cy="300" r="2"/>
  <circle cx="220" cy="450" r="1.5"/>
  <circle cx="140" cy="600" r="1"/>
  <circle cx="500" cy="320" r="2"/>
  <circle cx="560" cy="480" r="1.5"/>
  <circle cx="480" cy="640" r="1"/>
  <circle cx="340" cy="280" r="1.5"/>
  <circle cx="260" cy="540" r="1"/>
  <circle cx="420" cy="560" r="1"/>
</g>

<!-- ══ TITLE ══ -->
<text x="340" y="132" font-family="'Cinzel', 'Georgia', serif"
      font-size="72" font-weight="700" text-anchor="middle"
      letter-spacing="6" fill="#c0a060" filter="url(#titleGlow)">BLACK</text>
<text x="340" y="214" font-family="'Cinzel', 'Georgia', serif"
      font-size="72" font-weight="700" text-anchor="middle"
      letter-spacing="6" fill="#c0a060" filter="url(#titleGlow)">KNIGHT</text>

<!-- Decorative title rules -->
<line x1="80" y1="228" x2="236" y2="228" stroke="#c0a060" stroke-width="1.5" opacity="0.5"/>
<line x1="444" y1="228" x2="600" y2="228" stroke="#c0a060" stroke-width="1.5" opacity="0.5"/>
<rect x="316" y="224" width="48" height="8" rx="2" fill="#c0a060" opacity="0.3"/>

<!-- Subtitle -->
<text x="340" y="260" font-family="'Cinzel', 'Georgia', serif" font-size="16"
      text-anchor="middle" fill="#886040" letter-spacing="5" opacity="0.8">ROGUELIKE</text>

<!-- Bottom label -->
<text x="340" y="978" font-family="'Cinzel', 'Georgia', serif" font-size="15"
