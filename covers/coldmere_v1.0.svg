<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="340" height="510">
<defs>
  <radialGradient id="glow" cx="340" cy="500" r="520" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#f09020" stop-opacity="0.92"/>
    <stop offset="7%"   stop-color="#c04010" stop-opacity="0.58"/>
    <stop offset="22%"  stop-color="#5a1c04" stop-opacity="0.26"/>
    <stop offset="50%"  stop-color="#180502" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ceilG" x1="340" y1="200" x2="340" y2="380" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#050302"/>
    <stop offset="100%" stop-color="#3a1808"/>
  </linearGradient>
  <linearGradient id="floorG" x1="340" y1="800" x2="340" y2="620" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#050302"/>
    <stop offset="100%" stop-color="#3a1808"/>
  </linearGradient>
  <linearGradient id="lwG" x1="0" y1="500" x2="204" y2="500" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#050302"/>
    <stop offset="100%" stop-color="#3c1808"/>
  </linearGradient>
  <linearGradient id="rwG" x1="680" y1="500" x2="476" y2="500" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#050302"/>
    <stop offset="100%" stop-color="#3c1808"/>
  </linearGradient>
  <radialGradient id="fwG" cx="340" cy="500" r="160" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#8c3814"/>
    <stop offset="60%"  stop-color="#4c1c08"/>
    <stop offset="100%" stop-color="#280e04"/>
  </radialGradient>
  <radialGradient id="vig" cx="340" cy="510" r="520" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="black" stop-opacity="0"/>
    <stop offset="60%"  stop-color="black" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.92"/>
  </radialGradient>
  <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="black" stop-opacity="1"/>
    <stop offset="70%"  stop-color="black" stop-opacity="0.88"/>
    <stop offset="100%" stop-color="black" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="botFade" x1="0" y1="1020" x2="0" y2="800" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="black" stop-opacity="1"/>
    <stop offset="65%"  stop-color="black" stop-opacity="0.88"/>
    <stop offset="100%" stop-color="black" stop-opacity="0"/>
  </linearGradient>
  <filter id="tg" x="-40%" y="-120%" width="180%" height="340%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fg" x="-900%" y="-900%" width="1900%" height="1900%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b1"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="b2"/>
    <feMerge><feMergeNode in="b1"/><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="eg" x="-600%" y="-600%" width="1300%" height="1300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Clip each surface to its quad -->
  <clipPath id="cClip"><polygon points="0,200 680,200 476,380 204,380"/></clipPath>
  <clipPath id="flClip"><polygon points="0,800 680,800 476,620 204,620"/></clipPath>
  <clipPath id="lClip"><polygon points="0,200 204,380 204,620 0,800"/></clipPath>
  <clipPath id="rClip"><polygon points="680,200 476,380 476,620 680,800"/></clipPath>
</defs>

<!-- BLACK BACKGROUND -->
<rect width="680" height="1020" fill="#010100"/>

<!-- ===== CEILING  (0,200)-(680,200)-(476,380)-(204,380) ===== -->
<polygon points="0,200 680,200 476,380 204,380" fill="url(#ceilG)"/>
<!-- VP-radiating depth lines, clipped to ceiling quad -->
<g clip-path="url(#cClip)" stroke="#120906" stroke-width="1.2" opacity="0.55">
  <line x1="0"   y1="200" x2="340" y2="500"/>
  <line x1="136" y1="200" x2="340" y2="500"/>
  <line x1="272" y1="200" x2="340" y2="500"/>
  <line x1="340" y1="200" x2="340" y2="500"/>
  <line x1="408" y1="200" x2="340" y2="500"/>
  <line x1="544" y1="200" x2="340" y2="500"/>
  <line x1="680" y1="200" x2="340" y2="500"/>
</g>
<!-- Ceiling cross-members: x_left=340*(y-200)/300, x_right=680-x_left -->
<g clip-path="url(#cClip)" stroke="#1c1008" opacity="0.75">
  <line x1="45"  y1="240" x2="635" y2="240" stroke-width="2.2"/>
  <line x1="91"  y1="280" x2="589" y2="280" stroke-width="1.8"/>
  <line x1="136" y1="320" x2="544" y2="320" stroke-width="1.5"/>
  <line x1="181" y1="360" x2="499" y2="360" stroke-width="1.2"/>
</g>

<!-- ===== FLOOR  (0,800)-(680,800)-(476,620)-(204,620) ===== -->
<polygon points="0,800 680,800 476,620 204,620" fill="url(#floorG)"/>
<!-- VP-radiating depth lines, clipped to floor quad -->
<g clip-path="url(#flClip)" stroke="#180c04" stroke-width="1.2" opacity="0.5">
  <line x1="0"   y1="800" x2="340" y2="500"/>
  <line x1="136" y1="800" x2="340" y2="500"/>
  <line x1="272" y1="800" x2="340" y2="500"/>
  <line x1="340" y1="800" x2="340" y2="500"/>
  <line x1="408" y1="800" x2="340" y2="500"/>
  <line x1="544" y1="800" x2="340" y2="500"/>
  <line x1="680" y1="800" x2="340" y2="500"/>
</g>
<!-- Floor tile seams: x_left=340*(800-y)/300, x_right=680-x_left -->
<g clip-path="url(#flClip)" stroke="#201008" opacity="0.75">
  <line x1="181" y1="640" x2="499" y2="640" stroke-width="1.2"/>
  <line x1="136" y1="680" x2="544" y2="680" stroke-width="1.6"/>
  <line x1="91"  y1="720" x2="589" y2="720" stroke-width="2"/>
  <line x1="45"  y1="760" x2="635" y2="760" stroke-width="2.4"/>
</g>

<!-- ===== LEFT WALL  (0,200)-(204,380)-(204,620)-(0,800) ===== -->
<polygon points="0,200 204,380 204,620 0,800" fill="url(#lwG)"/>
<!-- Mortar joints: near=(0,200+600f) far=(204,380+240f) — all converge at VP=(340,500) -->
<g clip-path="url(#lClip)" stroke="#140a06" stroke-width="1.4" opacity="0.8">
  <line x1="0" y1="260" x2="204" y2="404"/>
  <line x1="0" y1="320" x2="204" y2="428"/>
  <line x1="0" y1="380" x2="204" y2="452"/>
  <line x1="0" y1="440" x2="204" y2="476"/>
  <line x1="0" y1="500" x2="204" y2="500"/>
  <line x1="0" y1="560" x2="204" y2="524"/>
  <line x1="0" y1="620" x2="204" y2="548"/>
  <line x1="0" y1="680" x2="204" y2="572"/>
  <line x1="0" y1="740" x2="204" y2="596"/>
</g>
<!-- Vertical depth columns on left wall: at s=0.2,0.35,0.5 -->
<g clip-path="url(#lClip)" stroke="#100806" stroke-width="1" opacity="0.45">
  <line x1="68"  y1="260" x2="68"  y2="740"/>
  <line x1="119" y1="305" x2="119" y2="695"/>
  <line x1="170" y1="350" x2="170" y2="650"/>
</g>
<!-- Extinguished wall sconce -->
<g opacity="0.4">
  <rect x="12" y="447" width="22" height="5" rx="1.5" fill="#2e1606"/>
  <rect x="34" y="440" width="7"  height="16" rx="1.5" fill="#ccc088" opacity="0.30"/>
  <line x1="37" y1="440" x2="37" y2="437" stroke="#1a0e04" stroke-width="2"/>
</g>

<!-- ===== RIGHT WALL  (680,200)-(476,380)-(476,620)-(680,800) ===== -->
<polygon points="680,200 476,380 476,620 680,800" fill="url(#rwG)"/>
<g clip-path="url(#rClip)" stroke="#140a06" stroke-width="1.4" opacity="0.8">
  <line x1="680" y1="260" x2="476" y2="404"/>
  <line x1="680" y1="320" x2="476" y2="428"/>
  <line x1="680" y1="380" x2="476" y2="452"/>
  <line x1="680" y1="440" x2="476" y2="476"/>
  <line x1="680" y1="500" x2="476" y2="500"/>
  <line x1="680" y1="560" x2="476" y2="524"/>
  <line x1="680" y1="620" x2="476" y2="548"/>
  <line x1="680" y1="680" x2="476" y2="572"/>
  <line x1="680" y1="740" x2="476" y2="596"/>
</g>
<g clip-path="url(#rClip)" stroke="#100806" stroke-width="1" opacity="0.45">
  <line x1="612" y1="260" x2="612" y2="740"/>
  <line x1="561" y1="305" x2="561" y2="695"/>
  <line x1="510" y1="350" x2="510" y2="650"/>
</g>

<!-- ===== FAR WALL  272×240 (wider than tall) ===== -->
<rect x="204" y="380" width="272" height="240" fill="url(#fwG)"/>
<g stroke="#2c1208" stroke-width="0.8" opacity="0.5">
  <line x1="240" y1="380" x2="240" y2="620"/>
  <line x1="272" y1="380" x2="272" y2="620"/>
  <line x1="340" y1="380" x2="340" y2="620"/>
  <line x1="408" y1="380" x2="408" y2="620"/>
  <line x1="440" y1="380" x2="440" y2="620"/>
  <line x1="204" y1="420" x2="476" y2="420"/>
  <line x1="204" y1="460" x2="476" y2="460"/>
  <line x1="204" y1="500" x2="476" y2="500"/>
  <line x1="204" y1="540" x2="476" y2="540"/>
  <line x1="204" y1="580" x2="476" y2="580"/>
</g>
<!-- Edge shadows for depth -->
<rect x="204" y="380" width="16" height="240" fill="black" opacity="0.4"/>
<rect x="460" y="380" width="16" height="240" fill="black" opacity="0.4"/>
<rect x="204" y="380" width="272" height="11" fill="black" opacity="0.35"/>
<rect x="204" y="609" width="272" height="11" fill="black" opacity="0.35"/>

<!-- ===== CANDLE GLOW — drawn after far wall ===== -->
<rect width="680" height="1020" fill="url(#glow)"/>

<!-- ===== CANDLE on far wall ===== -->
<!-- sconce bracket -->
<rect x="333" y="577" width="14" height="5" rx="1.5" fill="#3c1c0a"/>
<!-- body -->
<rect x="336" y="558" width="8" height="19" rx="1.5" fill="#ddd094"/>
<!-- wick -->
<line x1="340" y1="556" x2="340" y2="559" stroke="#201008" stroke-width="1.5"/>
<!-- flame layers -->
<ellipse cx="340" cy="549" rx="6" ry="9"   fill="#c85006" opacity="0.7" filter="url(#fg)"/>
<ellipse cx="340" cy="550" rx="3.8" ry="6.5" fill="#f07818"/>
<ellipse cx="340" cy="552" rx="2.2" ry="4"   fill="#ffcc28"/>
<ellipse cx="340" cy="554" rx="1.1" ry="2.1" fill="#fffef0"/>

<!-- ===== ENTITY EYES ===== -->
<g filter="url(#eg)" opacity="0.88">
  <ellipse cx="308" cy="492" rx="4.5" ry="5" fill="#a02a04"/>
  <ellipse cx="372" cy="492" rx="4.5" ry="5" fill="#a02a04"/>
  <ellipse cx="308" cy="492" rx="2"   ry="2.2" fill="#240802"/>
  <ellipse cx="372" cy="492" rx="2"   ry="2.2" fill="#240802"/>
</g>

<!-- ===== VIGNETTE ===== -->
<rect width="680" height="1020" fill="url(#vig)"/>

<!-- ===== TITLE (top, y=0-200) ===== -->
<rect width="680" height="220" fill="url(#topFade)"/>
<text x="340" y="94" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="72" font-weight="700" letter-spacing="4"
      fill="#c8a040" filter="url(#tg)">COLDMERE</text>
<text x="340" y="150" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="48" font-weight="400" letter-spacing="12"
      fill="#9e7828" filter="url(#tg)">MANOR</text>
<line x1="84" y1="170" x2="596" y2="170" stroke="#c8a040" stroke-width="0.8" opacity="0.22"/>

<!-- ===== SUBTITLE (bottom, y=800-1020) ===== -->
<rect x="0" y="800" width="680" height="220" fill="url(#botFade)"/>
<text x="340" y="870" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="14" letter-spacing="6"
      fill="#7a6018" opacity="0.72">EXTINGUISH THE LIGHT</text>

</svg>