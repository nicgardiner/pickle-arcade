<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1f4a72"/>
    <stop offset="0.55" stop-color="#143a5c"/>
    <stop offset="1" stop-color="#0c2740"/>
  </linearGradient>
  <radialGradient id="boardGlow" cx="50%" cy="58%" r="55%">
    <stop offset="0" stop-color="#2a5680" stop-opacity="0.9"/>
    <stop offset="1" stop-color="#0c2740" stop-opacity="0"/>
  </radialGradient>
  <filter id="titleGlow" x="-30%" y="-60%" width="160%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="frame"><rect width="680" height="1020"/></clipPath>
</defs>

<rect width="680" height="1020" fill="url(#seaGrad)"/>
<ellipse cx="340" cy="600" rx="420" ry="420" fill="url(#boardGlow)"/>

