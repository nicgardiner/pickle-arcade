<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#bfe9ff"/>
    <stop offset="0.6" stop-color="#87ceeb"/>
    <stop offset="1" stop-color="#6db6dd"/>
  </linearGradient>
  <radialGradient id="cupGlow" cx="50%" cy="40%" r="60%">
    <stop offset="0" stop-color="#fff6c0" stop-opacity="0.95"/>
    <stop offset="1" stop-color="#fff6c0" stop-opacity="0"/>
  </radialGradient>
  <filter id="titleGlow" x="-30%" y="-60%" width="160%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="680" height="1020" fill="url(#sky)"/>

<!-- soft clouds -->
<g fill="#ffffff" opacity="0.55">
  <ellipse cx="140" cy="330" rx="70" ry="26"/><ellipse cx="200" cy="320" rx="55" ry="22"/>
  <ellipse cx="540" cy="430" rx="80" ry="28"/><ellipse cx="470" cy="440" rx="50" ry="20"/>
</g>

<!-- tree trunk rising up the right-centre -->
<path d="M 360 1020 L 360 360 Q 360 320 400 300 L 420 300 Q 388 330 396 1020 Z" fill="#7a4f25"/>
<path d="M 366 1020 L 366 380 Q 366 340 408 312" fill="none" stroke="#5e3c18" stroke-width="6" opacity="0.5"/>
<!-- a couple of branches as leafy platforms -->
<g>
  <rect x="150" y="720" width="200" height="26" rx="12" fill="#6e4521"/>
  <ellipse cx="180" cy="712" rx="46" ry="30" fill="#3a9a3f"/><ellipse cx="240" cy="704" rx="52" ry="34" fill="#2f8a3a"/>
  <ellipse cx="305" cy="712" rx="44" ry="28" fill="#43ab48"/>
  <rect x="380" y="560" width="190" height="26" rx="12" fill="#6e4521"/>
  <ellipse cx="420" cy="552" rx="48" ry="30" fill="#2f8a3a"/><ellipse cx="490" cy="544" rx="54" ry="34" fill="#3a9a3f"/>
  <ellipse cx="552" cy="552" rx="42" ry="26" fill="#43ab48"/>
  <rect x="396" y="840" width="180" height="26" rx="12" fill="#6e4521"/>
  <ellipse cx="436" cy="832" rx="46" ry="29" fill="#2f8a3a"/><ellipse cx="502" cy="824" rx="52" ry="33" fill="#3a9a3f"/>
  <ellipse cx="560" cy="832" rx="40" ry="25" fill="#43ab48"/>
</g>

<!-- big leafy canopy near the top, with the cup nestled in it -->
<g>
  <ellipse cx="300" cy="430" rx="120" ry="80" fill="#2f8a3a"/>
  <ellipse cx="400" cy="400" rx="130" ry="86" fill="#3a9a3f"/>
  <ellipse cx="350" cy="370" rx="100" ry="70" fill="#46b24c"/>
</g>

<!-- glowing cup of berry water (the goal) -->
<circle cx="378" cy="360" r="120" fill="url(#cupGlow)"/>
<g transform="translate(346,322)">
  <path d="M 4 6 L 60 6 L 54 70 Q 52 80 32 80 Q 12 80 10 70 Z" fill="#eaf6ff" stroke="#bcd6e6" stroke-width="2.5"/>
  <rect x="4" y="6" width="56" height="16" rx="3" fill="#d6ecff" stroke="#bcd6e6" stroke-width="2"/>
  <path d="M 8 26 L 56 26 L 52 66 Q 50 74 32 74 Q 14 74 12 66 Z" fill="#7ec8ff" opacity="0.9"/>
  <!-- berries floating on top -->
  <circle cx="22" cy="16" r="6" fill="#b5316b"/><circle cx="36" cy="14" r="6.5" fill="#8e2bd0"/>
  <circle cx="48" cy="17" r="5.5" fill="#d23b6a"/>
  <!-- straw -->
  <line x1="50" y1="2" x2="62" y2="-26" stroke="#ff7aa8" stroke-width="5" stroke-linecap="round"/>
</g>

<!-- the climbing mallard -->
<g transform="translate(206,628) scale(3.12)">
  <!-- body -->
  <ellipse cx="16" cy="13" rx="17" ry="12" fill="#8a8f98"/>
  <ellipse cx="16" cy="11" rx="15" ry="9" fill="#b9bec6"/>
  <!-- wing -->
  <path d="M 8 9 Q 20 4 30 12 Q 20 16 10 15 Z" fill="#9aa0a8"/>
  <!-- chest -->
  <ellipse cx="26" cy="14" rx="8" ry="9" fill="#caa86a"/>
  <!-- head (green) -->
  <circle cx="30" cy="2" r="8.5" fill="#1f7a3a"/>
  <circle cx="30" cy="2" r="8.5" fill="#2e9a4a" opacity="0.6"/>
  <!-- collar -->
  <path d="M 22 6 Q 30 9 38 5" stroke="#fff" stroke-width="1.4" fill="none"/>
  <!-- bill -->
  <ellipse cx="40" cy="3" rx="6" ry="3" fill="#ffb13b"/>
  <!-- eye -->
  <circle cx="32" cy="0.5" r="1.5" fill="#000"/>
  <!-- tail tuft -->
  <path d="M 1 12 L -4 9 L 1 16 Z" fill="#a8862c"/>
  <!-- little feet reaching up -->
  <path d="M 12 24 l -3 6 M 20 24 l 2 6" stroke="#ff9b2e" stroke-width="2" stroke-linecap="round"/>
</g>

<!-- a drifting acorn hazard -->
<g transform="translate(150,470) rotate(20)">
  <ellipse cx="0" cy="4" rx="8" ry="10" fill="#caa15a"/>
  <path d="M -8 -2 Q 0 -10 8 -2 Z" fill="#6e4521"/>
  <rect x="-1.5" y="-12" width="3" height="5" rx="1" fill="#4a2e12"/>
</g>

<!-- a dangling spider -->
<g transform="translate(560,640)">
  <line x1="0" y1="-120" x2="0" y2="0" stroke="#dfe7ee" stroke-width="1.4" opacity="0.7"/>
  <ellipse cx="0" cy="6" rx="11" ry="9" fill="#2b2b30"/>
  <circle cx="0" cy="-3" r="6" fill="#33333a"/>
  <g stroke="#2b2b30" stroke-width="2" stroke-linecap="round">
    <path d="M -8 2 q -10 -2 -14 6"/><path d="M -8 6 q -11 2 -14 11"/>
    <path d="M 8 2 q 10 -2 14 6"/><path d="M 8 6 q 11 2 14 11"/>
  </g>
  <circle cx="-2.4" cy="-4" r="1.2" fill="#ff5b5b"/><circle cx="2.4" cy="-4" r="1.2" fill="#ff5b5b"/>
</g>

<!-- title -->
<rect x="0" y="0" width="680" height="186" fill="rgba(10,30,45,0.5)"/>
<line x1="0" y1="186" x2="680" y2="186" stroke="#ffd45e" stroke-width="1.5" opacity="0.7"/>
<text x="343" y="92" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif"
      font-weight="900" font-size="74" fill="rgba(0,0,0,0.45)" letter-spacing="3">CUP OF DUCK</text>
<text x="340" y="89" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif"
      font-weight="900" font-size="74" fill="#2ea043" letter-spacing="3">CUP OF DUCK</text>
<text x="340" y="150" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="26"
      fill="#eaf6ff" letter-spacing="4" opacity="0.9">CLIMB · GLIDE · SIP</text>
</svg>