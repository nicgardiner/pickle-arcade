<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <!-- hellish sky -->
  <radialGradient id="hellSky" cx="50%" cy="78%" r="95%">
    <stop offset="0%" stop-color="#ffd27a"/>
    <stop offset="20%" stop-color="#f59121"/>
    <stop offset="42%" stop-color="#c0341a"/>
    <stop offset="68%" stop-color="#5e1410"/>
    <stop offset="100%" stop-color="#170604"/>
  </radialGradient>
  <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a0d08"/>
    <stop offset="100%" stop-color="#0c0302"/>
  </linearGradient>
  <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffe9b0"/>
    <stop offset="45%" stop-color="#f4a02a"/>
    <stop offset="100%" stop-color="#9c2410"/>
  </linearGradient>
  <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#5b6b78"/>
    <stop offset="45%" stop-color="#8fa3b0"/>
    <stop offset="100%" stop-color="#46535d"/>
  </linearGradient>
  <radialGradient id="eyeGlow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#ccffff"/>
    <stop offset="55%" stop-color="#37e0ff"/>
    <stop offset="100%" stop-color="#0a8fb8"/>
  </radialGradient>
  <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="hotGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="titleShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#1a0300" flood-opacity="0.9"/>
  </filter>
</defs>

<!-- 1. hell sky -->
<rect width="680" height="1020" fill="url(#hellSky)"/>

<!-- 2. distant jagged mountains / ruined skyline -->
<g fill="#2a0a07" opacity="0.9">
  <polygon points="0,640 70,540 130,610 210,500 280,600 360,520 440,610 520,510 600,600 680,540 680,720 0,720"/>
</g>
<g fill="#46110b" opacity="0.85">
  <polygon points="0,690 90,610 170,680 250,590 340,675 430,600 520,680 610,610 680,675 680,760 0,760"/>
</g>

<!-- 3. embers floating up -->
<g fill="#ffcaa0">
  <rect x="120" y="430" width="4" height="4" opacity="0.8"/>
  <rect x="560" y="380" width="3" height="3" opacity="0.7"/>
  <rect x="300" y="350" width="3" height="3" opacity="0.6"/>
  <rect x="470" y="470" width="4" height="4" opacity="0.7"/>
  <rect x="200" y="500" width="3" height="3" opacity="0.6"/>
  <rect x="600" y="520" width="3" height="3" opacity="0.7"/>
  <rect x="90" y="560" width="4" height="4" opacity="0.6"/>
  <rect x="380" y="430" width="2" height="2" opacity="0.8"/>
</g>

<!-- 4. cracked hell ground -->
<path d="M0,720 L680,720 L680,1020 L0,1020 Z" fill="url(#groundGrad)"/>
<g stroke="#ff6a1f" stroke-width="3" opacity="0.8" filter="url(#hotGlow)" fill="none">
  <path d="M340,760 L320,830 L350,900 L330,1000"/>
  <path d="M320,830 L240,880 L210,990"/>
  <path d="M350,900 L450,930 L520,1010"/>
  <path d="M240,880 L120,940"/>
</g>
<!-- glowing lava pool under the robot -->
<ellipse cx="340" cy="880" rx="240" ry="46" fill="#ff7a1e" opacity="0.45" filter="url(#hotGlow)"/>
<ellipse cx="340" cy="882" rx="170" ry="30" fill="#ffd27a" opacity="0.5" filter="url(#hotGlow)"/>

<!-- 5. THE ROBOT — heroic low-angle, pixel-art style, replacing the cursor -->
<g transform="translate(340,560) scale(3.2)">
  <!-- backlit cyan aura -->
  <g filter="url(#cyanGlow)" opacity="0.9">
    <rect x="-26" y="-78" width="52" height="150" rx="6" fill="#37e0ff"/>
  </g>

  <!-- helmet crest plume -->
  <path d="M-2,-86 C-14,-104 -10,-118 4,-122 C-2,-110 2,-100 8,-90 Z"
        fill="#37e0ff" filter="url(#hotGlow)" opacity="0.95"/>
  <rect x="-4" y="-88" width="8" height="8" rx="2" fill="#3c474f" stroke="#2b343c" stroke-width="1.5"/>

  <!-- KNIGHT'S HELMET -->
  <!-- dome top -->
  <path d="M-22,-58 C-22,-86 22,-86 22,-58 Z" fill="url(#bodyGrad)" stroke="#2b343c" stroke-width="2"/>
  <!-- helmet face / great helm -->
  <rect x="-22" y="-62" width="44" height="40" rx="5" fill="url(#bodyGrad)" stroke="#2b343c" stroke-width="2"/>
  <!-- vertical face ridge -->
  <rect x="-2" y="-60" width="4" height="38" fill="#3c474f"/>
  <!-- horizontal visor slit (glowing) -->
  <rect x="-18" y="-50" width="36" height="7" rx="2" fill="#0c161c"/>
  <rect x="-17" y="-49" width="34" height="5" rx="2" fill="url(#eyeGlow)" filter="url(#hotGlow)"/>
  <!-- breathing slits below -->
  <g fill="#0c161c">
    <rect x="-12" y="-38" width="3" height="9"/>
    <rect x="-5" y="-38" width="3" height="9"/>
    <rect x="2" y="-38" width="3" height="9"/>
    <rect x="9" y="-38" width="3" height="9"/>
  </g>

  <!-- neck / gorget -->
  <rect x="-11" y="-28" width="22" height="8" rx="2" fill="#3c474f" stroke="#2b343c" stroke-width="1.5"/>

  <!-- torso -->
  <rect x="-28" y="-42" width="56" height="60" rx="5" fill="url(#bodyGrad)" stroke="#2b343c" stroke-width="2"/>
  <!-- shoulder plates -->
  <rect x="-34" y="-40" width="12" height="24" rx="3" fill="#566570" stroke="#2b343c" stroke-width="1.5"/>
  <rect x="22" y="-40" width="12" height="24" rx="3" fill="#566570" stroke="#2b343c" stroke-width="1.5"/>
  <!-- chest I-beam emblem -->
  <g fill="url(#eyeGlow)" filter="url(#hotGlow)">
    <rect x="-12" y="-30" width="24" height="6" rx="1"/>
    <rect x="-4" y="-30" width="8" height="30" />
    <rect x="-12" y="-6" width="24" height="6" rx="1"/>
  </g>

  <!-- arms -->
  <rect x="-36" y="-14" width="12" height="34" rx="4" fill="#4a5862" stroke="#2b343c" stroke-width="1.5"/>
  <rect x="24" y="-14" width="12" height="34" rx="4" fill="#4a5862" stroke="#2b343c" stroke-width="1.5"/>
  <!-- fists -->
  <rect x="-37" y="18" width="14" height="12" rx="3" fill="#5b6b78" stroke="#2b343c" stroke-width="1.5"/>
  <rect x="23" y="18" width="14" height="12" rx="3" fill="#5b6b78" stroke="#2b343c" stroke-width="1.5"/>

  <!-- SWORD held in right fist, blade raised -->
  <g transform="translate(30,24)">
    <!-- aura -->
    <rect x="-3" y="-96" width="6" height="92" fill="#37e0ff" filter="url(#cyanGlow)" opacity="0.85"/>
    <!-- crossguard -->
    <rect x="-16" y="-6" width="32" height="7" rx="2" fill="#566570" stroke="#2b343c" stroke-width="1.5"/>
    <!-- grip -->
    <rect x="-3" y="0" width="6" height="14" rx="2" fill="#3c474f" stroke="#2b343c" stroke-width="1"/>
    <!-- pommel -->
    <circle cx="0" cy="16" r="4" fill="#566570" stroke="#2b343c" stroke-width="1.5"/>
    <!-- blade -->
    <polygon points="-4,-8 4,-8 4,-86 0,-96 -4,-86" fill="#cfe9f2" stroke="#2b343c" stroke-width="1.5"/>
    <!-- blade glowing fuller -->
    <rect x="-1.2" y="-86" width="2.4" height="78" fill="url(#eyeGlow)" filter="url(#hotGlow)"/>
  </g>

  <!-- legs -->
  <rect x="-20" y="18" width="16" height="40" rx="3" fill="#4a5862" stroke="#2b343c" stroke-width="1.5"/>
  <rect x="4" y="18" width="16" height="40" rx="3" fill="#4a5862" stroke="#2b343c" stroke-width="1.5"/>
  <!-- feet -->
  <rect x="-24" y="56" width="22" height="12" rx="2" fill="#5b6b78" stroke="#2b343c" stroke-width="1.5"/>
  <rect x="2" y="56" width="22" height="12" rx="2" fill="#5b6b78" stroke="#2b343c" stroke-width="1.5"/>
</g>

<!-- 6. corrupted desktop icons as the slain demons at the robot's feet -->
<!-- folder (yellow) lower-left -->
<g transform="translate(140,860) scale(0.95) rotate(-12)" filter="url(#hotGlow)" opacity="0.95">
  <rect x="-32" y="-12" width="64" height="42" rx="5" fill="#caa12f"/>
  <rect x="-32" y="-22" width="28" height="14" rx="4" fill="#e3b23c"/>
  <rect x="-32" y="-12" width="64" height="7" fill="#e3b23c"/>
  <circle cx="-10" cy="6" r="4" fill="#1a0a04"/>
  <circle cx="12" cy="6" r="4" fill="#1a0a04"/>
</g>
<!-- error dialog (red) lower-right -->
<g transform="translate(548,872) scale(0.95) rotate(10)" filter="url(#hotGlow)" opacity="0.95">
  <rect x="-38" y="-28" width="76" height="54" rx="4" fill="#241516"/>
  <rect x="-38" y="-28" width="76" height="15" rx="4" fill="#c8413a"/>
  <text x="0" y="16" text-anchor="middle" font-family="'Courier New',monospace" font-weight="bold"
        font-size="32" fill="#c8413a">&#10005;</text>
</g>
<!-- green virus dot bottom-center -->
<g transform="translate(330,960)" filter="url(#hotGlow)" opacity="0.95">
  <circle cx="0" cy="0" r="14" fill="#5fb04f"/>
  <g stroke="#3d7a30" stroke-width="3">
    <line x1="0" y1="-14" x2="0" y2="-22"/><line x1="0" y1="14" x2="0" y2="22"/>
    <line x1="-14" y1="0" x2="-22" y2="0"/><line x1="14" y1="0" x2="22" y2="0"/>
  </g>
  <circle cx="-4" cy="-2" r="2.2" fill="#1a0a04"/><circle cx="4" cy="-2" r="2.2" fill="#1a0a04"/>
</g>

<!-- 7. title bar -->
<text x="340" y="118" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif"
      font-weight="900" font-size="92" letter-spacing="2" fill="url(#titleGrad)"
      stroke="#2a0600" stroke-width="3" filter="url(#titleShadow)">CURSORED</text>
<text x="340" y="158" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif"
      font-weight="900" font-size="26" letter-spacing="8" fill="#ffce6e"
      stroke="#3a0c00" stroke-width="1">A DESKTOP DESCENT</text>

<!-- 8. bottom tagline -->
<text x="340" y="1004" text-anchor="middle" font-family="'Courier New',monospace"
      font-size="17" letter-spacing="3" fill="#ffb877">THE ICONS REMEMBER BEING DELETED</text>
</svg>
