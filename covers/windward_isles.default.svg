<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#f9e6ca"/><stop offset="0.32" stop-color="#fbdcc2"/>
    <stop offset="0.62" stop-color="#dfeaf0"/><stop offset="1" stop-color="#c3e0ee"/>
  </linearGradient>
  <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#a7d0e2"/><stop offset="0.5" stop-color="#6ba7cd"/><stop offset="1" stop-color="#3f7ba6"/>
  </linearGradient>
  <linearGradient id="isle" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ddd0ba"/><stop offset="0.55" stop-color="#c3b596"/><stop offset="1" stop-color="#9c8f74"/>
  </linearGradient>
  <radialGradient id="sun" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="#fff6dc"/><stop offset="0.55" stop-color="#ffe9a8"/><stop offset="1" stop-color="#ffe9a8" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-30%" y="-60%" width="160%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="680" height="1020" fill="url(#sky)"/>
<circle cx="536" cy="322" r="150" fill="url(#sun)"/>
<circle cx="536" cy="322" r="46" fill="#fff2cf"/>

<!-- clouds -->
<g fill="#fffaf1" opacity="0.9">
  <ellipse cx="170" cy="300" rx="70" ry="24"/><ellipse cx="214" cy="286" rx="46" ry="22"/><ellipse cx="128" cy="292" rx="40" ry="18"/>
  <ellipse cx="470" cy="210" rx="54" ry="19"/><ellipse cx="500" cy="198" rx="34" ry="16"/>
</g>
<!-- birds -->
<g stroke="#5b6b74" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.75">
  <path d="M250 250 q11 -12 22 0 q11 -12 22 0"/>
  <path d="M312 214 q8 -9 16 0 q8 -9 16 0"/>
  <path d="M392 268 q9 -10 18 0 q9 -10 18 0"/>
</g>

<!-- sea -->
<rect x="0" y="660" width="680" height="360" fill="url(#sea)"/>
<g stroke="#e8f4fa" stroke-width="3" stroke-linecap="round" opacity="0.5">
  <path d="M60 706 q26 -8 52 0 q26 8 52 0"/>
  <path d="M470 720 q26 -8 52 0 q26 8 52 0"/>
  <path d="M120 792 q30 -9 60 0 q30 9 60 0"/>
  <path d="M430 812 q30 -9 60 0 q30 9 60 0"/>
  <path d="M250 872 q34 -10 68 0 q34 10 68 0"/>
</g>

<!-- ISLAND GROUP: scaled 1.35x about top-centre pivot (340,318) so the tower tip stays put while the base sinks much lower into the water -->
<g id="island" transform="translate(340 318) scale(1.35) translate(-340 -318)">
<!-- island reflection -->
<g opacity="0.16"><path d="M150 662 C 175 690, 250 700, 340 700 C 430 700, 505 690, 525 662 L 520 726 C 430 742, 250 742, 158 726 Z" fill="#6a5f48"/></g>

<!-- island foundation -->
<path d="M150 662 C 172 626, 250 616, 340 616 C 430 616, 508 626, 528 662 C 540 694, 470 726, 340 732 C 210 726, 138 694, 150 662 Z" fill="url(#isle)"/>
<path d="M150 662 C 172 646, 250 640, 340 640 C 430 640, 508 646, 528 662 C 508 676, 430 684, 340 686 C 250 684, 172 676, 150 662 Z" fill="#e7dcc6" opacity="0.55"/>

