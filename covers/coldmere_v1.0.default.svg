<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="340" height="510">
<defs>
  <radialGradient id="camGlow" cx="340" cy="970" r="780" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#c06018" stop-opacity="0.78"/>
    <stop offset="28%"  stop-color="#6a2c0a" stop-opacity="0.38"/>
    <stop offset="60%"  stop-color="#1e0800" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="farDark" cx="340" cy="510" r="170" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#000000" stop-opacity="0.97"/>
    <stop offset="45%"  stop-color="#000000" stop-opacity="0.58"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ceilG" x1="340" y1="0" x2="340" y2="478" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#3e2010"/>
    <stop offset="65%"  stop-color="#100604"/>
    <stop offset="100%" stop-color="#040101"/>
  </linearGradient>
  <linearGradient id="floorG" x1="340" y1="1020" x2="340" y2="542" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#6a3c1a"/>
    <stop offset="60%"  stop-color="#1c0e04"/>
    <stop offset="100%" stop-color="#040101"/>
  </linearGradient>
  <linearGradient id="lwG" x1="0" y1="505" x2="310" y2="505" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#503018"/>
    <stop offset="100%" stop-color="#050202"/>
  </linearGradient>
  <linearGradient id="rwG" x1="680" y1="505" x2="370" y2="505" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#503018"/>
    <stop offset="100%" stop-color="#050202"/>
  </linearGradient>
  <radialGradient id="vig" cx="340" cy="505" r="530" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="black" stop-opacity="0"/>
    <stop offset="55%"  stop-color="black" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.92"/>
  </radialGradient>
  <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="280" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="black" stop-opacity="1"/>
    <stop offset="65%"  stop-color="black" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="black" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="botFade" x1="0" y1="1020" x2="0" y2="730" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="black" stop-opacity="1"/>
    <stop offset="65%"  stop-color="black" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="black" stop-opacity="0"/>
  </linearGradient>
  <filter id="tg" x="-40%" y="-120%" width="180%" height="340%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Ceiling: corners off-screen, left edge through (0,280), right edge through (680,280) -->
  <clipPath id="cClip"> <polygon points="-751,-200 1431,-200 370,478 310,478"/></clipPath>
  <!-- Floor: corners off-screen, left edge through (0,730), right edge through (680,730) -->
  <clipPath id="flClip"><polygon points="-808,1220 1488,1220 370,542 310,542"/></clipPath>
  <clipPath id="lClip"> <polygon points="0,280 310,478 310,542 0,730"/></clipPath>
  <clipPath id="rClip"> <polygon points="680,280 370,478 370,542 680,730"/></clipPath>
</defs>

<rect width="680" height="1020" fill="#040201"/>

<!-- CEILING -->
<polygon points="-751,-200 1431,-200 370,478 310,478" fill="url(#ceilG)"/>
<g clip-path="url(#cClip)" stroke="#160c06" stroke-width="1.1" opacity="0.48">
  <line x1="-1153" y1="-500" x2="340" y2="510"/>
  <line x1="-556"  y1="-500" x2="340" y2="510"/>
  <line x1="41"    y1="-500" x2="340" y2="510"/>
  <line x1="340"   y1="-500" x2="340" y2="510"/>
  <line x1="639"   y1="-500" x2="340" y2="510"/>
  <line x1="1236"  y1="-500" x2="340" y2="510"/>
  <line x1="1833"  y1="-500" x2="340" y2="510"/>
</g>
<g clip-path="url(#cClip)" stroke="#201208" opacity="0.62">
  <line x1="-62"  y1="240" x2="742"  y2="240" stroke-width="2.4"/>
  <line x1="31"   y1="300" x2="649"  y2="300" stroke-width="2.0"/>
  <line x1="125"  y1="360" x2="555"  y2="360" stroke-width="1.6"/>
  <line x1="219"  y1="420" x2="461"  y2="420" stroke-width="1.2"/>
</g>

<!-- FLOOR -->
<polygon points="-808,1220 1488,1220 370,542 310,542" fill="url(#floorG)"/>
<g clip-path="url(#flClip)" stroke="#1e1006" stroke-width="1.1" opacity="0.4">
  <line x1="-1190" y1="1500" x2="340" y2="510"/>
  <line x1="-578"  y1="1500" x2="340" y2="510"/>
  <line x1="34"    y1="1500" x2="340" y2="510"/>
  <line x1="340"   y1="1500" x2="340" y2="510"/>
  <line x1="646"   y1="1500" x2="340" y2="510"/>
  <line x1="1258"  y1="1500" x2="340" y2="510"/>
  <line x1="1870"  y1="1500" x2="340" y2="510"/>
</g>
<g clip-path="url(#flClip)" stroke="#281408" opacity="0.62">
  <line x1="-116" y1="800" x2="796" y2="800" stroke-width="1.0"/>
  <line x1="49"   y1="700" x2="631" y2="700" stroke-width="1.4"/>
  <line x1="165"  y1="630" x2="515" y2="630" stroke-width="1.8"/>
  <line x1="248"  y1="580" x2="432" y2="580" stroke-width="2.2"/>
</g>

<!-- LEFT WALL -->
<polygon points="0,280 310,478 310,542 0,730" fill="url(#lwG)"/>
<g clip-path="url(#lClip)" stroke="#160a06" stroke-width="1.3" opacity="0.72">
  <line x1="0" y1="280" x2="310" y2="489"/>
  <line x1="0" y1="350" x2="310" y2="496"/>
  <line x1="0" y1="420" x2="310" y2="502"/>
  <line x1="0" y1="490" x2="310" y2="508"/>
  <line x1="0" y1="560" x2="310" y2="514"/>
  <line x1="0" y1="630" x2="310" y2="521"/>
  <line x1="0" y1="700" x2="310" y2="527"/>
</g>
<g clip-path="url(#lClip)" stroke="#0e0806" stroke-width="0.9" opacity="0.38">
  <line x1="78"  y1="280" x2="78"  y2="730"/>
  <line x1="156" y1="295" x2="156" y2="715"/>
  <line x1="234" y1="360" x2="234" y2="650"/>
</g>
<g opacity="0.32">
  <rect x="12" y="463" width="22" height="5" rx="1.5" fill="#2e1606"/>
  <rect x="34" y="456" width="7" height="14" rx="1.5" fill="#ccc088" opacity="0.22"/>
  <line x1="37" y1="456" x2="37" y2="453" stroke="#1a0e04" stroke-width="2"/>
</g>

<!-- RIGHT WALL -->
<polygon points="680,280 370,478 370,542 680,730" fill="url(#rwG)"/>
<g clip-path="url(#rClip)" stroke="#160a06" stroke-width="1.3" opacity="0.72">
  <line x1="680" y1="280" x2="370" y2="489"/>
  <line x1="680" y1="350" x2="370" y2="496"/>
  <line x1="680" y1="420" x2="370" y2="502"/>
  <line x1="680" y1="490" x2="370" y2="508"/>
  <line x1="680" y1="560" x2="370" y2="514"/>
  <line x1="680" y1="630" x2="370" y2="521"/>
  <line x1="680" y1="700" x2="370" y2="527"/>
</g>
<g clip-path="url(#rClip)" stroke="#0e0806" stroke-width="0.9" opacity="0.38">
  <line x1="602" y1="280" x2="602" y2="730"/>
  <line x1="524" y1="295" x2="524" y2="715"/>
  <line x1="446" y1="360" x2="446" y2="650"/>
</g>

<!-- FAR WALL -->
<rect x="310" y="478" width="60" height="64" fill="#060201"/>
<g stroke="#100804" stroke-width="0.6" opacity="0.3">
  <line x1="330" y1="478" x2="330" y2="542"/>
  <line x1="350" y1="478" x2="350" y2="542"/>
  <line x1="310" y1="496" x2="370" y2="496"/>
  <line x1="310" y1="510" x2="370" y2="510"/>
  <line x1="310" y1="526" x2="370" y2="526"/>
</g>
<rect x="310" y="478" width="6"  height="64" fill="black" opacity="0.6"/>
<rect x="364" y="478" width="6"  height="64" fill="black" opacity="0.6"/>
<rect x="310" y="478" width="60" height="5"  fill="black" opacity="0.5"/>
<rect x="310" y="537" width="60" height="5"  fill="black" opacity="0.5"/>

<rect width="680" height="1020" fill="url(#camGlow)"/>
<rect width="680" height="1020" fill="url(#farDark)"/>
<rect width="680" height="1020" fill="url(#vig)"/>

<!-- TITLE -->
<rect width="680" height="280" fill="url(#topFade)"/>
<text x="340" y="94" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="72" font-weight="700" letter-spacing="4"
      fill="#c8a040" filter="url(#tg)">COLDMERE</text>
<text x="340" y="150" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="48" font-weight="400" letter-spacing="12"
      fill="#9e7828" filter="url(#tg)">MANOR</text>
<line x1="84" y1="170" x2="596" y2="170" stroke="#c8a040" stroke-width="0.8" opacity="0.22"/>

<!-- SUBTITLE -->
<rect x="0" y="730" width="680" height="290" fill="url(#botFade)"/>
<text x="340" y="995" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif"
      font-size="20" letter-spacing="6"
      fill="#c8a860" opacity="0.92">EXTINGUISH THE LIGHT</text>

</svg>
