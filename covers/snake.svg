<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#061209"/>
    <stop offset="50%" stop-color="#0e1a12"/>
    <stop offset="100%" stop-color="#050d07"/>
  </linearGradient>
  <linearGradient id="headGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#a3e635"/>
    <stop offset="100%" stop-color="#4ade80"/>
  </linearGradient>
  <filter id="titleGlow" x="-30%" y="-60%" width="160%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="foodGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bonusGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="segGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="bonusFoodGrad" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#e9d5ff"/>
    <stop offset="100%" stop-color="#c084fc"/>
  </radialGradient>
  <radialGradient id="foodGrad" cx="50%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#fef9c3"/>
    <stop offset="100%" stop-color="#fde047"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="680" height="1020" fill="url(#bgGrad)"/>

