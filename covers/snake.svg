<text x="343" y="148" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="78" fill="rgba(0,0,0,0.5)" letter-spacing="6">SERPENT</text>
<text x="340" y="145" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="78" fill="#4ade80" letter-spacing="6" filter="url(#titleGlow)">SERPENT</text>

<!-- BOTTOM BAR — unchanged -->
<rect x="0" y="970" width="680" height="50" fill="rgba(0,0,0,0.7)"/>
<line x1="0" y1="970" x2="680" y2="970" stroke="#4ade80" stroke-width="0.8" opacity="0.3"/>
<text x="340" y="1002" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="16" fill="#4ade80" opacity="0.5" letter-spacing="6">CLASSIC SNAKE</text>

<!-- Scanline overlay -->
