  <line x1="584" y1="504" x2="614" y2="534" stroke="rgba(74,222,128,0.2)" stroke-width="1.5"/>
  <line x1="614" y1="504" x2="584" y2="534" stroke="rgba(74,222,128,0.2)" stroke-width="1.5"/>
  <rect x="102" y="542" width="34" height="34" rx="4" fill="#1a2a1e" stroke="#2a3d2e" stroke-width="1.2"/>
