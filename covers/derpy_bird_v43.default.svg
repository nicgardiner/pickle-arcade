<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0e2a"/>
    <stop offset="45%" stop-color="#1a2a5e"/>
    <stop offset="72%" stop-color="#1e4a8a"/>
    <stop offset="88%" stop-color="#b05a20"/>
    <stop offset="100%" stop-color="#d97030"/>
  </linearGradient>
  <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a6a20"/>
    <stop offset="100%" stop-color="#1e3a10"/>
  </linearGradient>
  <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1a5a0a"/>
    <stop offset="30%" stop-color="#3aaa18"/>
    <stop offset="60%" stop-color="#52c025"/>
    <stop offset="100%" stop-color="#206010"/>
  </linearGradient>
  <linearGradient id="pipeCapGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1a6a0a"/>
    <stop offset="35%" stop-color="#4acc20"/>
    <stop offset="70%" stop-color="#5ad828"/>
    <stop offset="100%" stop-color="#1a5a08"/>
  </linearGradient>
  <radialGradient id="birdBody" cx="38%" cy="32%" r="65%">
    <stop offset="0%" stop-color="#ffee88"/>
    <stop offset="55%" stop-color="#ffd020"/>
    <stop offset="100%" stop-color="#e0a000"/>
  </radialGradient>
  <radialGradient id="birdBelly" cx="45%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#fff8e0"/>
    <stop offset="100%" stop-color="#ffe8a0"/>
  </radialGradient>
  <radialGradient id="eyeWhiteL" cx="35%" cy="32%" r="60%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#e8e8e8"/>
  </radialGradient>
  <radialGradient id="eyeWhiteR" cx="38%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#ddd"/>
  </radialGradient>
  <filter id="titleGlow" x="-25%" y="-60%" width="150%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
    <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="coinGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#e8c010"/>
    <stop offset="100%" stop-color="#a07800"/>
  </linearGradient>
</defs>

<rect width="680" height="1020" fill="url(#skyGrad)"/>

<!-- Stars -->
<circle cx="60" cy="60" r="1.5" fill="#fff" opacity="0.9"/>
<circle cx="120" cy="38" r="1" fill="#fff" opacity="0.7"/>
<circle cx="210" cy="80" r="1.5" fill="#fff" opacity="0.8"/>
<circle cx="300" cy="42" r="1" fill="#fff" opacity="0.6"/>
<circle cx="380" cy="70" r="1.5" fill="#fff" opacity="0.9"/>
<circle cx="450" cy="30" r="1" fill="#fff" opacity="0.7"/>
<circle cx="530" cy="55" r="2" fill="#fff" opacity="0.8"/>
<circle cx="610" cy="80" r="1" fill="#fff" opacity="0.6"/>
<circle cx="640" cy="40" r="1" fill="#fff" opacity="0.8"/>

<!-- Horizon glow -->
<ellipse cx="340" cy="680" rx="420" ry="90" fill="#e06820" opacity="0.35"/>

<!-- Clouds -->
<g opacity="0.88">
  <ellipse cx="90" cy="240" rx="62" ry="28" fill="#e8eef8"/>
  <ellipse cx="58" cy="252" rx="40" ry="22" fill="#dde5f5"/>
  <ellipse cx="122" cy="250" rx="44" ry="20" fill="#dde5f5"/>
  <ellipse cx="90" cy="255" rx="68" ry="18" fill="#eef3fb"/>
</g>
<g opacity="0.75">
  <ellipse cx="540" cy="190" rx="78" ry="30" fill="#e8eef8"/>
  <ellipse cx="505" cy="204" rx="48" ry="22" fill="#dde5f5"/>
  <ellipse cx="578" cy="202" rx="52" ry="20" fill="#dde5f5"/>
  <ellipse cx="540" cy="208" rx="82" ry="18" fill="#eef3fb"/>
</g>
<g opacity="0.6">
  <ellipse cx="320" cy="300" rx="55" ry="22" fill="#e8eef8"/>
  <ellipse cx="292" cy="312" rx="35" ry="17" fill="#dde5f5"/>
  <ellipse cx="348" cy="310" rx="38" ry="16" fill="#dde5f5"/>
</g>

<!-- LEFT PIPE (bottom) -->
<rect x="60" y="720" width="130" height="340" fill="url(#pipeGrad)"/>
<rect x="80" y="720" width="18" height="340" fill="#5ad828" opacity="0.4"/>
<rect x="42" y="700" width="166" height="38" fill="url(#pipeCapGrad)" rx="4"/>
<rect x="52" y="700" width="24" height="38" fill="#6ae830" opacity="0.35"/>

<!-- RIGHT PIPE (top) -->
<rect x="490" y="0" width="130" height="480" fill="url(#pipeGrad)"/>
<rect x="510" y="0" width="18" height="480" fill="#5ad828" opacity="0.4"/>
<rect x="472" y="460" width="166" height="38" fill="url(#pipeCapGrad)" rx="4"/>
<rect x="482" y="460" width="24" height="38" fill="#6ae830" opacity="0.35"/>

<!-- Ground -->
<rect x="0" y="900" width="680" height="120" fill="url(#groundGrad)"/>
<rect x="0" y="900" width="680" height="8" fill="#4acc28"/>

<!-- Coins -->
<g filter="url(#coinGlow)">
  <circle cx="440" cy="580" r="16" fill="#ffd020" opacity="0.95"/>
  <circle cx="440" cy="580" r="10" fill="#ffee80" opacity="0.6"/>
  <text x="440" y="586" font-size="14" text-anchor="middle" fill="#a07000" font-weight="bold">$</text>
  <circle cx="400" cy="610" r="13" fill="#ffd020" opacity="0.85"/>
  <circle cx="400" cy="610" r="8" fill="#ffee80" opacity="0.5"/>
  <text x="400" y="615" font-size="11" text-anchor="middle" fill="#a07000" font-weight="bold">$</text>
  <circle cx="355" cy="590" r="11" fill="#ffd020" opacity="0.7"/>
</g>

<!-- ══ DERPY BIRD ══ -->
<!-- Bird positioned in the pipe gap, facing right -->
<g transform="translate(295, 572)">

  <!-- Wing (behind body) -->
  <ellipse cx="-20" cy="8" rx="30" ry="14" fill="url(#wingGrad)" transform="rotate(-18,-20,8)"/>

  <!-- Body -->
  <ellipse cx="5" cy="5" rx="50" ry="44" fill="url(#birdBody)"/>

  <!-- Belly patch -->
  <ellipse cx="12" cy="18" rx="28" ry="22" fill="url(#birdBelly)"/>

  <!-- Tail -->
  <ellipse cx="-42" cy="10" rx="22" ry="9" fill="#d4a000" transform="rotate(15,-42,10)"/>
  <ellipse cx="-46" cy="3" rx="18" ry="7" fill="#c89000" transform="rotate(-5,-46,3)"/>

  <!-- Beak -->
  <path d="M50,0 L74,-5 L70,12 Z" fill="#ff8820"/>
  <path d="M50,0 L74,-5 L72,2 Z" fill="#cc5500" opacity="0.5"/>

  <!-- ── LEFT EYE (upper-left of face, big) ── -->
  <!-- White sclera -->
  <circle cx="22" cy="-6" r="20" fill="url(#eyeWhiteL)"/>
  <!-- Iris -->
  <circle cx="25" cy="-3" r="13" fill="#1e1a50"/>
  <!-- Pupil (looking slightly up-left = derpy) -->
  <circle cx="21" cy="-8" r="7" fill="#0a0820"/>
  <!-- Catchlight -->
  <circle cx="24" cy="-12" r="3.5" fill="#fff" opacity="0.95"/>
  <circle cx="18" cy="-4" r="1.8" fill="#fff" opacity="0.5"/>
  <!-- Eye ring -->
  <circle cx="22" cy="-6" r="20" fill="none" stroke="#c08800" stroke-width="2.5"/>


  <!-- Eyebrows (lopsided for derpy look) -->
  <!-- Left brow: raised and arched -->
  <path d="M4,-24 Q20,-34 36,-22" stroke="#8a6000" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="14" cy="10" rx="11" ry="7" fill="#ff6060" opacity="0.22"/>
</g>

<!-- Motion lines -->
<g opacity="0.32" stroke="#88aaff" stroke-width="2" stroke-linecap="round">
  <line x1="228" y1="562" x2="185" y2="562"/>
  <line x1="231" y1="576" x2="178" y2="579"/>
  <line x1="225" y1="549" x2="188" y2="546"/>
  <line x1="220" y1="592" x2="180" y2="595"/>
</g>

<!-- TITLE -->
<text x="340" y="148" font-family="'Arial Black', Arial, sans-serif"
      font-size="88" font-weight="900" text-anchor="middle"
      letter-spacing="2" fill="#00e8ee" filter="url(#titleGlow)">DERPY</text>
<text x="340" y="230" font-family="'Arial Black', Arial, sans-serif"
      font-size="76" font-weight="900" text-anchor="middle"
      letter-spacing="6" fill="#00ced1" filter="url(#titleGlow)">BIRD</text>

<rect x="180" y="248" width="320" height="4" rx="2" fill="#00ced1" opacity="0.5"/>

<text x="340" y="980" font-family="Arial, sans-serif" font-size="22"
      text-anchor="middle" fill="#00ced1" opacity="0.65" letter-spacing="3">TAP TO FLAP</text>

</svg>
