<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#060010"/>
    <stop offset="28%" stop-color="#0c0428"/>
    <stop offset="58%" stop-color="#1a0845"/>
    <stop offset="80%" stop-color="#380a60"/>
    <stop offset="100%" stop-color="#5a0a30"/>
  </linearGradient>
  <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a5a20"/>
    <stop offset="100%" stop-color="#1a2808"/>
  </linearGradient>
  <linearGradient id="stoneGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#7a7060"/>
    <stop offset="100%" stop-color="#3a3430"/>
  </linearGradient>
  <radialGradient id="bossGlow" cx="50%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#ff6600" stop-opacity="0.8"/>
    <stop offset="55%" stop-color="#cc2200" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#440000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="coinGrad" cx="38%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#ffe880"/>
    <stop offset="60%" stop-color="#ffd020"/>
    <stop offset="100%" stop-color="#c89000"/>
  </radialGradient>
  <filter id="titleGlow" x="-25%" y="-60%" width="150%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
    <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="swordGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bossGlowF" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="starGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Sky -->
<rect width="680" height="1020" fill="url(#skyGrad)"/>

<!-- Stars -->
<g fill="#fff">
  <circle cx="48" cy="55" r="1.5" opacity="0.9"/>
  <circle cx="112" cy="30" r="1" opacity="0.7"/>
  <circle cx="180" cy="70" r="2" opacity="0.85"/>
  <circle cx="260" cy="40" r="1" opacity="0.75"/>
  <circle cx="340" cy="22" r="1.5" opacity="0.9"/>
  <circle cx="420" cy="55" r="1" opacity="0.7"/>
  <circle cx="500" cy="35" r="2" opacity="0.8"/>
  <circle cx="580" cy="60" r="1.5" opacity="0.9"/>
  <circle cx="640" cy="28" r="1" opacity="0.7"/>
  <circle cx="88" cy="110" r="1" opacity="0.6"/>
  <circle cx="210" cy="125" r="1.5" opacity="0.7"/>
  <circle cx="460" cy="110" r="1.5" opacity="0.7"/>
  <circle cx="620" cy="95" r="1" opacity="0.6"/>
</g>
<g filter="url(#starGlow)">
  <circle cx="80" cy="80" r="2.5" fill="#ffd080" opacity="0.8"/>
  <circle cx="600" cy="75" r="2.5" fill="#ffd080" opacity="0.8"/>
  <circle cx="340" cy="50" r="3" fill="#ffeebb" opacity="0.7"/>
</g>

<!-- Nebula -->
<ellipse cx="200" cy="320" rx="200" ry="130" fill="#4400aa" opacity="0.1"/>
<ellipse cx="520" cy="280" rx="180" ry="110" fill="#aa0055" opacity="0.08"/>

<!-- ══ BOSS SILHOUETTE ══ -->
<g transform="translate(340, 510)" opacity="0.85">
  <ellipse cx="0" cy="0" rx="160" ry="210" fill="url(#bossGlow)" opacity="0.7"/>
  <!-- Legs -->
  <rect x="-48" y="120" width="40" height="100" rx="7" fill="#140005"/>
  <rect x="8" y="120" width="40" height="105" rx="7" fill="#140005"/>
  <!-- Torso -->
  <rect x="-65" y="-15" width="130" height="145" rx="10" fill="#140005"/>
  <!-- Armor plate -->
  <rect x="-52" y="-5" width="104" height="100" rx="6" fill="#1a000a"/>
  <!-- Shoulder spikes -->
  <polygon points="-65,-15 -105,-75 -40,-15" fill="#1c0008"/>
  <polygon points="65,-15 105,-75 40,-15" fill="#1c0008"/>
  <polygon points="-85,-22 -120,-95 -55,-22" fill="#140005"/>
  <polygon points="85,-22 120,-95 55,-22" fill="#140005"/>
  <!-- Arms -->
  <rect x="-108" y="15" width="46" height="120" rx="9" fill="#140005" transform="rotate(-12,-85,75)"/>
  <rect x="62" y="15" width="46" height="120" rx="9" fill="#140005" transform="rotate(12,85,75)"/>
  <!-- Head -->
  <ellipse cx="0" cy="-68" rx="60" ry="55" fill="#140005"/>
  <!-- Horns -->
  <polygon points="-34,-108 -58,-195 -8,-122" fill="#200008"/>
  <polygon points="34,-108 58,-195 8,-122" fill="#200008"/>
  <polygon points="-52,-118 -72,-185 -26,-130" fill="#18000a"/>
  <polygon points="52,-118 72,-185 26,-130" fill="#18000a"/>
  <!-- Crown spikes -->
  <polygon points="-44,-120 -34,-148 -22,-120" fill="#ffd020" opacity="0.65"/>
  <polygon points="-13,-126 0,-158 13,-126" fill="#ffd020" opacity="0.75"/>
  <polygon points="22,-120 34,-148 44,-120" fill="#ffd020" opacity="0.65"/>
  <!-- Eyes (glowing red) -->
  <circle cx="-22" cy="-70" r="13" fill="#ff1a00" filter="url(#bossGlowF)" opacity="0.85"/>
  <circle cx="22" cy="-70" r="13" fill="#ff1a00" filter="url(#bossGlowF)" opacity="0.85"/>
  <circle cx="-22" cy="-70" r="7" fill="#ff6600"/>
  <circle cx="22" cy="-70" r="7" fill="#ff6600"/>
  <!-- Fire -->
  <ellipse cx="-75" cy="40" rx="18" ry="30" fill="#ff4400" opacity="0.28" transform="rotate(18,-75,40)"/>
  <ellipse cx="75" cy="40" rx="18" ry="30" fill="#ff4400" opacity="0.28" transform="rotate(-18,75,40)"/>
</g>

<!-- ══ PLATFORMS ══ -->
<rect x="0" y="870" width="680" height="150" fill="url(#groundGrad)"/>
<rect x="0" y="870" width="680" height="9" fill="#4acc28"/>
<!-- Mid platforms -->
<rect x="30" y="730" width="210" height="22" fill="url(#stoneGrad)" rx="3"/>
<rect x="30" y="730" width="210" height="6" fill="#9a9080" rx="3"/>
<rect x="440" y="765" width="210" height="22" fill="url(#stoneGrad)" rx="3"/>
<rect x="440" y="765" width="210" height="6" fill="#9a9080" rx="3"/>
<rect x="90" y="618" width="150" height="18" fill="url(#stoneGrad)" rx="3"/>
<rect x="90" y="618" width="150" height="5" fill="#9a9080" rx="3"/>

<!-- ══ COINS ══ -->
<g filter="url(#starGlow)">
  <circle cx="200" cy="704" r="16" fill="url(#coinGrad)"/>
  <circle cx="200" cy="704" r="10" fill="#ffe870" opacity="0.5"/>
  <text x="200" y="710" font-family="Arial Black" font-size="14" text-anchor="middle" fill="#a07000" font-weight="bold">$</text>
  <circle cx="510" cy="740" r="13" fill="url(#coinGrad)"/>
  <circle cx="148" cy="594" r="11" fill="url(#coinGrad)"/>
</g>

<!-- ══ WALKER ENEMY ══ -->
<g transform="translate(68, 690)">
  <rect x="0" y="0" width="34" height="28" rx="3" fill="#cc2020"/>
  <rect x="0" y="0" width="34" height="9" rx="3" fill="#ff3300"/>
  <rect x="4" y="5" width="9" height="7" rx="1" fill="#fff"/>
  <rect x="21" y="5" width="9" height="7" rx="1" fill="#fff"/>
  <rect x="6" y="7" width="5" height="4" rx="1" fill="#1a0000"/>
  <rect x="23" y="7" width="5" height="4" rx="1" fill="#1a0000"/>
  <line x1="3" y1="3" x2="14" y2="6" stroke="#550000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31" y1="3" x2="20" y2="6" stroke="#550000" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="3" y="28" width="9" height="12" rx="2" fill="#aa1800"/>
  <rect x="22" y="28" width="9" height="12" rx="2" fill="#aa1800"/>
  <rect x="1" y="38" width="13" height="5" rx="2" fill="#881400"/>
  <rect x="20" y="38" width="13" height="5" rx="2" fill="#881400"/>
</g>

<!-- ══ FLOATER ENEMY ══ -->
<g transform="translate(472, 610)">
  <rect x="4" y="12" width="36" height="28" rx="3" fill="#ff8800"/>
  <rect x="-10" y="10" width="16" height="20" rx="3" fill="#cc5500"/>
  <rect x="38" y="10" width="16" height="20" rx="3" fill="#cc5500"/>
  <rect x="4" y="0" width="36" height="16" rx="3" fill="#ffaa00"/>
  <rect x="8" y="3" width="10" height="8" rx="2" fill="#000"/>
  <rect x="10" y="5" width="3" height="3" fill="#fff"/>
  <rect x="26" y="3" width="10" height="8" rx="2" fill="#000"/>
  <rect x="28" y="5" width="3" height="3" fill="#fff"/>
</g>

<!-- ══ HERO SPRITE at 2x scale (pixel-art faithful to drawPl()) ══ -->
<!-- sx=312 (left edge), pl_y=798 (top of head), legs bottom at 870 (ground) -->

<!-- Hat brim: fillRect(sx-1, pl.y-4, pl.w+2, 8) -->
<rect x="310" y="790" width="60" height="16" rx="2" fill="#111111"/>
<!-- Hat top: fillRect(sx+4, pl.y-12, pl.w-8, 10) -->
<rect x="320" y="774" width="40" height="20" fill="#111111"/>
<!-- Hat top inner: fillRect(sx+5, pl.y-11, pl.w-10, 8) -->
<rect x="322" y="776" width="36" height="16" fill="#222222"/>
<!-- Hat band -->
<rect x="310" y="793" width="60" height="5" fill="#6633aa" opacity="0.75"/>

<!-- Head: fillRect(sx+4, pl.y+2, pl.w-8, 16) -->
<rect x="320" y="802" width="40" height="32" fill="#ffcc88"/>

<!-- Body: fillRect(sx+3, pl.y+14, pl.w-6, pl.h-14) -->
<rect x="318" y="826" width="44" height="44" fill="#7a1010"/>

<!-- Left leg -->
<rect x="318" y="846" width="18" height="24" fill="#5c3018"/>
<!-- Right leg -->
<rect x="344" y="846" width="18" height="24" fill="#5c3018"/>

<!-- Left arm: fillRect(sx-3, pl.y+15, 5, 11) -->
<rect x="306" y="828" width="10" height="22" fill="#7a1010"/>
<!-- Right arm: fillRect(sx+pl.w-2, pl.y+15, 5, 11) -->
<rect x="364" y="828" width="10" height="22" fill="#7a1010"/>

<!-- Left brow: fillRect(sx+6, pl.y+4, 2+3, 2) -->
<rect x="324" y="806" width="4" height="4" fill="#2a1000"/>
<rect x="328" y="804" width="6" height="4" fill="#2a1000"/>
<!-- Right brow -->
<rect x="342" y="804" width="6" height="4" fill="#2a1000"/>
<rect x="348" y="806" width="4" height="4" fill="#2a1000"/>

<!-- Left eye: fillRect(sx+6, pl.y+6, 4, 3) -->
<rect x="324" y="810" width="8" height="6" fill="#000000"/>
<!-- Right eye -->
<rect x="342" y="810" width="8" height="6" fill="#000000"/>
<!-- Eye highlights -->
<rect x="326" y="812" width="2" height="2" fill="#ffffff"/>
<rect x="344" y="812" width="2" height="2" fill="#ffffff"/>

<!-- Frown -->
<rect x="330" y="822" width="12" height="4" fill="#2a1000"/>
<rect x="326" y="819" width="4" height="4" fill="#2a1000"/>
<rect x="342" y="819" width="4" height="4" fill="#2a1000"/>

<!-- ══ SMALL SWORD (raised) ══ -->
<g transform="translate(374, 808) rotate(30)" filter="url(#swordGlow)">
  <rect x="-2" y="-32" width="4" height="32" rx="1" fill="#ccddff"/>
  <rect x="-1" y="-32" width="1" height="32" fill="#ffffff" opacity="0.7"/>
  <circle cx="0" cy="-34" r="3" fill="#aaccff" opacity="0.9"/>
  <rect x="-8" y="-2" width="16" height="4" rx="1" fill="#ffd020"/>
  <rect x="-2" y="2" width="4" height="10" rx="1" fill="#6633aa"/>
  <circle cx="0" cy="14" r="3" fill="#cc8800"/>
</g>

<!-- ══ TITLE ══ -->
<text x="340" y="130" font-family="'Arial Black', Arial, sans-serif"
      font-size="62" font-weight="900" text-anchor="middle"
      letter-spacing="4" fill="#FFD700" filter="url(#titleGlow)">HERO'S</text>
<text x="340" y="218" font-family="'Arial Black', Arial, sans-serif"
      font-size="84" font-weight="900" text-anchor="middle"
      letter-spacing="6" fill="#FFD700" filter="url(#titleGlow)">QUEST</text>

<!-- Decorative lines -->
<line x1="80" y1="236" x2="238" y2="236" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
<line x1="442" y1="236" x2="600" y2="236" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
<circle cx="340" cy="236" r="5" fill="#FFD700" opacity="0.65"/>

<text x="340" y="274" font-family="Arial, sans-serif" font-size="18"
      text-anchor="middle" fill="#ccaaff" opacity="0.7" letter-spacing="2">10 WORLDS · EPIC FINAL BOSS</text>

<text x="340" y="978" font-family="Arial, sans-serif" font-size="18"
      text-anchor="middle" fill="#FFD700" opacity="0.4" letter-spacing="3">SAVE THE KINGDOM</text>

</svg>
