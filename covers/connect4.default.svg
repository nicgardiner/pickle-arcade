<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <!-- Background gradient -->
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#060c1a"/>
    <stop offset="60%" stop-color="#0a1428"/>
    <stop offset="100%" stop-color="#050e20"/>
  </linearGradient>

  <!-- Board face gradient -->
  <linearGradient id="boardGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e48b0"/>
    <stop offset="100%" stop-color="#142f88"/>
  </linearGradient>

  <!-- Board rim gradient -->
  <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#183499"/>
    <stop offset="100%" stop-color="#0f2260"/>
  </linearGradient>

  <!-- Red glow filter for winning discs -->
  <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Title glow -->
  <filter id="titleGlowR" x="-30%" y="-80%" width="160%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="titleGlowY" x="-30%" y="-80%" width="160%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Win line glow -->
  <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Clip to canvas -->
  <clipPath id="canvasClip">
    <rect width="680" height="1020"/>
  </clipPath>

  <!-- All radial gradients for discs embedded inline -->
</defs>

<!-- ── BACKGROUND ── -->
<rect width="680" height="1020" fill="url(#bgGrad)"/>

<!-- Background particle dots (subtle star field) -->
<g opacity="0.25">
  <circle cx="120" cy="80" r="1.5" fill="#4a7cd8"/>
  <circle cx="240" cy="45" r="1" fill="#6a9ce8"/>
  <circle cx="560" cy="95" r="1.5" fill="#4a7cd8"/>
  <circle cx="620" cy="60" r="1" fill="#8ab4f0"/>
  <circle cx="50" cy="200" r="1" fill="#4a7cd8"/>
  <circle cx="640" cy="190" r="1.5" fill="#5a8ce0"/>
  <circle cx="340" cy="270" r="1" fill="#6a9ce8"/>
  <circle cx="90" cy="880" r="1.5" fill="#4a7cd8"/>
  <circle cx="590" cy="920" r="1" fill="#5a8ce0"/>
  <circle cx="160" cy="960" r="1" fill="#6a9ce8"/>
  <circle cx="500" cy="870" r="1.5" fill="#4a7cd8"/>
</g>

<!-- Atmospheric blue glow behind board -->
<ellipse cx="340" cy="531" rx="300" ry="240" fill="#1a3a8f" opacity="0.15"/>

<!-- ── TITLE ── -->
<!-- Glow layers (blurred, behind) -->
<text x="340" y="144" text-anchor="middle"
      font-family="'Arial Black', Arial, sans-serif" font-size="82" font-weight="900"
      letter-spacing="2" fill="#ff4757" filter="url(#titleGlowR)">CONNECT 4</text>
<text x="340" y="144" text-anchor="middle"
      font-family="'Arial Black', Arial, sans-serif" font-size="82" font-weight="900"
      letter-spacing="2" fill="#ffd32a" filter="url(#titleGlowY)">CONNECT 4</text>
<!-- Shadow -->
<text x="345" y="148" text-anchor="middle"
      font-family="'Arial Black', Arial, sans-serif" font-size="82" font-weight="900"
      letter-spacing="2" fill="rgba(0,0,0,0.5)">CONNECT 4</text>
<!-- Main title: single element with tspans — layout engine handles spacing -->
<text x="340" y="144" text-anchor="middle"
      font-family="'Arial Black', Arial, sans-serif" font-size="82" font-weight="900"
      letter-spacing="2"><tspan fill="#ff4757">CON</tspan><tspan fill="#e8eaf6">NECT</tspan><tspan fill="#e8eaf6"> </tspan><tspan fill="#ffd32a">4</tspan></text>

<!-- Divider line under title -->
<line x1="80" y1="165" x2="600" y2="165" stroke="#1e48b0" stroke-width="1.2" opacity="0.6"/>

<!-- Tagline -->
<text x="340" y="195" text-anchor="middle"
      font-family="Arial, sans-serif" font-size="20" font-weight="700"
      letter-spacing="4" fill="#5c6bc0" text-transform="uppercase">DROP IT · WIN IT</text>

<!-- ── BOARD RIM (outer shell) ── -->
<path d="M 100,310 L 581,310
  Q 597,310 597,326
  L 597,736
  Q 597,752 581,752
  L 100,752
  Q 84,752 84,736
  L 84,326
  Q 84,310 100,310 Z" fill="url(#rimGrad)"
      filter="drop-shadow(0 20px 40px rgba(0,0,0,0.7))"/>

<!-- Board face (inner) — board color -->
<rect x="94" y="320" width="493" height="422"
      rx="10" ry="10" fill="url(#boardGrad)"/>

<!-- ── EMPTY HOLES (rendered under board mask effect) ── -->
<!-- First: draw the hole backgrounds -->
<circle cx="127" cy="353" r="31" fill="#05112a"/><circle cx="198" cy="353" r="31" fill="#05112a"/><circle cx="269" cy="353" r="31" fill="#05112a"/><circle cx="340" cy="353" r="31" fill="#05112a"/><circle cx="411" cy="353" r="31" fill="#05112a"/><circle cx="482" cy="353" r="31" fill="#05112a"/><circle cx="553" cy="353" r="31" fill="#05112a"/><circle cx="127" cy="424" r="31" fill="#05112a"/><circle cx="198" cy="424" r="31" fill="#05112a"/><circle cx="269" cy="424" r="31" fill="#05112a"/><circle cx="340" cy="424" r="31" fill="#05112a"/><circle cx="411" cy="424" r="31" fill="#05112a"/><circle cx="482" cy="424" r="31" fill="#05112a"/><circle cx="553" cy="424" r="31" fill="#05112a"/><circle cx="127" cy="495" r="31" fill="#05112a"/><circle cx="198" cy="495" r="31" fill="#05112a"/><circle cx="269" cy="495" r="31" fill="#05112a"/><circle cx="340" cy="495" r="31" fill="#05112a"/><circle cx="411" cy="495" r="31" fill="#05112a"/><circle cx="482" cy="495" r="31" fill="#05112a"/><circle cx="553" cy="495" r="31" fill="#05112a"/><circle cx="127" cy="566" r="31" fill="#05112a"/><circle cx="198" cy="566" r="31" fill="#05112a"/><circle cx="269" cy="566" r="31" fill="#05112a"/><circle cx="340" cy="566" r="31" fill="#05112a"/><circle cx="411" cy="566" r="31" fill="#05112a"/><circle cx="482" cy="566" r="31" fill="#05112a"/><circle cx="553" cy="566" r="31" fill="#05112a"/><circle cx="127" cy="637" r="31" fill="#05112a"/><circle cx="198" cy="637" r="31" fill="#05112a"/><circle cx="269" cy="637" r="31" fill="#05112a"/><circle cx="340" cy="637" r="31" fill="#05112a"/><circle cx="411" cy="637" r="31" fill="#05112a"/><circle cx="482" cy="637" r="31" fill="#05112a"/><circle cx="553" cy="637" r="31" fill="#05112a"/><circle cx="127" cy="708" r="31" fill="#05112a"/><circle cx="198" cy="708" r="31" fill="#05112a"/><circle cx="269" cy="708" r="31" fill="#05112a"/><circle cx="340" cy="708" r="31" fill="#05112a"/><circle cx="411" cy="708" r="31" fill="#05112a"/><circle cx="482" cy="708" r="31" fill="#05112a"/><circle cx="553" cy="708" r="31" fill="#05112a"/>

<!-- ── PLACED DISCS ── -->
<!-- Red discs (non-winning, dimmed) -->
<circle cx="127" cy="495" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="117" cy="485" r="9" fill="rgba(255,160,160,0.35)"/><circle cx="269" cy="495" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="259" cy="485" r="9" fill="rgba(255,160,160,0.35)"/><circle cx="198" cy="566" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="188" cy="556" r="9" fill="rgba(255,160,160,0.35)"/><circle cx="482" cy="566" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="472" cy="556" r="9" fill="rgba(255,160,160,0.35)"/><circle cx="127" cy="637" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="117" cy="627" r="9" fill="rgba(255,160,160,0.35)"/><circle cx="269" cy="637" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="259" cy="627" r="9" fill="rgba(255,160,160,0.35)"/><circle cx="411" cy="637" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="401" cy="627" r="9" fill="rgba(255,160,160,0.35)"/><circle cx="198" cy="708" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="188" cy="698" r="9" fill="rgba(255,160,160,0.35)"/><circle cx="340" cy="708" r="31" opacity="0.7" fill="#ff4757" style="filter:drop-shadow(0 3px 8px rgba(255,71,87,0.3))"/><circle cx="330" cy="698" r="9" fill="rgba(255,160,160,0.35)"/>

<!-- Yellow discs (dimmed) -->
<circle cx="198" cy="495" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="188" cy="485" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="411" cy="495" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="401" cy="485" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="127" cy="566" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="117" cy="556" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="269" cy="566" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="259" cy="556" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="340" cy="566" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="330" cy="556" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="198" cy="637" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="188" cy="627" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="340" cy="637" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="330" cy="627" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="127" cy="708" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="117" cy="698" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="269" cy="708" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="259" cy="698" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="411" cy="708" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="401" cy="698" r="9" fill="rgba(255,255,180,0.35)"/><circle cx="482" cy="708" r="31" opacity="0.6" fill="#ffd32a" style="filter:drop-shadow(0 3px 8px rgba(255,211,42,0.3))"/><circle cx="472" cy="698" r="9" fill="rgba(255,255,180,0.35)"/>

<!-- ── WINNING LINE GLOW ── -->
<line x1="340" y1="495" x2="553" y2="708"
      stroke="#ff4757" stroke-width="8" opacity="0.25" filter="url(#lineGlow)"/>
<line x1="340" y1="495" x2="553" y2="708"
      stroke="#ff4757" stroke-width="3" opacity="0.6"/>

<!-- ── WINNING DISCS (bright, glowing) ── -->
<circle cx="340" cy="495" r="39" fill="#ff4757" opacity="0.2" filter="url(#redGlow)"/><circle cx="340" cy="495" r="31" fill="#ff4757" filter="url(#redGlow)"/><circle cx="328" cy="483" r="10" fill="rgba(255,180,180,0.5)"/><circle cx="340" cy="495" r="35" fill="none" stroke="#ff6b78" stroke-width="2.5" opacity="0.7"/><circle cx="411" cy="566" r="39" fill="#ff4757" opacity="0.2" filter="url(#redGlow)"/><circle cx="411" cy="566" r="31" fill="#ff4757" filter="url(#redGlow)"/><circle cx="399" cy="554" r="10" fill="rgba(255,180,180,0.5)"/><circle cx="411" cy="566" r="35" fill="none" stroke="#ff6b78" stroke-width="2.5" opacity="0.7"/><circle cx="482" cy="637" r="39" fill="#ff4757" opacity="0.2" filter="url(#redGlow)"/><circle cx="482" cy="637" r="31" fill="#ff4757" filter="url(#redGlow)"/><circle cx="470" cy="625" r="10" fill="rgba(255,180,180,0.5)"/><circle cx="482" cy="637" r="35" fill="none" stroke="#ff6b78" stroke-width="2.5" opacity="0.7"/><circle cx="553" cy="708" r="39" fill="#ff4757" opacity="0.2" filter="url(#redGlow)"/><circle cx="553" cy="708" r="31" fill="#ff4757" filter="url(#redGlow)"/><circle cx="541" cy="696" r="10" fill="rgba(255,180,180,0.5)"/><circle cx="553" cy="708" r="35" fill="none" stroke="#ff6b78" stroke-width="2.5" opacity="0.7"/>

<!-- ── BOARD OVERLAY (blue face with punched holes) ── -->
<!-- We simulate the board mask by drawing a blue rect over each gap region -->
<!-- Row separators and column separators as blue rectangles -->
<!-- Actually just draw the board frame lines for visual depth -->
<rect x="94" y="320" width="493" height="422"
      rx="10" ry="10" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- Bottom label bar -->
<rect x="0" y="988" width="680" height="32" fill="rgba(0,0,0,0.6)"/>
<line x1="0" y1="988" x2="680" y2="988" stroke="#ffd32a" stroke-width="0.8" opacity="0.25"/>
<text x="340" y="1010" text-anchor="middle"
      font-family="Arial, sans-serif" font-size="14" font-weight="700"
      letter-spacing="3" fill="#5c6bc0">PICKLE ORIGINALS</text>
</svg>