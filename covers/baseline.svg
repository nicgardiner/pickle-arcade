<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="bl_sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#5ba9dd"/>
    <stop offset="0.55" stop-color="#8ed0f0"/>
    <stop offset="1" stop-color="#cdeeff"/>
  </linearGradient>
  <linearGradient id="bl_court" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#54b057"/>
    <stop offset="1" stop-color="#327a37"/>
  </linearGradient>
  <linearGradient id="bl_surround" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#2c6e3f"/>
    <stop offset="1" stop-color="#1d4a2c"/>
  </linearGradient>
  <radialGradient id="bl_ball" cx="36%" cy="30%" r="72%">
    <stop offset="0" stop-color="#f2ff8a"/>
    <stop offset="0.5" stop-color="#d4f542"/>
    <stop offset="1" stop-color="#a8c81f"/>
  </radialGradient>
  <linearGradient id="bl_title" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset="0.5" stop-color="#eaff7a"/>
    <stop offset="1" stop-color="#a6d62f"/>
  </linearGradient>
  <radialGradient id="bl_sun" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="rgba(255,250,210,0.95)"/>
    <stop offset="1" stop-color="rgba(255,250,210,0)"/>
  </radialGradient>
  <filter id="bl_glow" x="-40%" y="-60%" width="180%" height="240%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bl_softshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
  </filter>
</defs>

<!-- 1. SKY -->
<rect width="680" height="1020" fill="url(#bl_sky)"/>
<circle cx="556" cy="250" r="130" fill="url(#bl_sun)"/>
<circle cx="556" cy="250" r="42" fill="rgba(255,252,225,0.92)"/>
<!-- clouds -->
<g fill="rgba(255,255,255,0.9)">
  <ellipse cx="150" cy="250" rx="58" ry="22"/><ellipse cx="190" cy="238" rx="40" ry="20"/><ellipse cx="110" cy="240" rx="34" ry="17"/>
  <ellipse cx="430" cy="170" rx="46" ry="18"/><ellipse cx="462" cy="160" rx="32" ry="15"/>
</g>

<!-- 2. STADIUM STANDS (color bands with crowd speckle) -->
<g>
  <rect x="0" y="356" width="680" height="22" fill="#2b6fb0"/>
  <rect x="0" y="378" width="680" height="22" fill="#3f8bd0"/>
  <rect x="0" y="400" width="680" height="22" fill="#2a8a6e"/>
  <rect x="0" y="422" width="680" height="16" fill="#1d6b53"/>
</g>
<g fill="rgba(0,0,0,0.14)">
  <circle cx="40" cy="368" r="2.6"/><circle cx="96" cy="370" r="2.6"/><circle cx="150" cy="367" r="2.6"/><circle cx="210" cy="370" r="2.6"/><circle cx="270" cy="368" r="2.6"/><circle cx="330" cy="370" r="2.6"/><circle cx="392" cy="367" r="2.6"/><circle cx="452" cy="370" r="2.6"/><circle cx="512" cy="368" r="2.6"/><circle cx="572" cy="370" r="2.6"/><circle cx="632" cy="368" r="2.6"/>
  <circle cx="66" cy="390" r="2.6"/><circle cx="126" cy="392" r="2.6"/><circle cx="186" cy="389" r="2.6"/><circle cx="246" cy="392" r="2.6"/><circle cx="306" cy="390" r="2.6"/><circle cx="366" cy="392" r="2.6"/><circle cx="426" cy="389" r="2.6"/><circle cx="486" cy="392" r="2.6"/><circle cx="546" cy="390" r="2.6"/><circle cx="606" cy="392" r="2.6"/>
  <circle cx="44" cy="411" r="2.6"/><circle cx="104" cy="413" r="2.6"/><circle cx="164" cy="410" r="2.6"/><circle cx="224" cy="413" r="2.6"/><circle cx="284" cy="411" r="2.6"/><circle cx="344" cy="413" r="2.6"/><circle cx="404" cy="410" r="2.6"/><circle cx="464" cy="413" r="2.6"/><circle cx="524" cy="411" r="2.6"/><circle cx="584" cy="413" r="2.6"/><circle cx="644" cy="411" r="2.6"/>
</g>
<!-- wall + outer surround band -->
<rect x="0" y="438" width="680" height="9" fill="#163521"/>
<path d="M0,447 L680,447 L680,1020 L0,1020 Z" fill="url(#bl_surround)"/>

<!-- 3. COURT (perspective trapezoid) -->
<path d="M262,452 L418,452 L660,1000 L20,1000 Z" fill="url(#bl_court)"/>
<!-- depth stripes -->
<g fill="rgba(255,255,255,0.05)">
  <path d="M243,520 L437,520 L455,580 L225,580 Z"/>
  <path d="M205,650 L475,650 L505,730 L175,730 Z"/>
  <path d="M150,820 L530,820 L575,920 L105,920 Z"/>
</g>
<!-- white lines -->
<g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round">
  <!-- sidelines -->
  <path d="M262,452 L20,1000"/>
  <path d="M418,452 L660,1000"/>
  <!-- baselines -->
  <path d="M262,452 L418,452"/>
  <path d="M20,1000 L660,1000"/>
  <!-- far service line -->
  <path d="M210,560 L470,560"/>
  <!-- near service line -->
  <path d="M138,724 L542,724"/>
  <!-- center service line -->
  <path d="M340,560 L340,724"/>
  <!-- center marks -->
  <path d="M340,452 L340,470"/>
  <path d="M340,982 L340,1000"/>
</g>

<!-- 4. NET -->
<g>
  <!-- mesh -->
  <path d="M178,612 L178,548 L502,548 L502,612 Z" fill="rgba(245,250,245,0.30)"/>
  <!-- grid -->
  <g stroke="rgba(255,255,255,0.20)" stroke-width="1">
    <line x1="200" y1="548" x2="200" y2="612"/><line x1="232" y1="548" x2="232" y2="612"/><line x1="264" y1="548" x2="264" y2="612"/><line x1="296" y1="548" x2="296" y2="612"/><line x1="328" y1="548" x2="328" y2="612"/><line x1="360" y1="548" x2="360" y2="612"/><line x1="392" y1="548" x2="392" y2="612"/><line x1="424" y1="548" x2="424" y2="612"/><line x1="456" y1="548" x2="456" y2="612"/><line x1="480" y1="548" x2="480" y2="612"/>
    <line x1="178" y1="569" x2="502" y2="569"/><line x1="178" y1="590" x2="502" y2="590"/>
  </g>
  <!-- top tape -->
  <line x1="178" y1="548" x2="502" y2="548" stroke="#ffffff" stroke-width="4"/>
  <!-- posts -->
  <rect x="172" y="544" width="9" height="70" rx="2" fill="#2c2c2c"/>
  <rect x="499" y="544" width="9" height="70" rx="2" fill="#2c2c2c"/>
  <circle cx="176.5" cy="544" r="6" fill="#f2f2f2"/>
  <circle cx="503.5" cy="544" r="6" fill="#f2f2f2"/>
</g>

<!-- 5. TENNIS BALL (foreground, in flight) -->
<!-- motion trail -->
<g fill="#d4f542">
  <circle cx="318" cy="612" r="26" opacity="0.16"/>
  <circle cx="356" cy="660" r="38" opacity="0.24"/>
  <circle cx="398" cy="710" r="52" opacity="0.34"/>
</g>
<!-- speed lines -->
<g stroke="rgba(255,255,255,0.55)" stroke-width="5" stroke-linecap="round">
  <line x1="300" y1="600" x2="356" y2="672"/>
  <line x1="262" y1="648" x2="318" y2="716"/>
  <line x1="246" y1="712" x2="300" y2="772"/>
</g>
<!-- ground shadow -->
<ellipse cx="452" cy="858" rx="78" ry="22" fill="rgba(0,0,0,0.28)" filter="url(#bl_softshadow)"/>
<!-- ball -->
<circle cx="448" cy="772" r="74" fill="url(#bl_ball)" stroke="#9bbb1c" stroke-width="3"/>
<!-- seams -->
<path d="M386,742 Q432,772 388,832" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
<path d="M510,742 Q464,772 508,832" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
<!-- highlight -->
<ellipse cx="420" cy="742" rx="22" ry="16" fill="rgba(255,255,255,0.5)"/>

<!-- 6. RACKET (lower-left, leaning in) -->
<g transform="translate(118,902) rotate(-32)">
  <rect x="-7" y="0" width="14" height="118" rx="7" fill="#1f6b3a"/>
  <rect x="-5" y="0" width="5" height="118" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <ellipse cx="0" cy="-58" rx="50" ry="64" fill="none" stroke="#16321f" stroke-width="13"/>
  <ellipse cx="0" cy="-58" rx="50" ry="64" fill="none" stroke="#2c8f4c" stroke-width="6"/>
  <g stroke="rgba(255,255,255,0.55)" stroke-width="1.4">
    <line x1="-34" y1="-110" x2="-34" y2="-6"/><line x1="-17" y1="-118" x2="-17" y2="2"/><line x1="0" y1="-120" x2="0" y2="4"/><line x1="17" y1="-118" x2="17" y2="2"/><line x1="34" y1="-110" x2="34" y2="-6"/>
    <line x1="-46" y1="-90" x2="46" y2="-90"/><line x1="-49" y1="-70" x2="49" y2="-70"/><line x1="-49" y1="-50" x2="49" y2="-50"/><line x1="-46" y1="-30" x2="46" y2="-30"/>
  </g>
</g>

<!-- 7. TITLE -->
<text x="340" y="150" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900"
      font-size="88" letter-spacing="3" fill="rgba(0,0,0,0.30)">BASELINE</text>
<text x="340" y="146" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900"
      font-size="88" letter-spacing="3" fill="url(#bl_title)" filter="url(#bl_glow)" stroke="#3a6b18" stroke-width="1.5">BASELINE</text>
<text x="340" y="196" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-weight="800"
      font-size="26" letter-spacing="12" fill="#ffffff" opacity="0.95">ARCADE TENNIS</text>
<line x1="214" y1="214" x2="466" y2="214" stroke="#eaff7a" stroke-width="2" opacity="0.7"/>
</svg>
