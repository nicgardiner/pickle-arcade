<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#070407"/>
    <stop offset="45%" stop-color="#0a0606"/>
    <stop offset="100%" stop-color="#050303"/>
  </linearGradient>
  <radialGradient id="archGlow" cx="50%" cy="52%" r="55%">
    <stop offset="0%" stop-color="#7a2408"/>
    <stop offset="45%" stop-color="#521803"/>
    <stop offset="80%" stop-color="#1d0a02"/>
    <stop offset="100%" stop-color="#0a0402" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="archInner" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#b8501c"/>
    <stop offset="35%" stop-color="#8a3a12"/>
    <stop offset="70%" stop-color="#4a1c08"/>
    <stop offset="100%" stop-color="#1c0a03"/>
  </linearGradient>
  <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fbf1d6"/>
    <stop offset="100%" stop-color="#e6cf9e"/>
  </linearGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e7c768"/>
    <stop offset="100%" stop-color="#9c7526"/>
  </linearGradient>
  <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e9eef2"/>
    <stop offset="100%" stop-color="#7d8893"/>
  </linearGradient>
  <radialGradient id="eye" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd0a0"/>
    <stop offset="35%" stop-color="#ff4516"/>
    <stop offset="100%" stop-color="#7a1000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="visor" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd27a"/>
    <stop offset="50%" stop-color="#f0911f"/>
    <stop offset="100%" stop-color="#a64d08"/>
  </radialGradient>
  <radialGradient id="vignette" cx="50%" cy="48%" r="62%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
  </radialGradient>
</defs>

<!-- base -->
<rect width="680" height="1020" fill="url(#bgGrad)"/>

<!-- warm glow behind arch -->
<ellipse cx="340" cy="600" rx="300" ry="430" fill="url(#archGlow)"/>

<!-- gothic archway -->
<path d="M188,1020 L188,560 Q188,372 340,344 Q492,372 492,560 L492,1020 Z" fill="url(#archInner)" opacity="0.92"/>
<path d="M188,1020 L188,560 Q188,372 340,344 Q492,372 492,560 L492,1020 Z" fill="none" stroke="#2a1206" stroke-width="3" opacity="0.6"/>
<!-- inner arch line -->
<path d="M214,1020 L214,566 Q214,398 340,372 Q466,398 466,566 L466,1020 Z" fill="none" stroke="#d9783a" stroke-width="1.5" opacity="0.25"/>
<!-- vertical light streaks -->
<g opacity="0.18" fill="#ffcaa0">
  <rect x="262" y="400" width="10" height="600"/>
  <rect x="318" y="372" width="14" height="640"/>
  <rect x="372" y="392" width="10" height="610"/>
  <rect x="412" y="430" width="7" height="560"/>
  <rect x="232" y="450" width="6" height="540"/>
</g>

<!-- embers -->
<g fill="#ff8a36">
  <circle cx="250" cy="560" r="3" opacity="0.7"/>
  <circle cx="430" cy="610" r="2.5" opacity="0.6"/>
  <circle cx="300" cy="690" r="2" opacity="0.5"/>
  <circle cx="392" cy="500" r="2.5" opacity="0.65"/>
  <circle cx="226" cy="660" r="2" opacity="0.45"/>
  <circle cx="458" cy="540" r="2" opacity="0.5"/>
  <circle cx="356" cy="760" r="2.5" opacity="0.55"/>
  <circle cx="278" cy="470" r="2" opacity="0.5"/>
  <circle cx="436" cy="700" r="3" opacity="0.6"/>
  <circle cx="320" cy="560" r="2" opacity="0.45"/>
  <circle cx="404" cy="660" r="2" opacity="0.5"/>
  <circle cx="244" cy="500" r="2.5" opacity="0.55"/>
</g>

<!-- demon lord silhouette -->
<g>
  <path d="M340,388 C300,388 250,402 224,432 C250,420 286,418 300,430 C284,440 276,456 280,470 L400,470 C404,456 396,440 380,430 C394,418 430,420 456,432 C430,402 380,388 340,388 Z" fill="#080609"/>
  <ellipse cx="340" cy="468" rx="78" ry="30" fill="#0a070b"/>
  <circle cx="314" cy="466" r="20" fill="url(#eye)"/>
  <circle cx="366" cy="466" r="20" fill="url(#eye)"/>
  <circle cx="314" cy="466" r="7" fill="#ff5a22"/>
  <circle cx="366" cy="466" r="7" fill="#ff5a22"/>
</g>

<!-- knight figure -->
<g>
  <!-- cape / wings -->
  <path d="M340,612 C300,612 250,640 236,760 C228,840 250,930 268,980 C300,900 320,820 332,720 Z" fill="#080610"/>
  <path d="M340,612 C380,612 430,640 444,760 C452,840 430,930 412,980 C380,900 360,820 348,720 Z" fill="#0a0712"/>
  <!-- pauldrons -->
  <ellipse cx="288" cy="660" rx="40" ry="30" fill="#13101a"/>
  <ellipse cx="392" cy="660" rx="40" ry="30" fill="#13101a"/>
  <!-- torso -->
  <path d="M300,650 L380,650 L372,860 Q340,890 308,860 Z" fill="#0f0c16"/>
  <!-- helm -->
  <path d="M300,556 C300,556 286,540 296,520 C300,548 318,536 318,536 L340,560 L362,536 C362,536 380,548 384,520 C394,540 380,556 380,556 L378,610 Q340,632 302,610 Z" fill="#100d16"/>
  <!-- visor cross -->
  <rect x="335" y="566" width="10" height="44" rx="3" fill="url(#visor)"/>
  <rect x="320" y="582" width="40" height="9" rx="3" fill="url(#visor)"/>
  <!-- sword -->
  <ellipse cx="340" cy="652" rx="11" ry="11" fill="url(#gold)"/>
  <rect x="294" y="686" width="92" height="13" rx="5" fill="url(#gold)"/>
  <path d="M340,660 L340,650" stroke="#caa24a" stroke-width="6"/>
  <rect x="334" y="660" width="12" height="40" fill="#caa24a"/>
  <polygon points="332,700 348,700 344,966 340,982 336,966" fill="url(#blade)"/>
  <polygon points="340,700 348,700 344,966 340,982" fill="#ffffff" opacity="0.18"/>
  <!-- legs -->
  <path d="M316,862 L332,862 L330,952 L316,952 Z" fill="#0d0a14"/>
  <path d="M348,862 L364,862 L364,952 L350,952 Z" fill="#0d0a14"/>
  <ellipse cx="323" cy="958" rx="16" ry="7" fill="#0a0810"/>
  <ellipse cx="357" cy="958" rx="16" ry="7" fill="#0a0810"/>
</g>

<!-- vignette -->
<rect width="680" height="1020" fill="url(#vignette)"/>

<!-- ornate frame -->
<rect x="34" y="34" width="612" height="952" fill="none" stroke="#9c7a32" stroke-width="2" opacity="0.55"/>
<rect x="40" y="40" width="600" height="940" fill="none" stroke="#c9a24a" stroke-width="1" opacity="0.4"/>
<!-- corner brackets -->
<g stroke="#d8b35a" stroke-width="4" fill="none" stroke-linecap="round">
  <path d="M56,96 L56,56 L96,56"/>
  <path d="M584,56 L624,56 L624,96"/>
  <path d="M56,924 L56,964 L96,964"/>
  <path d="M584,964 L624,964 L624,924"/>
</g>
<g stroke="#8a6a2a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
  <path d="M72,120 L72,72 L120,72"/>
  <path d="M560,72 L608,72 L608,120"/>
  <path d="M72,900 L72,948 L120,948"/>
  <path d="M560,948 L608,948 L608,900"/>
</g>

<!-- crown -->
<g transform="translate(340,108)">
  <path d="M-44,18 L-44,-6 L-26,10 L0,-22 L26,10 L44,-6 L44,18 Z" fill="url(#gold)" stroke="#7a5a1e" stroke-width="1.5"/>
  <rect x="-44" y="18" width="88" height="9" rx="2" fill="url(#gold)" stroke="#7a5a1e" stroke-width="1"/>
  <circle cx="-26" cy="6" r="4.5" fill="#e23a2a"/>
  <circle cx="0" cy="0" r="5" fill="#e23a2a"/>
  <circle cx="26" cy="6" r="4.5" fill="#e23a2a"/>
</g>

<!-- title -->
<text x="340" y="246" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="bold" letter-spacing="2" fill="url(#title)">BLACK</text>
<text x="340" y="352" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="bold" letter-spacing="2" fill="url(#title)">KNIGHT</text>

<!-- subtitle -->
<rect x="334" y="392" width="12" height="12" transform="rotate(45 340 398)" fill="#c9a24a"/>
<text x="340" y="446" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="22" letter-spacing="7" fill="#cda855">A PACT WITH THE DEMON LORD</text>

<!-- tagline -->
<text x="340" y="858" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="21" letter-spacing="6" fill="#9c7c3e">DESCEND · BARGAIN · SURVIVE</text>

<!-- steps -->
<g fill="#caa24a" opacity="0.5">
  <polygon points="276,960 404,960 420,968 260,968"/>
  <polygon points="290,948 390,948 404,956 276,956"/>
</g>

<!-- three cards -->
<g>
  <g transform="translate(256,910) rotate(-8)">
    <rect x="-28" y="-38" width="56" height="76" rx="7" fill="#140b18" stroke="#b89240" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="9" fill="#e7892a"/>
  </g>
  <g transform="translate(424,910) rotate(8)">
    <rect x="-28" y="-38" width="56" height="76" rx="7" fill="#140b18" stroke="#b89240" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="9" fill="#46aa46"/>
  </g>
  <g transform="translate(340,894)">
    <rect x="-30" y="-42" width="60" height="84" rx="8" fill="#170d1d" stroke="#d8b35a" stroke-width="2"/>
    <circle cx="0" cy="0" r="11" fill="#7a45c8"/>
  </g>
</g>

<!-- footer -->
<text x="340" y="974" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="16" letter-spacing="2" fill="#6a5634">A Gothic Roguelike Deckbuilder</text>
</svg>
