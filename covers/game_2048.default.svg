<svg viewBox="0 0 680 1020" width="400" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#3a2005" stop-opacity="1"/>
      <stop offset="100%" stop-color="#110e05" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ea580c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#110e05" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="35%"  stop-color="#f59e0b"/>
      <stop offset="70%"  stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="tile512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="tile1024" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="tile256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="tile128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="tileGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="smallGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="680" height="1020"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="680" height="1020" fill="url(#bgGlow)"/>

    <!-- Subtle grid background -->
    <g opacity="0.06" stroke="#fbbf24" stroke-width="0.8">
      <line x1="0" y1="255" x2="680" y2="255"/>
      <line x1="0" y1="375" x2="680" y2="375"/>
      <line x1="0" y1="495" x2="680" y2="495"/>
      <line x1="0" y1="615" x2="680" y2="615"/>
      <line x1="0" y1="735" x2="680" y2="735"/>
      <line x1="170" y1="0" x2="170" y2="1020"/>
      <line x1="340" y1="0" x2="340" y2="1020"/>
      <line x1="510" y1="0" x2="510" y2="1020"/>
    </g>

    <!-- Ambient glow behind main tile -->
    <ellipse cx="340" cy="590" rx="270" ry="270" fill="url(#coreGlow)"/>

    <!-- Corner decorations -->
    <polyline points="24,24 24,68 68,68" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
    <polyline points="656,24 656,68 612,68" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
    <polyline points="24,996 24,952 68,952" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
    <polyline points="656,996 656,952 612,952" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>

    <!-- ── TITLE ── -->
    <!-- Glow layer -->
    <text x="340" y="148" text-anchor="middle"
          font-family="'Arial Black', Arial, sans-serif" font-size="110" font-weight="900"
          letter-spacing="-4" fill="#fbbf24" filter="url(#titleGlow)" opacity="0.6">2048</text>
    <!-- Shadow -->
    <text x="345" y="153" text-anchor="middle"
          font-family="'Arial Black', Arial, sans-serif" font-size="110" font-weight="900"
          letter-spacing="-4" fill="rgba(0,0,0,0.6)">2048</text>
    <!-- Main title with gradient -->
    <text x="340" y="148" text-anchor="middle"
          font-family="'Arial Black', Arial, sans-serif" font-size="110" font-weight="900"
          letter-spacing="-4" fill="url(#titleGrad)">2048</text>

    <!-- Tagline -->
    <text x="340" y="190" text-anchor="middle"
          font-family="Arial, sans-serif" font-size="18" font-weight="600"
          letter-spacing="6" fill="rgba(245,236,208,0.45)" text-transform="uppercase">DOUBLE OR NOTHING</text>

    <!-- Separator line -->
    <line x1="100" y1="210" x2="580" y2="210" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>

    <!-- ── PRECURSOR TILES (small, dimmed, orbiting) ── -->
    <!-- 128 tile — top left area -->
    <rect x="72" y="340" width="110" height="110" rx="12" fill="url(#tile128)" opacity="0.55" filter="url(#smallGlow)"/>
    <text x="127" y="406" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-size="30" font-weight="900" fill="rgba(28,16,5,0.9)">128</text>

    <!-- 256 tile — bottom left area -->
    <rect x="56" y="600" width="130" height="130" rx="14" fill="url(#tile256)" opacity="0.60" filter="url(#smallGlow)"/>
    <text x="121" y="676" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-size="32" font-weight="900" fill="rgba(28,16,5,0.9)">256</text>

    <!-- 512 tile — top right area -->
    <rect x="498" y="330" width="120" height="120" rx="13" fill="url(#tile512)" opacity="0.60" filter="url(#smallGlow)"/>
    <text x="558" y="401" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-size="32" font-weight="900" fill="rgba(255,255,255,0.95)">512</text>

    <!-- 1024 tile — bottom right area -->
    <rect x="490" y="600" width="138" height="138" rx="14" fill="url(#tile1024)" opacity="0.65" filter="url(#smallGlow)"/>
    <text x="559" y="681" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-size="28" font-weight="900" fill="rgba(255,255,255,0.95)">1024</text>

    <!-- ── MAIN 2048 TILE ── -->
    <!-- Outer glow -->
    <rect x="160" y="420" width="360" height="360" rx="28" fill="url(#tileGrad)" filter="url(#tileGlow)" opacity="0.55"/>
    <!-- Shadow -->
    <rect x="168" y="432" width="360" height="360" rx="28" fill="rgba(0,0,0,0.5)"/>
    <!-- Main tile -->
    <rect x="160" y="420" width="360" height="360" rx="28" fill="url(#tileGrad)"/>
    <!-- Tile inner highlight -->
    <rect x="160" y="420" width="360" height="180" rx="28" fill="rgba(255,255,255,0.07)"/>
    <rect x="160" y="420" width="360" height="360" rx="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

    <!-- 2048 text on tile -->
    <!-- Shadow -->
    <text x="344" y="622" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-size="88" font-weight="900" fill="rgba(0,0,0,0.4)">2048</text>
    <!-- Main -->
    <text x="340" y="618" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-size="88" font-weight="900" fill="#ffffff"
          filter="url(#softGlow)">2048</text>

    <!-- Pulse ring around tile -->
    <rect x="148" y="408" width="384" height="384" rx="32" fill="none"
          stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
    <rect x="136" y="396" width="408" height="408" rx="36" fill="none"
          stroke="#f59e0b" stroke-width="1" opacity="0.15"/>

    <!-- ── BOTTOM BAR ── -->
    <rect x="0" y="860" width="680" height="160" fill="rgba(17,14,5,0.92)"/>
    <line x1="0" y1="860" x2="680" y2="860" stroke="#fbbf24" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="864" x2="680" y2="864" stroke="#fbbf24" stroke-width="0.5" opacity="0.15"/>

    <!-- Reach 2048 text -->
    <text x="340" y="920" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-size="20" font-weight="700" letter-spacing="4"
          fill="rgba(251,191,36,0.6)">REACH THE TILE</text>
    <text x="340" y="970" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
          font-size="14" font-weight="600" letter-spacing="8"
          fill="rgba(245,236,208,0.35)">PICKLE GAME LIBRARY</text>
  </g>
</svg>