<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
  <defs>
    <!-- Deep navy background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1829"/>
      <stop offset="100%" stop-color="#040912"/>
    </linearGradient>

    <!-- Subtle blue atmospheric overlay -->
    <radialGradient id="atmos" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#1d4ed822"/>
      <stop offset="100%" stop-color="#00000000"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="62%">
      <stop offset="35%"  stop-color="#00000000"/>
      <stop offset="100%" stop-color="#000000bb"/>
    </radialGradient>

    <!-- Glow behind the queen -->
    <radialGradient id="queenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#93c5fd44"/>
      <stop offset="55%"  stop-color="#1d4ed822"/>
      <stop offset="100%" stop-color="#00000000"/>
    </radialGradient>

    <!-- Title glow -->
    <filter id="titleGlow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Queen glow filter -->
    <filter id="queenGlowF" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Top fade for title zone -->
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#040912" stop-opacity="1"/>
      <stop offset="100%" stop-color="#040912" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom fade -->
    <linearGradient id="botFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#040912" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040912" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="680" height="1020" fill="url(#bgGrad)"/>

  <!-- ── Chess board — 8x8 at 108px/sq, 10, centered ~490 from top ── -->
  <!-- Blue/slate color scheme: dark=#3d5c8a (slate blue), light=#c8dcea (pale silver-blue) -->
  <g transform="translate(340,500) rotate(10) translate(-432,-432)">
    <!-- Row 0 -->
    <rect x="0"   y="0"   width="108" height="108" fill="#c8dcea"/>
    <rect x="108" y="0"   width="108" height="108" fill="#3d5c8a"/>
    <rect x="216" y="0"   width="108" height="108" fill="#c8dcea"/>
    <rect x="324" y="0"   width="108" height="108" fill="#3d5c8a"/>
    <rect x="432" y="0"   width="108" height="108" fill="#c8dcea"/>
    <rect x="540" y="0"   width="108" height="108" fill="#3d5c8a"/>
    <rect x="648" y="0"   width="108" height="108" fill="#c8dcea"/>
    <rect x="756" y="0"   width="108" height="108" fill="#3d5c8a"/>
    <!-- Row 1 -->
    <rect x="0"   y="108" width="108" height="108" fill="#3d5c8a"/>
    <rect x="108" y="108" width="108" height="108" fill="#c8dcea"/>
    <rect x="216" y="108" width="108" height="108" fill="#3d5c8a"/>
    <rect x="324" y="108" width="108" height="108" fill="#c8dcea"/>
    <rect x="432" y="108" width="108" height="108" fill="#3d5c8a"/>
    <rect x="540" y="108" width="108" height="108" fill="#c8dcea"/>
    <rect x="648" y="108" width="108" height="108" fill="#3d5c8a"/>
    <rect x="756" y="108" width="108" height="108" fill="#c8dcea"/>
    <!-- Row 2 -->
    <rect x="0"   y="216" width="108" height="108" fill="#c8dcea"/>
    <rect x="108" y="216" width="108" height="108" fill="#3d5c8a"/>
    <rect x="216" y="216" width="108" height="108" fill="#c8dcea"/>
    <rect x="324" y="216" width="108" height="108" fill="#3d5c8a"/>
    <rect x="432" y="216" width="108" height="108" fill="#c8dcea"/>
    <rect x="540" y="216" width="108" height="108" fill="#3d5c8a"/>
    <rect x="648" y="216" width="108" height="108" fill="#c8dcea"/>
    <rect x="756" y="216" width="108" height="108" fill="#3d5c8a"/>
    <!-- Row 3 -->
    <rect x="0"   y="324" width="108" height="108" fill="#3d5c8a"/>
    <rect x="108" y="324" width="108" height="108" fill="#c8dcea"/>
    <rect x="216" y="324" width="108" height="108" fill="#3d5c8a"/>
    <rect x="324" y="324" width="108" height="108" fill="#c8dcea"/>
    <rect x="432" y="324" width="108" height="108" fill="#3d5c8a"/>
    <rect x="540" y="324" width="108" height="108" fill="#c8dcea"/>
    <rect x="648" y="324" width="108" height="108" fill="#3d5c8a"/>
    <rect x="756" y="324" width="108" height="108" fill="#c8dcea"/>
    <!-- Row 4 -->
    <rect x="0"   y="432" width="108" height="108" fill="#c8dcea"/>
    <rect x="108" y="432" width="108" height="108" fill="#3d5c8a"/>
    <rect x="216" y="432" width="108" height="108" fill="#c8dcea"/>
    <rect x="324" y="432" width="108" height="108" fill="#3d5c8a"/>
    <rect x="432" y="432" width="108" height="108" fill="#c8dcea"/>
    <rect x="540" y="432" width="108" height="108" fill="#3d5c8a"/>
    <rect x="648" y="432" width="108" height="108" fill="#c8dcea"/>
    <rect x="756" y="432" width="108" height="108" fill="#3d5c8a"/>
    <!-- Row 5 -->
    <rect x="0"   y="540" width="108" height="108" fill="#3d5c8a"/>
    <rect x="108" y="540" width="108" height="108" fill="#c8dcea"/>
    <rect x="216" y="540" width="108" height="108" fill="#3d5c8a"/>
    <rect x="324" y="540" width="108" height="108" fill="#c8dcea"/>
    <rect x="432" y="540" width="108" height="108" fill="#3d5c8a"/>
    <rect x="540" y="540" width="108" height="108" fill="#c8dcea"/>
    <rect x="648" y="540" width="108" height="108" fill="#3d5c8a"/>
    <rect x="756" y="540" width="108" height="108" fill="#c8dcea"/>
    <!-- Row 6 -->
    <rect x="0"   y="648" width="108" height="108" fill="#c8dcea"/>
    <rect x="108" y="648" width="108" height="108" fill="#3d5c8a"/>
    <rect x="216" y="648" width="108" height="108" fill="#c8dcea"/>
    <rect x="324" y="648" width="108" height="108" fill="#3d5c8a"/>
    <rect x="432" y="648" width="108" height="108" fill="#c8dcea"/>
    <rect x="540" y="648" width="108" height="108" fill="#3d5c8a"/>
    <rect x="648" y="648" width="108" height="108" fill="#c8dcea"/>
    <rect x="756" y="648" width="108" height="108" fill="#3d5c8a"/>
    <!-- Row 7 -->
    <rect x="0"   y="756" width="108" height="108" fill="#3d5c8a"/>
    <rect x="108" y="756" width="108" height="108" fill="#c8dcea"/>
    <rect x="216" y="756" width="108" height="108" fill="#3d5c8a"/>
    <rect x="324" y="756" width="108" height="108" fill="#c8dcea"/>
    <rect x="432" y="756" width="108" height="108" fill="#3d5c8a"/>
    <rect x="540" y="756" width="108" height="108" fill="#c8dcea"/>
    <rect x="648" y="756" width="108" height="108" fill="#3d5c8a"/>
    <rect x="756" y="756" width="108" height="108" fill="#c8dcea"/>
  </g>

  <!-- Atmospheric glow over board -->
  <rect width="680" height="1020" fill="url(#atmos)"/>

  <!-- Vignette -->
  <rect width="680" height="1020" fill="url(#vignette)"/>

  <!-- Top fade for title -->
  <rect width="680" height="340" fill="url(#topFade)"/>

  <!-- Bottom fade -->
  <rect y="690" width="680" height="330" fill="url(#botFade)"/>

  <!-- Blue glow behind queen -->
  <ellipse cx="340" cy="500" rx="190" ry="170" fill="url(#queenGlow)"/>

  <!-- ── Queen piece ── -->
  <g transform="translate(340,510) rotate(6)">
    <!-- Soft blue aura (glow pass) -->
    <text text-anchor="middle" dominant-baseline="middle"
          font-family='"Segoe UI Symbol","Apple Color Emoji","Noto Chess",serif'
          font-size="230" fill="#93c5fd" opacity="0.22"
          filter="url(#queenGlowF)">&#9813;</text>
    <!-- Dark navy outline -->
    <text text-anchor="middle" dominant-baseline="middle"
          font-family='"Segoe UI Symbol","Apple Color Emoji","Noto Chess",serif'
          font-size="230" fill="none"
          stroke="#1a3050" stroke-width="20" stroke-linejoin="round">&#9813;</text>
    <!-- Ivory fill -->
    <text text-anchor="middle" dominant-baseline="middle"
          font-family='"Segoe UI Symbol","Apple Color Emoji","Noto Chess",serif'
          font-size="230" fill="#f0ead6">&#9813;</text>
  </g>

  <!-- ── Title ── -->
  <!-- Glow pass -->
  <text x="340" y="192" text-anchor="middle"
        font-family="Georgia, serif" font-size="100" font-weight="bold" letter-spacing="12"
        fill="#93c5fd" opacity="0.38" filter="url(#titleGlow)">CHESS</text>
  <!-- Solid pass -->
  <text x="340" y="192" text-anchor="middle"
        font-family="Georgia, serif" font-size="100" font-weight="bold" letter-spacing="12"
        fill="#e8f4f8">CHESS</text>

  <!-- Rule line -->
  <rect x="160" y="212" width="360" height="2" rx="1" fill="#3b82f6" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="340" y="250" text-anchor="middle"
        font-family="Georgia, serif" font-size="21" letter-spacing="7"
        fill="#3b82f6" opacity="0.85">CLASSIC BOARD GAME</text>

  <!-- Bottom label -->
  <text x="340" y="944" text-anchor="middle"
        font-family="Georgia, serif" font-size="18" letter-spacing="4"
        fill="#1d4ed8" opacity="0.8">BOT &#183; MULTIPLAYER</text>

  <!-- Corner mini chess-board motifs -->
  <rect x="34"  y="956" width="11" height="11" fill="#c8dcea" opacity="0.3"/>
  <rect x="45"  y="956" width="11" height="11" fill="#3d5c8a" opacity="0.55"/>
  <rect x="56"  y="956" width="11" height="11" fill="#c8dcea" opacity="0.3"/>
  <rect x="34"  y="967" width="11" height="11" fill="#3d5c8a" opacity="0.55"/>
  <rect x="45"  y="967" width="11" height="11" fill="#c8dcea" opacity="0.3"/>
  <rect x="56"  y="967" width="11" height="11" fill="#3d5c8a" opacity="0.55"/>

  <rect x="602" y="956" width="11" height="11" fill="#3d5c8a" opacity="0.55"/>
  <rect x="613" y="956" width="11" height="11" fill="#c8dcea" opacity="0.3"/>
  <rect x="624" y="956" width="11" height="11" fill="#3d5c8a" opacity="0.55"/>
  <rect x="602" y="967" width="11" height="11" fill="#c8dcea" opacity="0.3"/>
  <rect x="613" y="967" width="11" height="11" fill="#3d5c8a" opacity="0.55"/>
  <rect x="624" y="967" width="11" height="11" fill="#c8dcea" opacity="0.3"/>
</svg>