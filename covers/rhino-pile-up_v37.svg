<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="rpSky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0b1a36"/>
    <stop offset="0.45" stop-color="#1e3a5f"/>
    <stop offset="1" stop-color="#3b6ea5"/>
  </linearGradient>
  <linearGradient id="rpStone" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#a9acb2"/>
    <stop offset="0.5" stop-color="#8a8d92"/>
    <stop offset="1" stop-color="#6c6f75"/>
  </linearGradient>
  <radialGradient id="rpMoon" cx="50%" cy="40%" r="60%">
    <stop offset="0" stop-color="#f8fafc"/>
    <stop offset="0.7" stop-color="#dbe4ee"/>
    <stop offset="1" stop-color="#aab8c8"/>
  </radialGradient>
  <filter id="rpGlow" x="-40%" y="-60%" width="180%" height="240%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="rpSoft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
  </filter>
</defs>

<!-- 1. Sky -->
<rect width="680" height="1020" fill="url(#rpSky)"/>

<!-- soft moon high in the sky -->
<circle cx="520" cy="300" r="60" fill="url(#rpMoon)" opacity="0.85"/>
<circle cx="520" cy="300" r="80" fill="#cfe0f2" opacity="0.10" filter="url(#rpSoft)"/>

<!-- faint stars -->
<g fill="#dbe9ff" opacity="0.7">
  <circle cx="120" cy="260" r="2.2"/><circle cx="200" cy="340" r="1.6"/>
  <circle cx="300" cy="240" r="1.8"/><circle cx="420" cy="420" r="1.6"/>
  <circle cx="610" cy="200" r="2"/><circle cx="90" cy="430" r="1.5"/>
  <circle cx="360" cy="360" r="1.4"/><circle cx="600" cy="440" r="1.7"/>
</g>

<!-- 2. OUT-OF-BOUNDS hazard bands at left & right edges -->
<rect x="0" y="148" width="74" height="872" fill="rgba(220,38,38,0.18)"/>
<rect x="606" y="148" width="74" height="872" fill="rgba(220,38,38,0.18)"/>
<g stroke="rgba(248,113,113,0.55)" stroke-width="3" stroke-dasharray="14 10">
  <line x1="74" y1="148" x2="74" y2="1020"/>
  <line x1="606" y1="148" x2="606" y2="1020"/>
</g>
<g fill="rgba(248,113,113,0.5)" font-family="'Arial Black',sans-serif" font-weight="900" font-size="15" letter-spacing="2" text-anchor="middle">
  <text x="37" y="560" transform="rotate(-90 37 560)">O U T</text>
  <text x="643" y="560" transform="rotate(90 643 560)">O U T</text>
</g>

<!-- ground / plinth -->
<rect x="0" y="930" width="680" height="90" fill="#2f4a2f"/>
<rect x="40" y="900" width="600" height="34" rx="7" fill="#6b6f76"/>
<rect x="40" y="900" width="600" height="7" fill="#7c818a"/>

<!-- 3. The giant stone rhino (centered, large) -->
<g transform="translate(340 740) scale(1.55)">
  <!-- legs -->
  <rect x="-104" y="-150" width="40" height="160" rx="13" fill="#6c6f75"/>
  <rect x="84" y="-140" width="32" height="150" rx="12" fill="#6c6f75"/>
  <rect x="-104" y="-150" width="40" height="150" rx="13" fill="url(#rpStone)"/>
  <rect x="84" y="-140" width="32" height="140" rx="12" fill="url(#rpStone)"/>
  <!-- body -->
  <path d="M-110,-60 Q-150,-112 -118,-150 C-88,-190 -45,-210 -8,-210
           C26,-210 50,-192 66,-170 Q84,-158 110,-158
           C138,-156 164,-146 178,-120 Q185,-108 176,-95
           Q168,-86 146,-86 Q120,-86 104,-94
           Q24,-76 -58,-80 Q-92,-82 -110,-60 Z" fill="url(#rpStone)"/>
  <!-- back shadow -->
  <path d="M-58,-80 Q24,-76 104,-94 Q20,-68 -58,-72 Z" fill="#5f6268" opacity="0.3"/>
  <!-- big horn -->
  <path d="M158,-118 L180,-116 Q184,-146 172,-174 Q164,-146 158,-118 Z" fill="#d8d3c6"/>
  <!-- small horn -->
  <path d="M140,-150 L156,-148 Q157,-168 151,-180 Q144,-164 140,-150 Z" fill="#d8d3c6"/>
  <!-- eye -->
  <circle cx="146" cy="-138" r="3.6" fill="#2a2d33"/>
  <circle cx="147" cy="-139" r="1.2" fill="rgba(255,255,255,0.85)"/>
  <!-- ear -->
  <path d="M100,-160 Q95,-186 112,-183 Q117,-168 110,-157 Z" fill="url(#rpStone)"/>
</g>

<!-- 4. A pile-up of colorful climbers stacked up the rhino's back -->
<!-- each is a simple ragdoll: head, body, limbs in the player color -->
<g stroke="#231b2e" stroke-width="3" stroke-linecap="round" fill="none">
  <!-- gold climber, near the top (winning the bar) -->
  <g>
    <line x1="372" y1="430" x2="372" y2="470" stroke="#fbbf24"/>
    <circle cx="372" cy="416" r="13" fill="#fbbf24" stroke="#231b2e"/>
    <line x1="372" y1="442" x2="348" y2="424" stroke="#fbbf24"/>
    <line x1="372" y1="442" x2="398" y2="420" stroke="#fbbf24"/>
    <line x1="372" y1="470" x2="356" y2="500" stroke="#fbbf24"/>
    <line x1="372" y1="470" x2="392" y2="498" stroke="#fbbf24"/>
  </g>
  <!-- pink climber, mid -->
  <g>
    <line x1="300" y1="520" x2="300" y2="558" stroke="#f472b6"/>
    <circle cx="300" cy="506" r="12" fill="#f472b6" stroke="#231b2e"/>
    <line x1="300" y1="530" x2="278" y2="514" stroke="#f472b6"/>
    <line x1="300" y1="530" x2="324" y2="540" stroke="#f472b6"/>
    <line x1="300" y1="558" x2="286" y2="586" stroke="#f472b6"/>
    <line x1="300" y1="558" x2="318" y2="584" stroke="#f472b6"/>
  </g>
  <!-- green climber, lower -->
  <g>
    <line x1="430" y1="600" x2="430" y2="638" stroke="#34d399"/>
    <circle cx="430" cy="586" r="12" fill="#34d399" stroke="#231b2e"/>
    <line x1="430" y1="610" x2="408" y2="624" stroke="#34d399"/>
    <line x1="430" y1="610" x2="454" y2="598" stroke="#34d399"/>
    <line x1="430" y1="638" x2="416" y2="666" stroke="#34d399"/>
    <line x1="430" y1="638" x2="448" y2="664" stroke="#34d399"/>
  </g>
  <!-- blue climber, near base -->
  <g>
    <line x1="250" y1="700" x2="250" y2="738" stroke="#60a5fa"/>
    <circle cx="250" cy="686" r="12" fill="#60a5fa" stroke="#231b2e"/>
    <line x1="250" y1="710" x2="228" y2="694" stroke="#60a5fa"/>
    <line x1="250" y1="710" x2="274" y2="722" stroke="#60a5fa"/>
    <line x1="250" y1="738" x2="236" y2="766" stroke="#60a5fa"/>
    <line x1="250" y1="738" x2="268" y2="764" stroke="#60a5fa"/>
  </g>
</g>

<!-- the height bar the leader set -->
<g>
  <line x1="120" y1="440" x2="560" y2="440" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="12 7" opacity="0.9"/>
  <text x="126" y="430" fill="#fbbf24" font-family="'Arial Black',sans-serif" font-weight="900" font-size="14">TOP MARK</text>
</g>

<!-- 5. Title -->
<rect x="0" y="0" width="680" height="160" fill="rgba(8,16,28,0.55)"/>
<line x1="0" y1="160" x2="680" y2="160" stroke="#f59e0b" stroke-width="1.4"/>
<text x="340" y="92" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900"
      font-size="62" letter-spacing="2" fill="#f59e0b" filter="url(#rpGlow)">RHINO</text>
<text x="340" y="146" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900"
      font-size="48" letter-spacing="8" fill="#fde68a">PILE-UP</text>

<!-- bottom tagline -->
<rect x="0" y="978" width="680" height="42" fill="rgba(8,16,28,0.55)"/>
<text x="340" y="1006" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-weight="bold"
      font-size="18" letter-spacing="5" fill="#fbbf24">STACK · CLIMB · CONQUER</text>
</svg>
