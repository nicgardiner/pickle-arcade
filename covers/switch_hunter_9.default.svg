<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans Mono','Courier New',monospace">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0"    stop-color="#1a1608"/>
    <stop offset="0.32" stop-color="#150c06"/>
    <stop offset="0.66" stop-color="#0f0604"/>
    <stop offset="1"    stop-color="#070101"/>
  </linearGradient>
  <radialGradient id="portalGlow" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0"   stop-color="#5a4416" stop-opacity="0.9"/>
    <stop offset="0.45" stop-color="#2a2410" stop-opacity="0.6"/>
    <stop offset="0.8" stop-color="#13202a" stop-opacity="0.35"/>
    <stop offset="1"   stop-color="#0a0602" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="breachGlow" cx="0.5" cy="1" r="0.7">
    <stop offset="0"   stop-color="#7a1208" stop-opacity="0.75"/>
    <stop offset="0.4" stop-color="#3a0805" stop-opacity="0.4"/>
    <stop offset="1"   stop-color="#0a0202" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
    <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
    <stop offset="1"    stop-color="#000000" stop-opacity="0.7"/>
  </radialGradient>
  <linearGradient id="entityBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0"   stop-color="#2a0a0a"/>
    <stop offset="0.5" stop-color="#170606"/>
    <stop offset="1"   stop-color="#0a0303" stop-opacity="0.2"/>
  </linearGradient>
  <radialGradient id="entityFade" cx="0.5" cy="0.32" r="0.7">
    <stop offset="0.45" stop-color="#000000" stop-opacity="0"/>
    <stop offset="1"   stop-color="#0a0303" stop-opacity="0.78"/>
  </radialGradient>
  <linearGradient id="platTop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#46505e"/>
    <stop offset="1" stop-color="#323b47"/>
  </linearGradient>
  <linearGradient id="platSide" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#222a34"/>
    <stop offset="1" stop-color="#141a22"/>
  </linearGradient>
  <radialGradient id="ballGrad" cx="0.4" cy="0.4" r="0.6">
    <stop offset="0" stop-color="#eaf8ff"/>
    <stop offset="0.5" stop-color="#7fd0ff"/>
    <stop offset="1" stop-color="#2a8edb"/>
  </radialGradient>
  <linearGradient id="gunBody" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#363b44"/>
    <stop offset="1" stop-color="#1a1e25"/>
  </linearGradient>

  <filter id="glowOrange" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowCyan" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowCyanBig" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="14" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowRed" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowWhite" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="18"/>
  </filter>
</defs>

<!-- ===== BACKGROUND ===== -->
<rect width="1000" height="1500" fill="url(#bg)"/>
<ellipse cx="500" cy="250" rx="560" ry="330" fill="url(#portalGlow)"/>
<rect x="0" y="900" width="1000" height="600" fill="url(#breachGlow)"/>

<g stroke="#caa24a" fill="none" opacity="0.10" stroke-width="2">
  <ellipse cx="500" cy="235" rx="300" ry="180"/>
  <ellipse cx="500" cy="235" rx="225" ry="135"/>
  <ellipse cx="500" cy="235" rx="150" ry="90"/>
</g>
<g stroke="#3aa0d8" fill="none" opacity="0.07" stroke-width="2">
  <ellipse cx="500" cy="235" rx="262" ry="157"/>
  <ellipse cx="500" cy="235" rx="187" ry="112"/>
</g>

<g filter="url(#soft)" opacity="0.5">
  <ellipse cx="320" cy="1180" rx="360" ry="50" fill="#2a1408"/>
  <ellipse cx="720" cy="1280" rx="380" ry="55" fill="#3a0e08"/>
  <ellipse cx="500" cy="980" rx="300" ry="40" fill="#241405"/>
</g>

<g fill="#c8a050" opacity="0.18">
  <circle cx="180" cy="560" r="2"/>
  <circle cx="840" cy="520" r="2.5"/>
  <circle cx="120" cy="900" r="2"/>
  <circle cx="900" cy="980" r="2"/>
  <circle cx="700" cy="600" r="1.5"/>
  <circle cx="240" cy="700" r="1.5"/>
  <circle cx="820" cy="1100" r="2"/>
  <circle cx="160" cy="1180" r="2"/>
</g>

<!-- ===== THE ENTITY (looms from the dark, center) ===== -->
<g>
  <path d="M500,470
           C476,486 470,520 472,560
           L486,860 C490,1010 482,1120 500,1180
           C518,1120 510,1010 514,860
           L528,560 C530,520 524,486 500,470 Z"
        fill="url(#entityBody)"/>

  <g fill="none" stroke-linecap="round">
    <g stroke="#5a1410" stroke-width="20" opacity="0.35" filter="url(#glowRed)">
      <path d="M476,546 C404,584 352,650 300,742 C276,786 262,840 256,898"/>
      <path d="M524,546 C596,584 648,650 700,742 C724,786 738,840 744,898"/>
    </g>
    <g stroke="#1c0707" stroke-width="15">
      <path d="M476,546 C404,584 352,650 300,742 C276,786 262,840 256,898"/>
      <path d="M524,546 C596,584 648,650 700,742 C724,786 738,840 744,898"/>
    </g>
    <g stroke="#34100f" stroke-width="4" opacity="0.6">
      <path d="M476,546 C404,584 352,650 300,742 C276,786 262,840 256,898"/>
      <path d="M524,546 C596,584 648,650 700,742 C724,786 738,840 744,898"/>
    </g>
  </g>
  <g fill="#0c0303" stroke="#3a1212" stroke-width="2">
    <polygon points="256,898 238,956 250,902"/>
    <polygon points="256,898 260,964 270,904"/>
    <polygon points="256,898 282,950 276,902"/>
    <polygon points="744,898 762,956 750,902"/>
    <polygon points="744,898 740,964 730,904"/>
    <polygon points="744,898 718,950 724,902"/>
  </g>

  <ellipse cx="500" cy="432" rx="58" ry="92" fill="#180606" stroke="#2e0c0c" stroke-width="2"/>
  <path d="M470,360 C452,322 430,300 408,290 C432,308 452,332 472,372 Z" fill="#0a0303" stroke="#2a0a0a" stroke-width="2"/>
  <path d="M530,360 C548,322 570,300 592,290 C568,308 548,332 528,372 Z" fill="#0a0303" stroke="#2a0a0a" stroke-width="2"/>
  <ellipse cx="500" cy="432" rx="58" ry="92" fill="none" stroke="#5a1410" stroke-width="3" opacity="0.5" filter="url(#glowRed)"/>

  <g filter="url(#glowRed)">
    <ellipse cx="476" cy="420" rx="13" ry="8" fill="#ff2200" transform="rotate(18 476 420)"/>
    <ellipse cx="524" cy="420" rx="13" ry="8" fill="#ff2200" transform="rotate(-18 524 420)"/>
  </g>
  <ellipse cx="478" cy="421" rx="5" ry="3.5" fill="#fff2e6" transform="rotate(18 478 421)"/>
  <ellipse cx="522" cy="421" rx="5" ry="3.5" fill="#fff2e6" transform="rotate(-18 522 421)"/>

  <g filter="url(#glowWhite)">
    <path d="M452,470 Q500,460 548,470 Q500,500 452,470 Z" fill="#eef9ff"/>
  </g>
  <g stroke="#160606" stroke-width="2.4" opacity="0.9">
    <line x1="465" y1="468" x2="466" y2="486"/>
    <line x1="478" y1="466" x2="479" y2="490"/>
    <line x1="491" y1="465" x2="491" y2="492"/>
    <line x1="504" y1="465" x2="504" y2="492"/>
    <line x1="517" y1="466" x2="516" y2="490"/>
    <line x1="530" y1="468" x2="529" y2="486"/>
  </g>
  <polygon points="486,486 494,486 490,504" fill="#eef9ff" filter="url(#glowWhite)"/>
  <polygon points="506,486 514,486 510,504" fill="#eef9ff" filter="url(#glowWhite)"/>
</g>
<rect x="0" y="380" width="1000" height="900" fill="url(#entityFade)" pointer-events="none"/>

<!-- ===== TARGET PLATFORM (left) — landing spot ===== -->
<g>
  <polygon points="214,766 372,748 430,786 272,808" fill="url(#platTop)"/>
  <polygon points="272,808 430,786 430,840 272,866" fill="url(#platSide)"/>
  <polygon points="214,766 272,808 272,866 214,826" fill="#10151c"/>
  <g stroke="#566372" stroke-width="1" opacity="0.5">
    <line x1="266" y1="760" x2="324" y2="798"/>
    <line x1="318" y1="754" x2="376" y2="792"/>
    <line x1="244" y1="780" x2="402" y2="762"/>
  </g>
  <polyline points="214,766 372,748 430,786 272,808 214,766" fill="none" stroke="#55aaee" stroke-width="2.5" filter="url(#glowCyan)"/>
  <rect x="320" y="712" width="22" height="34" rx="3" fill="#44444e" stroke="#2a2a32" stroke-width="1.5"/>
  <circle cx="331" cy="712" r="11" fill="#ff2a10" filter="url(#glowRed)"/>
  <circle cx="329" cy="710" r="3.5" fill="#ffd0c0"/>
</g>

<!-- ===== PLATFORM (right) with red switch ===== -->
<g>
  <polygon points="688,702 802,686 840,714 726,730" fill="url(#platTop)"/>
  <polygon points="726,730 840,714 840,766 726,782" fill="url(#platSide)"/>
  <polygon points="688,702 726,730 726,782 688,754" fill="#10151c"/>
  <g stroke="#566372" stroke-width="1" opacity="0.5">
    <line x1="724" y1="697" x2="762" y2="722"/>
    <line x1="764" y1="691" x2="802" y2="716"/>
    <line x1="704" y1="714" x2="818" y2="698"/>
  </g>
  <polyline points="688,702 802,686 840,714 726,730 688,702" fill="none" stroke="#55aaee" stroke-width="2.5" filter="url(#glowCyan)"/>
  <rect x="758" y="672" width="16" height="30" rx="2" fill="#44444e" stroke="#2a2a32" stroke-width="1.2"/>
  <circle cx="766" cy="672" r="8" fill="#ff2a10" filter="url(#glowRed)"/>
  <circle cx="764" cy="670" r="2.6" fill="#ffd0c0"/>
</g>

<!-- ===== FOREGROUND PLATFORM (lower center) ===== -->
<g>
  <polygon points="392,1118 560,1096 628,1140 460,1166" fill="url(#platTop)"/>
  <polygon points="460,1166 628,1140 628,1206 460,1234" fill="url(#platSide)"/>
  <polygon points="392,1118 460,1166 460,1234 392,1182" fill="#0e131a"/>
  <g stroke="#566372" stroke-width="1" opacity="0.45">
    <line x1="448" y1="1110" x2="516" y2="1154"/>
    <line x1="504" y1="1102" x2="572" y2="1146"/>
  </g>
  <polyline points="392,1118 560,1096 628,1140 460,1166 392,1118" fill="none" stroke="#55aaee" stroke-width="2.5" filter="url(#glowCyan)"/>
  <rect x="500" y="1058" width="22" height="34" rx="3" fill="#44444e" stroke="#2a2a32" stroke-width="1.5"/>
  <circle cx="511" cy="1058" r="11" fill="#ff2a10" filter="url(#glowRed)"/>
  <circle cx="509" cy="1056" r="3.5" fill="#ffd0c0"/>
</g>

<!-- ===== FIRST-PERSON TELEPORT LAUNCHER (bottom-right, mirrored in place to face LEFT) ===== -->
<g transform="translate(1688,0) scale(-1,1) translate(792,1316) rotate(-34)">
  <rect x="-26" y="44" width="44" height="96" rx="10" fill="url(#gunBody)" stroke="#0e1116" stroke-width="2"/>
  <rect x="-58" y="-26" width="150" height="74" rx="12" fill="url(#gunBody)" stroke="#0e1116" stroke-width="2"/>
  <rect x="-40" y="-40" width="110" height="20" rx="5" fill="#14171c"/>
  <rect x="-20" y="-30" width="80" height="8" fill="#0f1217"/>
  <rect x="70" y="-14" width="118" height="46" rx="10" fill="#1b1f26" stroke="#0e1116" stroke-width="2"/>
  <circle cx="196" cy="9" r="30" fill="none" stroke="#44bbff" stroke-width="8" filter="url(#glowCyanBig)"/>
  <circle cx="196" cy="9" r="15" fill="#9fe0ff" filter="url(#glowCyan)"/>
  <circle cx="196" cy="9" r="46" fill="#44aaff" opacity="0.22" filter="url(#glowCyanBig)"/>
</g>

<!-- ===== TELEPORT ARC (signature): launches up-left from the bottom-right muzzle, arcs UP then DOWN to the left platform ===== -->
<circle cx="726" cy="1212" r="26" fill="#9fe0ff" opacity="0.5" filter="url(#glowCyanBig)"/>
<g fill="#66ccff" filter="url(#glowCyan)">
  <circle cx="705" cy="1137" r="6"/>
  <circle cx="681" cy="1065" r="6"/>
  <circle cx="636" cy="935"  r="6"/>
  <circle cx="593" cy="825"  r="5.5"/>
  <circle cx="445" cy="577"  r="5.5"/>
  <circle cx="414" cy="564"  r="5"/>
  <circle cx="386" cy="570"  r="5"/>
  <circle cx="360" cy="596"  r="5"/>
  <circle cx="339" cy="634"  r="4.5"/>
  <circle cx="322" cy="678"  r="4.5"/>
</g>
<g fill="#aee0ff" filter="url(#glowCyan)">
  <circle cx="514" cy="662" r="8" opacity="0.7"/>
  <circle cx="552" cy="734" r="7" opacity="0.45"/>
</g>
<g>
  <circle cx="479" cy="610" r="34" fill="#44aaff" opacity="0.35" filter="url(#glowCyanBig)"/>
  <circle cx="479" cy="610" r="15" fill="url(#ballGrad)" filter="url(#glowCyan)"/>
  <circle cx="474" cy="605" r="5" fill="#ffffff"/>
</g>
<!-- landing marker ring + aim reticle on the target (left) platform -->
<g>
  <circle cx="305" cy="744" r="26" fill="none" stroke="#66ccff" stroke-width="3" filter="url(#glowCyan)"/>
  <circle cx="305" cy="744" r="14" fill="none" stroke="#aee4ff" stroke-width="1.5" opacity="0.8"/>
  <g stroke="#ff8c00" stroke-width="2.5" filter="url(#glowOrange)">
    <line x1="305" y1="728" x2="305" y2="736"/>
    <line x1="305" y1="752" x2="305" y2="760"/>
    <line x1="289" y1="744" x2="297" y2="744"/>
    <line x1="313" y1="744" x2="321" y2="744"/>
  </g>
</g>

<!-- ===== TITLE ===== -->
<g text-anchor="middle">
  <text x="503" y="178" font-size="118" font-weight="bold" letter-spacing="14" fill="#5a2c00" opacity="0.6">SWITCH</text>
  <text x="503" y="296" font-size="118" font-weight="bold" letter-spacing="14" fill="#5a2c00" opacity="0.6">HUNTER</text>
  <text x="500" y="174" font-size="118" font-weight="bold" letter-spacing="14" fill="#ff8c00" filter="url(#glowOrange)">SWITCH</text>
  <text x="500" y="292" font-size="118" font-weight="bold" letter-spacing="14" fill="#ff8c00" filter="url(#glowOrange)">HUNTER</text>
  <line x1="250" y1="330" x2="380" y2="330" stroke="#ff8c00" stroke-width="1.5" opacity="0.6"/>
  <line x1="620" y1="330" x2="750" y2="330" stroke="#ff8c00" stroke-width="1.5" opacity="0.6"/>
  <text x="500" y="337" font-size="22" letter-spacing="9" fill="#ffaa33">PORTAL PUZZLE</text>
</g>

<!-- ===== TAGLINE (bottom) ===== -->
<g text-anchor="middle">
  <rect x="288" y="1428" width="424" height="46" rx="23" fill="#0a0202" opacity="0.55" stroke="#ff8c00" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="500" y="1458" font-size="21" letter-spacing="6" fill="#e8d4ac">DON'T FALL &#183; DON'T GET CAUGHT</text>
</g>

<rect width="1000" height="1500" fill="url(#vignette)" pointer-events="none"/>
</svg>
