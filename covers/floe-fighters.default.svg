<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1020" width="400" height="600">
<defs>
  <linearGradient id="ffSky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#bfe7ff"/>
    <stop offset="0.45" stop-color="#7fc1ee"/>
    <stop offset="1" stop-color="#1a6fa8"/>
  </linearGradient>
  <linearGradient id="ffSea" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1a6fa8"/>
    <stop offset="1" stop-color="#06243f"/>
  </linearGradient>
  <radialGradient id="ffFloe" cx="50%" cy="38%" r="70%">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset="0.6" stop-color="#eaf6ff"/>
    <stop offset="1" stop-color="#bfe3ff"/>
  </radialGradient>
  <radialGradient id="ffSun" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="#fff3c4"/>
    <stop offset="0.5" stop-color="#ffd23f"/>
    <stop offset="1" stop-color="#ffd23f" stop-opacity="0"/>
  </radialGradient>
  <filter id="ffGlow" x="-30%" y="-60%" width="160%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- 1. Sky + sea background -->
<rect width="680" height="1020" fill="url(#ffSky)"/>
<rect y="560" width="680" height="460" fill="url(#ffSea)"/>
<circle cx="552" cy="250" r="130" fill="url(#ffSun)"/>

<!-- falling snow -->
<g fill="#ffffff" opacity="0.85">
  <circle cx="80" cy="300" r="4"/><circle cx="150" cy="430" r="3"/><circle cx="240" cy="250" r="3.5"/>
  <circle cx="470" cy="360" r="3"/><circle cx="600" cy="470" r="4"/><circle cx="330" cy="200" r="2.5"/>
  <circle cx="120" cy="540" r="3"/><circle cx="540" cy="560" r="2.5"/><circle cx="410" cy="500" r="3"/>
  <circle cx="60" cy="640" r="3"/><circle cx="640" cy="640" r="3.5"/>
</g>

<!-- distant water glints -->
<g fill="#9fd2f2" opacity="0.5">
  <ellipse cx="160" cy="690" rx="40" ry="6"/><ellipse cx="520" cy="730" rx="55" ry="7"/>
  <ellipse cx="340" cy="860" rx="70" ry="9"/><ellipse cx="120" cy="900" rx="45" ry="6"/>
</g>

<!-- 2. The ice floe (big rounded slab) with shadow -->
<ellipse cx="350" cy="855" rx="245" ry="60" fill="#06243f" opacity="0.35"/>
<path d="M120 720 Q105 660 175 645 Q230 612 320 628 Q420 600 500 640
         Q585 650 575 715 Q600 770 520 800 Q420 845 320 828 Q205 845 150 798
         Q98 768 120 720 Z" fill="url(#ffFloe)" stroke="#bfe3ff" stroke-width="3"/>
<!-- floe top sheen + a couple of cracks -->
<path d="M175 660 Q300 632 470 660" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.7"/>
<path d="M300 640 L320 720 L290 790" stroke="#bfe3ff" stroke-width="3" fill="none" opacity="0.7"/>
<path d="M430 650 L455 740" stroke="#bfe3ff" stroke-width="3" fill="none" opacity="0.6"/>

<!-- 3a. RED penguin (hero, center) -->
<g transform="translate(300,648)">
  <ellipse cx="22" cy="120" rx="46" ry="12" fill="#06243f" opacity="0.25"/>
  <ellipse cx="22" cy="60" rx="46" ry="58" fill="#ff4d4d"/>
  <ellipse cx="22" cy="70" rx="30" ry="42" fill="#fff"/>
  <circle cx="22" cy="6" r="34" fill="#ff4d4d"/>
  <circle cx="22" cy="14" r="20" fill="#fff"/>
  <circle cx="13" cy="2" r="5" fill="#0c3357"/><circle cx="31" cy="2" r="5" fill="#0c3357"/>
  <polygon points="22,12 13,22 31,22" fill="#ff9a3c"/>
  <polygon points="-22,72 -40,86 -20,96" fill="#e85d3d"/>
  <polygon points="66,72 84,86 64,96" fill="#e85d3d"/>
  <ellipse cx="8" cy="120" rx="12" ry="7" fill="#ff9a3c"/><ellipse cx="36" cy="120" rx="12" ry="7" fill="#ff9a3c"/>
</g>

<!-- 3b. BLUE penguin (being knocked, tilting off the edge, right) -->
<g transform="translate(470,690) rotate(24)">
  <ellipse cx="0" cy="44" rx="34" ry="42" fill="#2563eb"/>
  <ellipse cx="0" cy="52" rx="21" ry="30" fill="#eaf6ff"/>
  <circle cx="0" cy="2" r="25" fill="#2563eb"/>
  <circle cx="0" cy="8" r="14" fill="#eaf6ff"/>
  <circle cx="-7" cy="-2" r="3.5" fill="#0c3357"/><circle cx="7" cy="-2" r="3.5" fill="#0c3357"/>
  <polygon points="0,6 -7,14 7,14" fill="#ffd23f"/>
  <polygon points="-30,52 -48,46 -34,66" fill="#1d4fd0"/>
</g>
<!-- splash where blue is going over -->
<g fill="#cdecff" opacity="0.9">
  <circle cx="520" cy="800" r="8"/><circle cx="540" cy="785" r="6"/><circle cx="505" cy="788" r="5"/>
</g>

<!-- 3c. GREEN penguin (small, left, bracing) -->
<g transform="translate(190,712) scale(0.78)">
  <ellipse cx="0" cy="50" rx="36" ry="44" fill="#46d160"/>
  <ellipse cx="0" cy="58" rx="22" ry="31" fill="#fff"/>
  <circle cx="0" cy="0" r="26" fill="#46d160"/>
  <circle cx="0" cy="7" r="15" fill="#fff"/>
  <circle cx="-7" cy="-3" r="4" fill="#0c3357"/><circle cx="7" cy="-3" r="4" fill="#0c3357"/>
  <polygon points="0,5 -7,14 7,14" fill="#ff9a3c"/>
</g>

<!-- 4. Flying fish-bomb arcing in with a trail (the signature weapon) -->
<g transform="translate(560,470)">
  <path d="M-120 120 Q-60 40 0 0" stroke="#ffd23f" stroke-width="5" fill="none" opacity="0.55" stroke-dasharray="2 14" stroke-linecap="round"/>
  <g transform="rotate(38)">
    <ellipse cx="0" cy="0" rx="34" ry="20" fill="#ffd23f"/>
    <ellipse cx="0" cy="0" rx="34" ry="20" fill="none" stroke="#e8a72a" stroke-width="2"/>
    <polygon points="30,0 56,-18 56,18" fill="#ff8a5c"/>
    <circle cx="-16" cy="-5" r="5" fill="#0c3357"/>
    <path d="M-30 -8 Q-10 -16 6 -10" stroke="#fff" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>
  <g fill="#ff7a59" opacity="0.9"><circle cx="2" cy="-30" r="4"/><circle cx="20" cy="-22" r="3"/><circle cx="-18" cy="-24" r="3"/></g>
</g>

<!-- 5. Title -->
<rect x="0" y="0" width="680" height="150" fill="rgba(6,36,63,0.30)"/>
<text x="343" y="118" text-anchor="middle" font-family="'Fredoka','Arial Black',sans-serif"
      font-weight="900" font-size="74" fill="rgba(6,36,63,0.45)" letter-spacing="1">FLOE</text>
<text x="340" y="115" text-anchor="middle" font-family="'Fredoka','Arial Black',sans-serif"
      font-weight="900" font-size="74" fill="#eaf6ff" letter-spacing="1" filter="url(#ffGlow)">FLOE</text>
<text x="343" y="118" text-anchor="middle" font-family="'Fredoka','Arial Black',sans-serif"
      font-weight="900" font-size="74" fill="#1a6fa8" letter-spacing="1" opacity="0">FLOE</text>
<!-- subtitle word FIGHTERS in coral -->
<rect x="0" y="150" width="680" height="64" fill="rgba(6,36,63,0.18)"/>
<text x="340" y="198" text-anchor="middle" font-family="'Fredoka','Arial Black',sans-serif"
      font-weight="700" font-size="46" fill="#ff7a59" letter-spacing="6">FIGHTERS</text>

<!-- bottom label -->
<rect x="0" y="980" width="680" height="40" fill="rgba(6,36,63,0.45)"/>
<text x="340" y="1007" text-anchor="middle" font-family="'Fredoka',sans-serif"
      font-weight="600" font-size="22" fill="#bfe7ff" letter-spacing="2">UP TO 4 PLAYERS · KNOCK 'EM IN</text>
</svg>
