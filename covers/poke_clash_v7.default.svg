<!-- Pokeball — centered at (340,690), radius 130, matching game CSS style -->
<g transform="translate(340,690) scale(0.8)" opacity="0.18">
  <!-- Top half: red #e74c3c -->
  <path d="M -130 0 A 130 130 0 0 1 130 0 Z" fill="#e74c3c"/>
  <!-- Bottom half: white #eef2ff -->
  <path d="M -130 0 A 130 130 0 0 0 130 0 Z" fill="#eef2ff"/>
  <!-- Outer ring -->
  <circle cx="0" cy="0" r="130" fill="none" stroke="#888" stroke-width="5"/>
  <!-- Center band -->
  <rect x="-130" y="-9" width="260" height="18" fill="#333"/>
  <!-- Center button outer -->
  <circle cx="0" cy="0" r="26" fill="#555"/>
  <!-- Center button inner -->
  <circle cx="0" cy="0" r="17" fill="#eef2ff"/>
</g>

