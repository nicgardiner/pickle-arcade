function tone(freq,type,vol,dur,freq2){
  if(_ac.state!=='running')return;
  try{
    const o=_ac.createOscillator(),g=_ac.createGain(),t=_ac.currentTime;
    o.type=type;o.frequency.setValueAtTime(freq,t);
    if(freq2)o.frequency.exponentialRampToValueAtTime(freq2,t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(_ac.destination);o.start(t);o.stop(t+dur+.01);
  }catch(e){}
}
function sfxCoin(){tone(1200,'sine',.18,.1,1800);}
function sfxJump(){tone(320,'sine',.18,.12,640);}
function sfxMinionDie(){tone(500,'square',.2,.15,80);}
function sfxBossHurt(){tone(200,'sawtooth',.28,.2,80);}
function sfxVictory(){
  if(_ac.state!=='running')return;
  try{
    const t=_ac.currentTime;
    const notes=[523,659,784,659,784,1047,1319],gaps=[0,.13,.13,.13,.13,.18,0];
    let cur=t;
    notes.forEach((f,i)=>{cur+=gaps[i];const o=_ac.createOscillator(),g=_ac.createGain();o.type='sine';o.frequency.setValueAtTime(f,cur);g.gain.setValueAtTime(.22,cur);g.gain.exponentialRampToValueAtTime(0.001,cur+.28);o.connect(g);g.connect(_ac.destination);o.start(cur);o.stop(cur+.3);});
  }catch(e){}
}

function playPing(){
  const ac=new(window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime;
  o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(1320,t+.04);

  if(_ac.state!=='running')_ac.resume();
}

}
function drawLvlClear(){ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#FFD700';ctx.font='bold 46px monospace';ctx.fillText('LEVEL CLEAR!',W/2,172);ctx.fillStyle='#fff';ctx.font='19px monospace';ctx.fillText('Score: '+score+'   Coins: '+coinN,W/2,230);if(lvI+1<LV.length){const pulse=Math.sin(fr*.1)*.35+.65;ctx.fillStyle='rgba(180,255,100,'+pulse+')';ctx.font='bold 20px monospace';ctx.fillText('Press ENTER for next level',W/2,318);ctx.fillStyle='#888';ctx.font='15px monospace';ctx.fillText('Up next: '+LV[lvI+1].name,W/2,356);}ctx.textAlign='left';}
function drawGameOver(){ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,.5)';ctx.font='bold 56px monospace';ctx.fillText('GAME OVER',W/2+3,208);ctx.fillStyle='#ff3333';ctx.fillText('GAME OVER',W/2,205);ctx.fillStyle='#fff';ctx.font='19px monospace';ctx.fillText('Final Score: '+score+'   Coins: '+coinN,W/2,268);const pulse=Math.sin(fr*.09)*.35+.65;ctx.fillStyle='rgba(255,200,60,'+pulse+')';ctx.font='bold 20px monospace';ctx.fillText('Press ENTER to try again',W/2,358);ctx.textAlign='left';}
function drawWin(){ctx.fillStyle='#060010';ctx.fillRect(0,0,W,H);for(let i=0;i<90;i++){const tw=(Math.sin(fr*.1+i*.7)+1)/2;ctx.globalAlpha=tw;ctx.fillStyle='#fff';ctx.fillRect(i*27%W,i*19%H,tw>.7?2:1,tw>.7?2:1);}ctx.globalAlpha=1;ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,.5)';ctx.font='bold 50px monospace';ctx.fillText('YOU WIN!',W/2+3,173);ctx.fillStyle='#FFD700';ctx.fillText('YOU WIN!',W/2,170);ctx.fillStyle='#ccaaff';ctx.font='21px monospace';ctx.fillText('The Kingdom is Saved!',W/2,216);ctx.fillStyle='#aaa';ctx.font='17px monospace';ctx.fillText('Final Score: '+score,W/2,266);ctx.fillText('Coins Collected: '+coinN,W/2,294);const pulse=Math.sin(fr*.09)*.35+.65;ctx.fillStyle='rgba(180,255,100,'+pulse+')';ctx.font='bold 20px monospace';ctx.fillText('Press ENTER to play again',W/2,378);ctx.textAlign='left';}

function update(){
  fr++;
  if(held('KeyF')&&Date.now()-fPingAt>=500){playPing();fPingAt=Date.now();}
  if(shopOpen)return;
  if(gs==='start'){if(startP()){devMode=false;lvI=0;score=0;lives=13;coinN=0;loadLv(0);}return;}
  if(gs==='gameover'){if(press('Enter')||press('Space'))gs='start';return;}
  if(gs==='win'){if(press('Enter')||press('Space'))gs='start';return;}
  if(gs==='bosswin'){stT++;updParts();updCam();if(fr%16===0)addP(camX+80+Math.random()*(W-160),60+Math.random()*200,['#FFD700','#ff4400','#00ff88','#ff44ff','#44aaff'][Math.floor(Math.random()*5)],16,1.6);if((press('Enter')||press('Space'))&&stT>60){gs='win';sfxVictory();if(window.GameSDK&&GameSDK.gameId){GameSDK.setStat('best_score',score,true);GameSDK.incrementStat('total_runs');GameSDK.setStat('furthest_world',10,true);GameSDK.unlockAchievement('first_quest','First Quest');GameSDK.unlockAchievement('world_3','Explorer');GameSDK.unlockAchievement('world_6','Halfway There');GameSDK.unlockAchievement('boss_slayer','Boss Slayer');const _wst=GameSDK.getStats();if((_wst.total_runs||0)>=5)GameSDK.unlockAchievement('die_hard','Die Hard');if(_deathless)GameSDK.unlockAchievement('deathless','Deathless');}}return;}
  if(gs==='levelcomplete'){stT++;if((press('Enter')||press('Space'))&&stT>18){lvI++;if(lvI>=LV.length)gs='win';else loadLv(lvI);}return;}
  updMP();updPl();
  if(devMode&&press('KeyN')&&gs==='playing'){lvI=Math.min(lvI+1,LV.length-1);loadLv(lvI);}
  if(!pl.dead){updEns();updBoss();updMiniBoss();updCoins();updGunPickup();updBullets();updEprojs();updLavaPillars();}
  updCam();updParts();
  if(barrier&&barrier.alive){barrier.flash++;const anyAlive=(boss&&boss.alive)||(miniBoss&&miniBoss.alive)||ens.some(e=>e.t==='y'&&e.alive);if(!anyAlive){barrier.alive=false;addP(barrier.x+barrier.w/2,H/2,'#00ffaa',50,2.2);addP(barrier.x+barrier.w/2,H/2,'#ffff88',30,1.6);}}
  if(goalO&&!pl.dead&&rr(pl,{x:goalO.x,y:goalO.y-70,w:50,h:70})&&(!miniBoss||!miniBoss.alive)){gs='levelcomplete';stT=0;score+=500;}
}
function render(){
  ctx.clearRect(0,0,W,H);
  if(gs==='start'){drawStart();return;}
  if(gs==='gameover'){drawGameOver();return;}
  if(gs==='win'){drawWin();return;}
  if(gs==='bosswin'){drawBossWin();return;}
  drawBG();[...plats,...mpl].forEach(drawPlat);coinArr.forEach(drawCoin);if(goalO)drawGoal(goalO);
  if(barrier&&barrier.alive){const sx=barrier.x-camX,bf=barrier.flash;if(sx>-14&&sx<W+14){ctx.globalAlpha=.25+Math.sin(bf*.07)*.1;ctx.fillStyle='#ff4400';ctx.fillRect(sx,0,barrier.w,H);ctx.globalAlpha=.5;ctx.fillStyle='#ff7700';ctx.fillRect(sx+barrier.w*.25,0,barrier.w*.5,H);ctx.globalAlpha=1;ctx.fillStyle='#ffee88';for(let i=0;i<7;i++){const sy=((i*65+bf*4)%H),bx=sx+barrier.w/2+Math.sin(bf*.2+i*1.1)*4;ctx.globalAlpha=.85;ctx.beginPath();ctx.arc(bx,sy,2.5,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=.65+Math.sin(bf*.14)*.3;ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;ctx.strokeRect(sx+1,0,barrier.w-2,H);ctx.lineWidth=1;ctx.globalAlpha=1;ctx.save();ctx.translate(sx+barrier.w/2,H/2);ctx.rotate(-Math.PI/2);ctx.fillStyle='#ffee44';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.globalAlpha=.8+Math.sin(bf*.09)*.2;ctx.fillText('DEFEAT THE BOSS',0,4);ctx.globalAlpha=1;ctx.restore();ctx.textAlign='left';}}
  drawGunPickup();drawLavaPillars();ens.forEach(drawEn);if(boss)drawBoss(boss);drawMiniBoss();
  projs.forEach(drawProj);drawEprojs();drawBullets();drawParts();drawPl();drawHUD();
  if(gs==='levelcomplete')drawLvlClear();
  if('ontouchstart' in window)drawTouchHint();
  if(shopOpen)drawShop();
}
function loop(){
  if(held('KeyF')&&Date.now()-fPingAt>=500){playPing();fPingAt=Date.now();}
  update();render();requestAnimationFrame(loop);
}
loop();
</script></body></html>
